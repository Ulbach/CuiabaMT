<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gestão Veicular - Delta Cuiabá</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020817;
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

/* ===== HERO ===== */

.hero-header{
width:100%;
height:180px;

background:
linear-gradient(180deg,rgba(6,20,39,0.18) 0%,rgba(6,20,39,0.55) 100%),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1600')
center/cover no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-content{
width:100%;
max-width:500px;
margin-top:-35px;
}

.brand-title{
font-size:26px;
font-weight:900;
letter-spacing:4px;
margin:4px 0;
color:#e6edf7;

text-shadow:
0 0 8px rgba(34,197,94,0.5),
0 0 18px rgba(34,197,94,0.25);
}

/* ===== CONTEÚDO ===== */

.container{
width:100%;
max-width:420px;
padding:20px;
margin-top:-20px;
text-align:center;
flex:1;
}

.logo{
margin-top:10px;
font-size:30px;
font-weight:900;
}

.logo span{
color:#ff4d4f;
display:block;
}

/* ===== BOTÕES ===== */

.menu{
margin-top:24px;
display:flex;
flex-direction:column;
gap:16px;
}

.btn{
padding:18px;
border-radius:16px;
background:#061226;
border:1px solid #132743;
text-decoration:none;
color:#fff;
font-weight:800;
font-size:15px;

transition: all 0.25s ease;
}

/* HOVER PROFISSIONAL */
.btn:hover{
background:#0b1b33;
transform:translateY(-3px) scale(1.02);
box-shadow:0 10px 30px rgba(0,0,0,0.5),
           0 0 12px rgba(34,197,94,0.2);
border-color:#1f8f5a;
}

/* ===== FOOTER ===== */

.footer{
margin-bottom:12px;
font-size:12px;
color:#6b85a6;
opacity:0.7;
letter-spacing:1px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero-header">
  <div class="hero-content">
    <div class="brand-title">Delta Cuiabá</div>
    <div class="brand-title">Controle de Frota</div>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="container">

<div class="logo">

<span>INTELIGENTE</span>
</div>
