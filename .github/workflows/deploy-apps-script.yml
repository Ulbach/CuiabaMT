name: Deploy Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar Google CLASP
        run: npm install -g @google/clasp

      - name: Criar autenticação CLASP
        run: |
          mkdir -p ~/.config
          cat <<EOF > ~/.clasprc.json
          {
            "token": {
              "access_token": "${{ secrets.CLASP_ACCESS_TOKEN }}",
              "refresh_token": "${{ secrets.CLASP_REFRESH_TOKEN }}",
              "scope": "https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive",
              "token_type": "Bearer",
              "expiry_date": 9999999999999
            }
          }
          EOF

      - name: Publicar para Google Apps Script
        run: clasp push

      - name: Deploy concluído
        run: echo "Código enviado com sucesso para o Apps Script"
