name: Deploy Google Apps Script

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar CLASP
        run: npm install -g @google/clasp

      - name: Criar autenticação CLASP
        run: |
          mkdir -p ~/.config
          cat > ~/.clasprc.json <<EOF
          {
            "token": {
              "access_token": "${{ secrets.CLASP_ACCESS_TOKEN }}",
              "refresh_token": "${{ secrets.CLASP_REFRESH_TOKEN }}",
              "scope": "https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.deployments",
              "token_type": "Bearer"
            },
            "oauth2ClientSettings": {
              "clientId": "${{ secrets.CLASP_CLIENT_ID }}",
              "clientSecret": "${{ secrets.CLASP_CLIENT_SECRET }}",
              "redirectUri": "http://localhost"
            },
            "isLocalCreds": false
          }
          EOF

      - name: Criar .clasp.json
        run: |
          cat > .clasp.json <<EOF
          {
            "scriptId": "${{ secrets.SCRIPT_ID }}",
            "rootDir": "./"
          }
          EOF

      - name: Push para Apps Script
        run: clasp push -f

      - name: Criar nova versão
        run: clasp version "Deploy automático GitHub"

      - name: Fazer deploy do Web App
        run: clasp deploy -d "Deploy GitHub automático"
