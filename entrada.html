<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Frota Pro — Registrar Entrada</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{ 
      --bg1:#061427; --bg2:#0b1b33; 
      --card:rgba(255,255,255,0.06); 
      --border:rgba(255,255,255,0.12); 
      --shadow:0 16px 40px rgba(0,0,0,.45); 
      --radius:20px; 
      --text-main:#e6edf7; --text-soft:#9fb4d3; --text-muted:#7b8ca7; 
      --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
    }
    *{box-sizing:border-box}
    body{ 
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial; 
      background:linear-gradient(180deg,var(--bg1),var(--bg2)); 
      color:var(--text-main); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; 
    }
    .card{ width:100%; max-width:440px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:30px; backdrop-filter:blur(10px); box-shadow:var(--shadow); position:relative; overflow:hidden; }
    .header{ text-align:center; margin-bottom:25px }
    .header h2{ margin:0; font-size:24px; font-weight:800; letter-spacing:-0.5px; color:var(--green) }
    .header p{ margin:5px 0 0; font-size:11px; color:var(--text-soft); text-transform:uppercase; letter-spacing:2px; font-weight:600 }
    .field{ margin-bottom:18px }
    label{ display:block; font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px }
    .input-group{ position:relative }
    .input-group i{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--green); font-size:14px; pointer-events:none }
    select, input{ 
      width:100%; background:rgba(0,0,0,0.2); border:1px solid var(--border); padding:13px 13px 13px 40px; border-radius:12px; color:#fff; font-size:15px; outline:none; transition:0.2s;
    }
    select:focus, input:focus{ border-color:var(--green); background:rgba(255,255,255,0.05) }
    .km-hint{ 
      font-size:16px; 
      color:var(--red); 
      font-weight:700;
      margin-top:6px; 
      display:block; 
      padding-left:2px;
      text-align: right;
    }
    .km-hint b{ color:var(--red) }
    .btn-save{ width:100%; padding:16px; background:var(--green); color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; transition:0.3s; }
    .btn-save:disabled{ opacity:0.15; cursor:not-allowed; filter:grayscale(1) }
    .btn-back{ display:block; text-align:center; margin-top:20px; color:var(--text-soft); text-decoration:none; font-size:13px; font-weight:500; transition:0.2s }
    #msg{ text-align:center; margin-top:15px; font-size:13px; font-weight:600; min-height:1.5em }
  </style>
</head>
<body>

<div class="card">
  <div style="margin:-6px 0 18px 0;padding:12px 14px;border-radius:14px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.18);text-align:center;font-size:13px;color:#9fb4d3;">
    Segurança logado: <strong id="sessaoSegurancaTopo" style="color:#e6edf7;">...</strong>
  </div>
  <div class="header">
    <h2>Registrar Entrada</h2>
    <p># DELTA CUIABA #</p>
  </div>

  <div class="field">
    <label>Veículo em Trânsito</label>
    <div class="input-group">
      <i class="fa-solid fa-car-side"></i>
      <select id="veiculo" onchange="onChangeVeiculo()">
        <option value="">Carregando...</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>KM de Retorno</label>
    <div class="input-group">
      <i class="fa-solid fa-gauge-high"></i>
      <input type="number" id="kmRetorno" placeholder="0" oninput="validateForm()">
    </div>
    <span class="km-hint" id="hintKm">Selecione o veículo acima</span>
  </div>

  <div class="field">
    <label>Motorista</label>
    <div class="input-group">
      <i class="fa-solid fa-user-tie"></i>
      <select id="motorista" onchange="validateForm()">
        <option value="">Aguardando...</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Segurança Logado</label>
    <div class="input-group">
      <i class="fa-solid fa-shield-halved"></i>
      <input type="text" id="seguranca" placeholder="Aguardando login..." readonly>
    </div>
  </div>

  <button class="btn-save" id="btnSalvar" disabled onclick="doEnviar()">GRAVAR ENTRADA</button>
  <a href="veiculos.html" id="btnVoltarMenu" class="btn-back">← VOLTAR AO MENU</a>
  <div id="msg"></div>
</div>


<script>
const API_URL='https://script.google.com/macros/s/AKfycbyrhIsHgV1sQj2yMaFcb1SOl1FydAC0oay23djmAUnERwVjph6pTi3GQif9JNjf_tRCpw/exec';
const STORAGE_KEY='delta_auth_v1';

function getAuth() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
  catch(_) { return null; }
}

function clearAuth() {
  localStorage.removeItem(STORAGE_KEY);
}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    script.src=url + (url.includes('?') ? '&' : '?') + 'callback=' + cb + '&_ts=' + Date.now();
    window[cb]=(data)=>{
      try{ resolve(data); }
      finally {
        try { delete window[cb]; } catch(_) { window[cb]=undefined; }
        if(script.parentNode) script.parentNode.removeChild(script);
      }
    };
    script.onerror=()=>{
      try { delete window[cb]; } catch(_) { window[cb]=undefined; }
      if(script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Erro de conexão'));
    };
    document.head.appendChild(script);
  });
}

async function validarSessaoOuRedirecionar(){
  const auth = getAuth();
  if(!auth || !auth.token){
    location.href='index.html';
    return null;
  }
  try {
    const res = await jsonp(API_URL + '?route=validarSessao&token=' + encodeURIComponent(auth.token));
    if(res && res.ok && res.autenticado){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ token: auth.token, seguranca: res.seguranca, expiraEm: res.expiraEm }));
      return { token: auth.token, seguranca: res.seguranca, expiraEm: res.expiraEm };
    }
  } catch(_) {}
  clearAuth();
  location.href='index.html';
  return null;
}

let KM_ANTERIOR = 0;
let inFlight = false;
let VEICULOS_NA_RUA = [];
let AUTH = null;

function apiGet(route, params = {}) {
  const qs = new URLSearchParams({ route, ...params }).toString();
  return jsonp(`${API_URL}?${qs}`);
}

function preencher(el, lista, placeholder) {
  el.innerHTML = `<option value="">${placeholder}</option>` +
    (lista || []).map(i => `<option value="${String(i).replace(/"/g, '&quot;')}">${i}</option>`).join('');
}

function setMsg(text, colorVar) {
  const msg = document.getElementById('msg');
  msg.style.color = colorVar ? `var(${colorVar})` : '';
  msg.innerText = text || '';
}

function setLoadingState(loading, text) {
  const veiculo = document.getElementById('veiculo');
  const motorista = document.getElementById('motorista');
  const btn = document.getElementById('btnSalvar');

  veiculo.disabled = loading;
  motorista.disabled = loading;
  btn.disabled = true;
  setMsg(text || '', '--text-soft');
}

function normalizarListaVeiculosNaRua(payload) {
  if (Array.isArray(payload?.veiculosNaRua)) return payload.veiculosNaRua;
  if (Array.isArray(payload?.emTransito)) return payload.emTransito;
  return [];
}

async function carregarBaseEntrada() {
  try {
    return await apiGet('listsAvail');
  } catch (_) {
    return await apiGet('home');
  }
}

async function init() {
  AUTH = await validarSessaoOuRedirecionar();
  if(!AUTH) return;

  document.getElementById('seguranca').value = AUTH.seguranca || '';
  const topo = document.getElementById('sessaoSegurancaTopo');
  if(topo) topo.textContent = AUTH.seguranca || '---';

  setLoadingState(true, 'Buscando veículos em trânsito...');

  try {
    const L = await carregarBaseEntrada();
    const selV = document.getElementById('veiculo');

    VEICULOS_NA_RUA = normalizarListaVeiculosNaRua(L);
    preencher(document.getElementById('motorista'), (L && L.motoristas) || [], 'Selecione...');

    if (!VEICULOS_NA_RUA.length) {
      selV.innerHTML = '<option value="">Nenhum veículo em trânsito</option>';
      document.getElementById('hintKm').innerText = 'Não há veículos aguardando entrada.';
      setMsg('Nenhum veículo em trânsito encontrado.', '--text-soft');
      return;
    }

    selV.innerHTML = '<option value="">Selecione o veículo...</option>' +
      VEICULOS_NA_RUA.map(item => `<option value="${String(item.veiculo).replace(/"/g, '&quot;')}">${item.veiculo}</option>`).join('');

    if (VEICULOS_NA_RUA.length === 1) {
      selV.value = VEICULOS_NA_RUA[0].veiculo;
      await onChangeVeiculo();
    } else {
      setMsg('');
    }
  } catch (e) {
    setMsg('Erro ao carregar veículos em trânsito.', '--red');
    document.getElementById('veiculo').innerHTML = '<option value="">Erro ao carregar</option>';
  } finally {
    document.getElementById('veiculo').disabled = false;
    document.getElementById('motorista').disabled = false;
    validateForm();
  }
}

async function onChangeVeiculo() {
  const vSel = document.getElementById('veiculo').value;
  const hint = document.getElementById('hintKm');
  const motoristaEl = document.getElementById('motorista');

  if (!vSel) {
    KM_ANTERIOR = 0;
    hint.innerText = 'Selecione o veículo acima';
    motoristaEl.value = '';
    validateForm();
    return;
  }

  const registro = VEICULOS_NA_RUA.find(x => String(x.veiculo) === String(vSel));
  if (registro) {
    if (registro.motorista) motoristaEl.value = registro.motorista;
    if (registro.kmSaida !== undefined && registro.kmSaida !== null && String(registro.kmSaida) !== '') {
      KM_ANTERIOR = Number(String(registro.kmSaida).toString().replace(',', '.')) || 0;
      hint.innerHTML = `KM de saída: <b>${KM_ANTERIOR}</b>`;
      setMsg('');
      validateForm();
      return;
    }
  }

  hint.innerHTML = '🔍 Buscando último KM...';
  try {
    const st = await apiGet('kmAtual', { veiculo: vSel });
    KM_ANTERIOR = Number(st.km || 0);
    hint.innerHTML = `Último KM: <b>${KM_ANTERIOR}</b>`;
  } catch (e) {
    KM_ANTERIOR = 0;
    hint.innerText = 'Erro ao buscar KM.';
  }
  validateForm();
}

function validateForm() {
  const v = document.getElementById('veiculo').value;
  const k = document.getElementById('kmRetorno').value;
  const m = document.getElementById('motorista').value;
  const s = document.getElementById('seguranca').value;
  const btn = document.getElementById('btnSalvar');

  const ok = !!(v && k && m && s);
  const kmOk = Number(k || 0) >= KM_ANTERIOR;

  if (ok && !kmOk) {
    setMsg('KM inferior ao de saída!', '--red');
    btn.disabled = true;
  } else {
    if (document.getElementById('msg').innerText === 'KM inferior ao de saída!') setMsg('');
    btn.disabled = !ok || !kmOk || inFlight;
  }
}

async function doEnviar() {
  if (inFlight || !AUTH || !AUTH.token) return;
  inFlight = true;

  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;
  setMsg('Gravando entrada...', '--text-soft');

  const payload = {
    token: AUTH.token,
    veiculo: document.getElementById('veiculo').value,
    KmRetorno: Number(document.getElementById('kmRetorno').value),
    motorista: document.getElementById('motorista').value,
    seguranca: document.getElementById('seguranca').value
  };

  try {
    const res = await apiGet('entrada', payload);
    if (!res || res.ok === false) {
      throw new Error((res && res.message) || 'Erro ao salvar');
    }
    setMsg('✅ Gravado com sucesso!', '--green');
    setTimeout(() => { location.href = 'veiculos.html'; }, 1200);
  } catch (e) {
    setMsg((e && e.message) ? e.message : 'Erro ao salvar.', '--red');
    inFlight = false;
    validateForm();
  }
}

window.onload = function(){
  const btnVoltar = document.getElementById('btnVoltarMenu');
  if(btnVoltar){
    btnVoltar.addEventListener('click', function(e){
      e.preventDefault();
      location.href = 'veiculos.html';
    });
  }
  init();
};
</script>

</body>
</html>
