<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Controle de Veículos - Delta Cuiabá</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg1:#061427;--bg2:#0b1b33;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.12);--text-main:#e6edf7;--text-soft:#9fb4d3;--accent:#22c55e;--alert:#ef4444;--blue:#3b82f6;}
*{box-sizing:border-box;}
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;align-items:center;position:relative;overflow-x:hidden;}
body::after{content:"";position:fixed;left:0;right:0;bottom:0;height:220px;pointer-events:none;background:linear-gradient(to top,rgba(34,197,94,0.42) 0%,rgba(34,197,94,0.20) 35%,rgba(34,197,94,0.08) 58%,rgba(34,197,94,0) 100%);}
.hero-header{width:100%;height:180px;background:linear-gradient(180deg,rgba(6,20,39,0.18) 0%,rgba(6,20,39,0.55) 100%),url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1600') center/cover no-repeat;display:flex;align-items:center;justify-content:center;text-align:center;}
.hero-content{width:100%;max-width:500px;margin-top:-35px;}
.brand-title{font-size:26px;font-weight:900;letter-spacing:4px;margin:4px 0;color:#e6edf7;text-shadow:0 0 8px rgba(34,197,94,0.5),0 0 18px rgba(34,197,94,0.25);}
.main-container{width:100%;max-width:500px;padding:20px;flex:1;}
.action-grid{display:flex;gap:15px;margin-bottom:30px;}
.btn-action{flex:1;background:var(--card);border:1px solid var(--border);padding:25px 15px;border-radius:20px;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:12px;transition:0.3s;}
.btn-action:active{transform:scale(0.95);background:rgba(255,255,255,0.1);}
.btn-action i{font-size:32px;}
.btn-action span{font-size:12px;font-weight:800;text-transform:uppercase;color:var(--text-main);}
.ico-saida{color:var(--alert);}
.ico-entrada{color:var(--accent);}
.section-title{font-size:13px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:15px;}
.list-wrap{display:flex;flex-direction:column;gap:10px;}
.item{background:var(--card);border:1px solid var(--border);padding:15px;border-radius:20px;display:flex;align-items:center;gap:15px;}
.veh-ico{width:45px;height:45px;background:rgba(255,255,255,0.05);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--blue);}
.item-main{flex:1;}
.item-title{font-weight:800;font-size:15px;}
.item-sub{font-size:12px;color:var(--text-soft);margin-top:2px;}
.status-tag{font-size:10px;font-weight:800;padding:4px 10px;border-radius:8px;text-transform:uppercase;}
.tag-ok{background:rgba(34,197,94,0.1);color:var(--accent);}
.tag-warn{background:rgba(239,68,68,0.1);color:var(--alert);}
.btn-report{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:18px;border-radius:20px;margin-top:28px;margin-bottom:18px;color:#f3f7ff;text-decoration:none;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);}
.btn-report i{color:var(--accent);font-size:24px;}
.btn-footer{width:100%;background:var(--card);border:1px solid var(--border);padding:18px;border-radius:20px;margin-top:18px;margin-bottom:40px;color:var(--text-soft);text-decoration:none;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;}
.hidden-admin{display:none!important;}
</style>
</head>
<body>
<div class="hero-header">
  <div class="hero-content">
    <div class="brand-title">Delta Cuiabá</div>
    <div class="brand-line"></div>
    <div class="brand-title">Controle de Frota</div>
    <div id="pillStatus" style="display:none"></div>
  </div>
</div>
<div style="width:100%;max-width:500px;padding:0 20px;margin-top:-6px;margin-bottom:14px;">
  <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;">
    <div style="font-size:13px;color:#9fb4d3;">Logado como: <strong id="sessaoSeguranca" style="color:#e6edf7;">...</strong></div>
    <button onclick="logoutSistema()" style="background:#0b1a30;border:1px solid rgba(255,255,255,0.12);color:#e6edf7;padding:10px 12px;border-radius:12px;font-weight:700;cursor:pointer;">Sair</button>
  </div>
</div>
<div class="main-container">
<div class="action-grid">
<a href="saida.html" class="btn-action" id="btnSaida"><i class="fa-solid fa-truck-arrow-right ico-saida"></i><span>Registro Saída</span></a>
<a href="entrada.html" class="btn-action" id="btnEntrada"><i class="fa-solid fa-truck-ramp-box ico-entrada"></i><span>Registro Entrada</span></a>
</div>
<div class="section-title">Últimas 5 Movimentações</div>
<div id="listaRecentes" class="list-wrap">
<div style="text-align:center;padding:40px;color:var(--text-soft);"><i class="fa-solid fa-circle-notch fa-spin"></i><br>Buscando dados...</div>
</div>
<a href="relatorios/central_relatorios.html" class="btn-footer btn-report hidden-admin" id="btnRelatorioGeral"><i class="fa-solid fa-chart-line"></i>Relatório Geral</a>
<a href="index.html" class="btn-footer" id="btnVoltarInicio"><i class="fa-solid fa-chevron-left"></i>Voltar ao Menu Principal</a>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';
const LOG_ID_KEY = 'delta_log_acesso_id_v1';
const LOG_INICIO_KEY = 'delta_log_acesso_inicio_v1';

function getAuth(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||localStorage.getItem(STORAGE_KEY_LEGADO)||'null');}catch(_){return null;}}
function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
  localStorage.removeItem(LOG_ID_KEY);
  localStorage.removeItem(LOG_INICIO_KEY);
}

async function registrarLogout(statusFinal='FINALIZADA'){
  try{
    const logId=localStorage.getItem(LOG_ID_KEY);
    const inicioMs=Number(localStorage.getItem(LOG_INICIO_KEY)||0);

    if(!logId) return;

    const fimMs=Date.now();
    const tempoMin=inicioMs ? Math.max(0, Math.round((fimMs-inicioMs)/60000)) : null;

    await updateDoc(doc(db,'logs_acesso',logId),{
      logoutEm:serverTimestamp(),
      logoutMs:fimMs,
      tempoConectadoMin:tempoMin,
      status:statusFinal,
      atualizadoEm:serverTimestamp()
    });
  }catch(e){
    console.error('Erro ao registrar logout:', e);
  }
}
function normalizarPerfil(perfil){return String(perfil||'').trim().toUpperCase();}
function sessaoValidaLocal(auth){return !!(auth && auth.Nome && auth.Perfil && auth.expiraEm && Number(auth.expiraEm)>Date.now());}
async function validarSessaoOuRedirecionar(){
  const auth=getAuth();
  if(!sessaoValidaLocal(auth)){clearAuth();location.href='index.html';return null;}
  return auth;
}
window.logoutSistema=async function(){
  await registrarLogout('FINALIZADA');
  clearAuth();
  location.href='index.html';
};

function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function formatarData(valor){
  if(!valor)return '---';
  try{
    if(typeof valor==='string')return new Date(valor).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    if(valor.toDate)return valor.toDate().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }catch(_){}
  return String(valor);
}
function renderRecentes(lista){
  const wrap=document.getElementById('listaRecentes');
  const ultimos5=(lista||[]).slice(0,5);
  if(!ultimos5.length){
    wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--text-soft);">Nenhuma movimentação encontrada.</div>';
    return;
  }
  wrap.innerHTML=ultimos5.map(it=>{
    const status=String(it.status||it.Status||'').toUpperCase();
    const dataMov=it.dataRetorno||it.dataSaida||it.DataRetorno||it.DataSaida||'';
    const isOk=status.includes('PÁTIO')||status.includes('ENTRADA')||status.includes('CONCLUÍDO')||status.includes('CONCLUIDO');
    return `<div class="item">
      <div class="veh-ico"><i class="fa-solid fa-truck-front"></i></div>
      <div class="item-main">
        <div class="item-title">${esc((it.veiculo||it.Veiculo||'N/A').toUpperCase())}</div>
        <div class="item-sub">${esc(it.motorista||it.Motorista||'---')} | ${esc(formatarData(dataMov))}</div>
      </div>
      <div class="status-tag ${isOk?'tag-ok':'tag-warn'}">${esc(status||'---')}</div>
    </div>`;
  }).join('');
}
async function carregarDados(){
  const pill=document.getElementById('pillStatus');
  try{
    const q=query(collection(db,'movimentacoes_frota'),orderBy('dataSaida','desc'),limit(10));
    const snap=await getDocs(q);
    const lista=snap.docs.map(docItem=>({id:docItem.id,...docItem.data()})).filter(item=>item.Modelo!==true);
    renderRecentes(lista);
    if(pill)pill.innerText='Sincronizado';
  }catch(e){
    console.error(e);
    document.getElementById('listaRecentes').innerHTML='<div style="text-align:center;padding:30px;color:var(--text-soft);">Erro ao carregar dados do Firebase.</div>';
    if(pill)pill.innerText='Offline';
  }
}
window.onload=async function(){
  const AUTH=await validarSessaoOuRedirecionar();
  if(!AUTH)return;
  const perfil=normalizarPerfil(AUTH.Perfil);
  const el=document.getElementById('sessaoSeguranca');
  if(el)el.textContent=(AUTH.Nome||'---')+' - '+perfil;

  const btnRelatorioGeral=document.getElementById('btnRelatorioGeral');
  if(btnRelatorioGeral && perfil==='ADMIN'){
    btnRelatorioGeral.classList.remove('hidden-admin');
  }

  if(perfil==='CONSULTA'){
    const btnSaida=document.getElementById('btnSaida');
    const btnEntrada=document.getElementById('btnEntrada');
    if(btnSaida)btnSaida.classList.add('hidden-admin');
    if(btnEntrada)btnEntrada.classList.add('hidden-admin');
  }

  const btnVoltar=document.getElementById('btnVoltarInicio');
  if(btnVoltar){
    btnVoltar.addEventListener('click',async function(e){
      e.preventDefault();
      await registrarLogout('FINALIZADA');
      clearAuth();
      location.href='index.html';
    });
  }
  carregarDados();
};
</script>
</body>
</html>
