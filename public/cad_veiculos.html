<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>Cadastro de Veículos</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>
:root{--bg1:#0b1220;--bg2:#0b0f17;--card:#0b1221;--border:#1d2940;--text:#e6edf7;--muted:#9fb0cc;--accent:#ef4444;--danger:#ff4d4f;--warn:#ffb020;--shadow:0 24px 64px rgba(0,0,0,.45)}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;background:radial-gradient(900px 360px at -10% -10%,#ef44441f 0%,transparent 60%),radial-gradient(900px 360px at 120% -20%,#06b6d41f 0%,transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
.wrap{width:100%;max-width:680px;margin:0 auto;padding:30px 16px}.cad-top-actions{display:grid;grid-template-columns:54px minmax(0,1fr) 54px;align-items:center;gap:10px;margin:0 0 24px}.cad-top-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:.2s ease}.cad-top-btn:hover{transform:translateY(-2px);border-color:#b91c1c;box-shadow:0 10px 30px rgba(0,0,0,.28),0 0 12px rgba(239,68,68,.12)}.cad-top-btn-danger{justify-self:end;color:#fecaca;background:rgba(255,77,79,.10);border-color:rgba(255,77,79,.28)}.head{text-align:center;margin-bottom:22px}.cad-top-actions .head{margin:0}.chip{display:inline-flex;padding:6px 14px;border-radius:99px;border:1px solid var(--border);color:#fecaca;font-size:11px;font-weight:900;letter-spacing:1px;background:rgba(255,255,255,.03)}
.logo{margin:0;font-size:clamp(28px,6.8vw,40px);font-weight:900;font-style:italic;line-height:1}.logo span{display:block;color:#ff4d4d}.tagline{margin-top:14px;font-size:10px;font-weight:900;letter-spacing:4px;color:var(--muted);opacity:.7}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}.card-title{margin:0 0 14px;font-size:18px;font-weight:900;text-align:center}
.field{margin-bottom:14px}.field small{display:block;margin-top:7px;color:var(--muted);font-size:12px;line-height:1.35}label{display:block;margin-bottom:7px;font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
input,select{width:100%;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.04);color:var(--text);padding:15px;font-size:16px;outline:none}select option{color:#111}
input:focus,select:focus{border-color:#dc2626;box-shadow:0 0 0 3px rgba(239,68,68,.10)}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.checkline{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.03)}.checkline input{width:auto}.checkline label{margin:0;color:var(--text);text-transform:none;letter-spacing:0}
.btn{width:100%;border:none;border-radius:18px;padding:16px 18px;font-size:16px;font-weight:900;cursor:pointer;text-decoration:none;display:flex;justify-content:center;align-items:center;margin-top:12px;transition:.2s ease;color:var(--text)}.btn:hover{transform:translateY(-2px);border-color:#b91c1c;box-shadow:0 10px 30px rgba(0,0,0,.28),0 0 12px rgba(239,68,68,.12)}
.btn-primary{background:var(--accent);color:#08131f}.btn-light{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--border)}.btn-warn{background:rgba(255,176,32,.14);color:#ffd27a;border:1px solid rgba(255,176,32,.35)}
.msg{display:none;margin-top:14px;padding:13px;border-radius:14px;font-weight:900;text-align:center}.msg.ok{display:block;color:#fecaca;background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.25)}.msg.erro{display:block;color:#fff;background:rgba(255,77,79,.18);border:1px solid rgba(255,77,79,.35)}.msg.warn{display:block;color:#ffd27a;background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35)}
.result{margin-top:14px;border:1px solid var(--border);border-radius:18px;overflow:hidden;display:none}.result-item{padding:14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03)}.result-item:last-child{border-bottom:none}.result-title{font-weight:900;font-size:15px}.result-sub{color:var(--muted);font-size:13px;margin-top:4px;line-height:1.45}.oil-info{display:block;margin-top:6px;font-weight:900}.oil-warn{color:var(--warn)}.oil-over{color:var(--danger)}
.edit-banner{display:none;margin-bottom:14px;padding:12px;border-radius:14px;color:#ffd27a;background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35);font-weight:900;text-align:center}
.menu-grid{display:flex;flex-direction:column;gap:16px}.menu-btn{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;padding:20px 18px;text-decoration:none;color:var(--text);border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-weight:900;transition:.2s ease}.menu-btn:hover{background:rgba(255,255,255,.07);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.35),0 0 12px rgba(239,68,68,.12);border-color:#b91c1c}.menu-btn small{display:block;color:var(--muted);font-size:12px;font-weight:600;margin-top:4px}.menu-icon{font-size:22px;min-width:28px;text-align:center}.menu-arrow{opacity:.35;font-size:20px}
.consulta-box{display:none;margin-bottom:16px;padding:13px 14px;border-radius:14px;background:rgba(59,130,246,.10);border:1px solid rgba(125,211,252,.28);color:#bfdbfe;text-align:center;font-size:12px;font-weight:900;line-height:1.4}
body.perfil-consulta #tituloForm::after{content:" - SOMENTE CONSULTA";color:#7dd3fc}
body.perfil-consulta #formCadastro input:not([id='BuscaPlaca']),body.perfil-consulta #formCadastro select{opacity:.62}
@media(max-width:620px){.row{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="cad-top-actions"><a class="cad-top-btn" href="admin.html" title="Voltar" aria-label="Voltar"><i class="fa-solid fa-chevron-left"></i></a><div class="head"><h1 class="logo">Cadastro de<span>Ve&iacute;culos</span></h1><div class="tagline"># DELTA CUIABA #</div></div><a class="cad-top-btn cad-top-btn-danger" href="index.html" onclick="localStorage.removeItem('delta_auth_firebase_v1');localStorage.removeItem('delta_auth_v1');" title="Sair" aria-label="Sair"><i class="fa-solid fa-right-from-bracket"></i></a></div><div class="card"><h2 class="card-title">Consulta</h2><div class="field"><label for="BuscaPlaca">Consultar ve&iacute;culo</label><input id="BuscaPlaca" placeholder="Digite nome, modelo ou placa. Ex: GOL"></div><button class="btn btn-light" type="button" onclick="consultarVeiculo()">Consultar</button><div id="resultado" class="result"></div></div><div class="consulta-box" id="consultaBox">Perfil CONSULTA: consulta liberada. Inclusão e edição de veículos bloqueadas.</div><div class="card"><h2 class="card-title" id="tituloForm">Novo Cadastro</h2><div class="edit-banner" id="editBanner">Modo edição ativo. Após alterar, clique em Atualizar.</div><form id="formCadastro" onsubmit="event.preventDefault(); salvarVeiculo();"><div class="row"><div class="field"><label for="Nome">Nome *</label><input id="Nome" required placeholder="Ex: GOL"></div><div class="field"><label for="Placa">Placa *</label><input id="Placa" required placeholder="Ex: QCH7171"></div></div><div class="row"><div class="field"><label for="Cor">Cor *</label><input id="Cor" required placeholder="Ex: Prata"></div><div class="field"><label for="CategoriaUso">Categoria de uso *</label><select id="CategoriaUso" required><option value="">Selecione</option><option value="Normal">Normal</option><option value="Especial">Especial</option></select></div></div><div class="row"><div class="field"><label for="KmAtualCadastro">KM atual *</label><input id="KmAtualCadastro" type="number" min="0" required placeholder="Ex: 1010"></div><div class="field"><label for="KmTrocaOleo">KM da Próxima Troca *</label><input id="KmTrocaOleo" type="number" min="0" required placeholder="Ex: 6000"><small>KM previsto para a próxima troca de óleo. Apenas observação, não bloqueia a gravação.</small></div></div><div class="field"><label for="DataTrocaOleo">Data troca óleo *</label><input id="DataTrocaOleo" type="date" required></div><div class="row"><div class="checkline"><input id="Ativo" type="checkbox" checked required><label for="Ativo">Ativo *</label></div><div class="checkline"><input id="Restrito" type="checkbox"><label for="Restrito">Restrito</label></div></div><button class="btn btn-primary" id="btnSalvar" type="submit">Salvar</button><button class="btn btn-warn" id="btnCancelarEdicao" type="button" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button><a class="btn btn-light" href="admin.html">Voltar</a><div id="msg" class="msg"></div></form></div></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,query,where,orderBy,limit,serverTimestamp,Timestamp,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth as getFirebaseAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const firebaseConfig={apiKey:"AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",authDomain:"cuiaba-01617931-f126e.firebaseapp.com",projectId:"cuiaba-01617931-f126e",storageBucket:"cuiaba-01617931-f126e.firebasestorage.app",messagingSenderId:"797115279316",appId:"1:797115279316:web:f229366de16d4e066e1841"};
const app=initializeApp(firebaseConfig);
getFirebaseAuth(app); const db=getFirestore(app);

const STORAGE_KEY='delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO='delta_auth_v1';

let AUTH=null;
let modoEdicao=false, editId=null, editColecao=null, resultadosCache=[];

function getAuth(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||localStorage.getItem(STORAGE_KEY_LEGADO)||'null')}catch(_){return null}}
function clearAuth(){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(STORAGE_KEY_LEGADO)}
function nomeAuth(auth){return auth?.Nome||auth?.seguranca||auth?.nome||auth?.usuario||auth?.email||''}
function perfilAuth(auth){return String(auth?.Perfil||auth?.perfil||auth?.tipo||auth?.Tipo||'OPERADOR').trim().toUpperCase()}
function sessaoValidaLocal(auth){if(!auth)return false;if(auth.expiraEm&&Number(auth.expiraEm)<=Date.now())return false;return !!nomeAuth(auth)}
function isConsulta(){return perfilAuth(AUTH)==='CONSULTA'}
async function registrarAuditoria(tipo,alvoColecao,alvoId,detalhes={}){try{await addDoc(collection(db,"auditoria"),{tipo,alvoColecao,alvoId,usuarioUid:AUTH?.uid||"",usuarioNome:AUTH?.Nome||AUTH?.seguranca||AUTH?.nome||"",usuarioEmail:AUTH?.Email||AUTH?.email||"",usuarioPerfil:AUTH?.Perfil||AUTH?.perfil||"",origem:"cad_veiculos.html",detalhes,criadoEm:serverTimestamp()})}catch(e){console.warn("Falha ao registrar auditoria:",e)}}
function aplicarPerfilConsulta(){
  AUTH=getAuth();
  if(!sessaoValidaLocal(AUTH)){clearAuth();location.href='index.html';return}
  if(isConsulta()){
    document.body.classList.add('perfil-consulta');
    const box=document.getElementById('consultaBox');
    const btn=document.getElementById('btnSalvar');
    const cancelar=document.getElementById('btnCancelarEdicao');
    if(box)box.style.display='block';
    if(btn){btn.disabled=true;btn.textContent='SOMENTE CONSULTA';btn.title='Perfil CONSULTA não possui permissão para salvar veículos.'}
    if(cancelar)cancelar.style.display='none';
  }
}
function dataParaTimestamp(valor){if(!valor)return null;const p=valor.split("-");return Timestamp.fromDate(new Date(Number(p[0]),Number(p[1])-1,Number(p[2]),12,0,0))}
function timestampParaData(v){if(!v)return "";const d=v.toDate?v.toDate():new Date(v);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function texto(id){return(document.getElementById(id)?.value||"").trim()} function numero(id){const v=texto(id);return v===""?null:Number(v)} function bool(id){return!!document.getElementById(id)?.checked} function upper(v){return String(v||"").trim().toUpperCase()} function lower(v){return String(v||"").trim().toLowerCase()}
function msg(t,tipo="ok"){const el=document.getElementById("msg");if(el){el.textContent=t;el.className="msg "+tipo}} function limparMsg(){const el=document.getElementById("msg");if(el){el.textContent="";el.className="msg"}}
function limparResultado(){const r=document.getElementById("resultado");if(r){r.innerHTML="";r.style.display="none"}} function mostrarResultado(html){const r=document.getElementById("resultado");if(r){r.innerHTML=html;r.style.display="block"}}
function setModoEdicao(ativo,colecao=null,id=null){
 if(isConsulta()){
  modoEdicao=false;editColecao=null;editId=null;
  const titulo=document.getElementById("tituloForm"),btn=document.getElementById("btnSalvar"),cancelar=document.getElementById("btnCancelarEdicao"),banner=document.getElementById("editBanner");
  if(titulo)titulo.textContent="Novo Cadastro";
  if(btn){btn.disabled=true;btn.textContent="SOMENTE CONSULTA";btn.title="Perfil CONSULTA não possui permissão para salvar veículos."}
  if(cancelar)cancelar.style.display="none";
  if(banner)banner.style.display="none";
  return;
 }
 modoEdicao=ativo;editColecao=colecao;editId=id;const titulo=document.getElementById("tituloForm"),btn=document.getElementById("btnSalvar"),cancelar=document.getElementById("btnCancelarEdicao"),banner=document.getElementById("editBanner");if(ativo){if(titulo)titulo.textContent="Editando Cadastro";if(btn){btn.textContent="Atualizar no Firebase";btn.disabled=false}if(cancelar)cancelar.style.display="flex";if(banner)banner.style.display="block"}else{if(titulo)titulo.textContent="Novo Cadastro";if(btn){btn.textContent="Salvar no Firebase";btn.disabled=false}if(cancelar)cancelar.style.display="none";if(banner)banner.style.display="none"}}
function cancelarEdicao(){document.getElementById("formCadastro").reset();setModoEdicao(false);const ativo=document.getElementById("Ativo");if(ativo)ativo.checked=true;const normal=document.getElementById("catNormal");if(normal)normal.checked=true;msg("Edição cancelada.","warn")}
async function existeRegistro(colecao,campo,valor,ignorarId=null){const q=query(collection(db,colecao),where(campo,"==",valor),limit(10));const snap=await getDocs(q);return snap.docs.some(d=>d.id!==ignorarId)}
async function buscarExato(colecao,campo,valor,max=10){const q=query(collection(db,colecao),where(campo,"==",valor),limit(max));const snap=await getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}))}
async function buscarPrefixo(colecao,campoBusca,termo,max=10){const inicio=upper(termo),fim=inicio+"\uf8ff";const q=query(collection(db,colecao),orderBy(campoBusca),where(campoBusca,">=",inicio),where(campoBusca,"<=",fim),limit(max));const snap=await getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}))}
function editarMotorista(idx){if(isConsulta()){msg('Perfil CONSULTA não possui permissão para editar cadastros.','warn');return;}const d=resultadosCache[idx];if(!d)return;Nome.value=d.Nome||"";CNH.value=d.CNH||"";Val_CNH.value=timestampParaData(d.Val_CNH);const cats=d.CategoriasAutorizadas||[];catNormal.checked=cats.includes("Normal");catEspecial.checked=cats.includes("Especial");Ativo.checked=!!d.Ativo;setModoEdicao(true,"motoristas",d.id);formCadastro.scrollIntoView({behavior:"smooth"})}
function editarSeguranca(idx){msg("Cadastro de segurancas deve ser feito pela tela segura de Firebase Auth.","warn");}
function editarVeiculo(idx){if(isConsulta()){msg('Perfil CONSULTA não possui permissão para editar cadastros.','warn');return;}const d=resultadosCache[idx];if(!d)return;Nome.value=d.Nome||"";Placa.value=d.Placa||"";Cor.value=d.Cor||"";CategoriaUso.value=d.CategoriaUso||"";KmAtualCadastro.value=d.KmAtualCadastro??"";KmTrocaOleo.value=d.KmTrocaOleo??"";DataTrocaOleo.value=timestampParaData(d.DataTrocaOleo);Ativo.checked=!!d.Ativo;Restrito.checked=!!d.Restrito;setModoEdicao(true,"veiculos",d.id);formCadastro.scrollIntoView({behavior:"smooth"})}
function renderMotorista(d,idx){const editBtn=isConsulta()?'':`<button class="btn btn-warn" type="button" onclick="editarMotorista(${idx})">Editar cadastro</button>`;return `<div class="result-item"><div class="result-title">${d.Nome||"-"}</div><div class="result-sub">CNH: ${d.CNH||"-"}<br>Categorias: ${(d.CategoriasAutorizadas||[]).join(", ")||"-"}<br>Ativo: ${d.Ativo?"Sim":"Não"}</div>${editBtn}</div>`}
function renderSeguranca(d,idx){const editBtn=isConsulta()?'':`<button class="btn btn-warn" type="button" onclick="editarSeguranca(${idx})">Editar cadastro</button>`;return `<div class="result-item"><div class="result-title">${d.Nome||"-"}</div><div class="result-sub">E-mail: ${d.Email||"-"}<br>Perfil: ${d.Perfil||"-"}<br>Ativo: ${d.Ativo?"Sim":"Não"}</div>${editBtn}</div>`}
function statusOleoHtml(d){const kmAtual=Number(String(d.KmAtualCadastro??d.KmAtual??0).replace(",","."))||0,kmTroca=Number(String(d.KmTrocaOleo??d.KmProximaTrocaOleo??0).replace(",","."))||0;if(!kmAtual||!kmTroca)return"";const restante=kmTroca-kmAtual;if(restante<0)return`<span class="oil-info oil-over">Informativo: troca de óleo ultrapassada em ${Math.abs(restante)} km. Não bloqueia a operação.</span>`;if(restante<=500)return`<span class="oil-info oil-warn">Informativo: faltam ${restante} km para a troca de óleo. Não bloqueia a operação.</span>`;return""}
function renderVeiculo(d,idx){const editBtn=isConsulta()?'':`<button class="btn btn-warn" type="button" onclick="editarVeiculo(${idx})">Editar cadastro</button>`;return `<div class="result-item"><div class="result-title">${d.Nome||"-"}</div><div class="result-sub">Placa: ${d.Placa||"-"}<br>Cor: ${d.Cor||"-"}<br>Categoria: ${d.CategoriaUso||"-"}<br>KM Atual: ${d.KmAtualCadastro??"-"}<br>KM Próxima Troca: ${d.KmTrocaOleo??"-"}${statusOleoHtml(d)}<br>Restrito: ${d.Restrito?"Sim":"Não"}<br>Ativo: ${d.Ativo?"Sim":"Não"}</div>${editBtn}</div>`}
async function salvarMotorista(){limparMsg();if(isConsulta()){msg('Perfil CONSULTA não possui permissão para salvar motorista.','erro');return;}const nome=upper(texto("Nome")),cnh=texto("CNH"),valCnh=texto("Val_CNH"),normal=catNormal.checked,ativo=Ativo.checked;if(!nome||!cnh||!valCnh||!normal||!ativo){msg("Campos obrigatórios: Nome, CNH, Validade CNH, Normal e Ativo.","erro");return}try{if(await existeRegistro("motoristas","CNH",cnh,modoEdicao?editId:null)){msg("Duplicidade bloqueada: já existe motorista com esta CNH.","erro");return}const categorias=[];document.querySelectorAll("input[name='CategoriasAutorizadas']:checked").forEach(c=>categorias.push(c.value));const dados={Ativo:ativo,CNH:cnh,CategoriasAutorizadas:categorias,Nome:nome,NomeBusca:nome,Val_CNH:dataParaTimestamp(valCnh),AtualizadoEm:serverTimestamp()};if(modoEdicao&&editColecao==="motoristas"){await updateDoc(doc(db,"motoristas",editId),dados);msg("Motorista atualizado com sucesso.")}else{await addDoc(collection(db,"motoristas"),{...dados,CriadoEm:serverTimestamp()});msg("Motorista cadastrado com sucesso.")}formCadastro.reset();Ativo.checked=true;catNormal.checked=true;setModoEdicao(false)}catch(e){console.error(e);msg("Erro ao salvar motorista no Firebase.","erro")}}
async function salvarSeguranca(){limparMsg();msg("Cadastro de seguranca usa Firebase Auth e nao salva senha no Firestore. Use cad_segurancas.html.","erro");}
async function salvarVeiculo(){limparMsg();if(isConsulta()){msg('Perfil CONSULTA não possui permissão para salvar veículo.','erro');return;}const nome=upper(texto("Nome")),placa=upper(texto("Placa")),cor=texto("Cor"),categoria=texto("CategoriaUso"),kmAtual=numero("KmAtualCadastro"),kmOleo=numero("KmTrocaOleo"),dataOleo=texto("DataTrocaOleo"),ativo=Ativo.checked;if(!nome||!placa||!cor||!categoria||kmAtual===null||kmOleo===null||!dataOleo||!ativo){msg("Todos os campos são obrigatórios, exceto Restrito.","erro");return}if(kmOleo>kmAtual+5000){msg("Observação: KM da próxima troca está mais de 5.000 km à frente do KM atual. Confira o valor.","warn")}try{if(await existeRegistro("veiculos","Placa",placa,modoEdicao?editId:null)){msg("Duplicidade bloqueada: já existe veículo com esta placa.","erro");return}const dados={Ativo:ativo,CategoriaUso:categoria,Cor:cor,DataTrocaOleo:dataParaTimestamp(dataOleo),KmAtualCadastro:kmAtual,KmTrocaOleo:kmOleo,Nome:nome,NomeBusca:nome,Placa:placa,Restrito:bool("Restrito"),AtualizadoEm:serverTimestamp()};if(modoEdicao&&editColecao==="veiculos"){await updateDoc(doc(db,"veiculos",editId),dados);await registrarAuditoria("ALTERACAO_VEICULO","veiculos",editId,{ativo,placa,restrito:bool("Restrito")});msg("Veículo atualizado com sucesso.")}else{const novo=await addDoc(collection(db,"veiculos"),{...dados,DestinoAtual:"",EmTransito:false,MotoristaAtual:"",UltimaEntradaEm:null,UltimaSaidaEm:null,CriadoEm:serverTimestamp()});await registrarAuditoria("CRIACAO_VEICULO","veiculos",novo.id,{ativo,placa,restrito:bool("Restrito")});msg("Veículo cadastrado com sucesso.")}formCadastro.reset();Ativo.checked=true;setModoEdicao(false)}catch(e){console.error(e);msg("Erro ao salvar veículo no Firebase.","erro")}}
async function consultarMotorista(){limparMsg();limparResultado();setModoEdicao(false);const termo=texto("BuscaMotorista"),tipo=texto("TipoBuscaMotorista");if(!termo){msg("Informe Nome ou CNH para consultar.","warn");return}try{resultadosCache=tipo==="CNH"?await buscarExato("motoristas","CNH",termo,10):await buscarPrefixo("motoristas","NomeBusca",termo,10);if(!resultadosCache.length){msg("Nenhum motorista encontrado.","warn");return}mostrarResultado(resultadosCache.map(renderMotorista).join(""))}catch(e){console.error(e);msg("Erro ao consultar motorista. Talvez falte NomeBusca em cadastros antigos.","erro")}}
async function consultarSeguranca(){limparMsg();limparResultado();setModoEdicao(false);const termo=texto("BuscaSeguranca"),tipo=texto("TipoBuscaSeguranca");if(!termo){msg("Informe Nome ou E-mail para consultar.","warn");return}try{resultadosCache=tipo==="Email"?await buscarExato("segurancas","Email",lower(termo),10):await buscarPrefixo("segurancas","NomeBusca",termo,10);if(!resultadosCache.length){msg("Nenhum segurança encontrado.","warn");return}mostrarResultado(resultadosCache.map(renderSeguranca).join(""))}catch(e){console.error(e);msg("Erro ao consultar segurança. Talvez falte NomeBusca em cadastros antigos.","erro")}}
async function consultarVeiculo(){limparMsg();limparResultado();setModoEdicao(false);const termo=upper(texto("BuscaPlaca"));if(!termo){msg("Informe nome, modelo ou placa para consultar.","warn");return}try{const porNome=await buscarPrefixo("veiculos","NomeBusca",termo,10);const porPlaca=await buscarExato("veiculos","Placa",termo,10);const mapa=new Map();[...porNome,...porPlaca].forEach(item=>mapa.set(item.id,item));resultadosCache=[...mapa.values()].slice(0,10);if(!resultadosCache.length){msg("Nenhum veiculo encontrado.","warn");return}mostrarResultado(resultadosCache.map(renderVeiculo).join(""))}catch(e){console.error(e);msg("Erro ao consultar veiculo no Firebase.","erro")}}
Object.assign(window,{salvarMotorista,salvarSeguranca,salvarVeiculo,consultarMotorista,consultarSeguranca,consultarVeiculo,editarMotorista,editarSeguranca,editarVeiculo,cancelarEdicao});
window.addEventListener('load', aplicarPerfilConsulta);
</script></body></html>
