<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Entrada Visitante — Delta</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="header-top">
    <i class="fa-solid fa-person-walking-luggage"></i>
    <h2>Entrada de Visitantes</h2>
    <p>DELTA BIOCOMBUSTIVEIS</p>
  </div>

  <div class="sessao">
    <div class="sessao-box">Segurança logado: <strong id="sessaoSegurancaTopo" style="color:#e6edf7;">...</strong></div>
  </div>

  <div class="form-container">
    <div class="field">
      <label for="cpf">CPF (apenas números)</label>
      <div class="input-group"><i class="fa-solid fa-id-card"></i><input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" oninput="onCpfInput()"></div>
      <div class="sugestoes" id="sugestoes_cpf" style="display:none;"></div>
    </div>
    <div class="field">
      <label for="nome">Nome Completo</label>
      <div class="input-group"><i class="fa-solid fa-user"></i><input type="text" id="nome" placeholder="Nome do visitante" oninput="onAnyInput()"></div>
    </div>
    <div class="field">
      <label for="telefone">Telefone/Contato</label>
      <div class="input-group"><i class="fa-solid fa-phone"></i><input type="text" id="telefone" maxlength="15" placeholder="(67) 99999-9999" oninput="onTelefoneInput()"></div>
    </div>
    <div class="field">
      <label for="responsavel">Responsável na Empresa</label>
      <div class="input-group"><i class="fa-solid fa-user-group"></i><input type="text" id="responsavel" placeholder="Quem irá receber?" list="lista_responsaveis" oninput="onAnyInput()"></div>
      <datalist id="lista_responsaveis"></datalist>
    </div>
    <button class="btn-save" id="btnSalvar" onclick="salvarEntrada()">Registrar Entrada</button>
    <div id="msg"></div>
  </div>

  <div class="footer-action">
    <a href="visitantes.html" class="btn-back" id="btnVoltarMenu"><i class="fa-solid fa-chevron-left"></i> Voltar ao Menu Principal</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      orderBy,
      limit,
      addDoc,
      serverTimestamp,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
      authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
      projectId: "cuiaba-01617931-f126e",
      storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
      messagingSenderId: "797115279316",
      appId: "1:797115279316:web:f229366de16d4e066e1841"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const STORAGE_KEY = 'delta_auth_firebase_v1';
    const STORAGE_KEY_LEGADO = 'delta_auth_v1';

    let inFlight = false;
    let cacheVisitantes = [];
    let cacheResponsaveis = [];
    let AUTH = null;

    function getAuth() {
      try {
        return JSON.parse(
          localStorage.getItem(STORAGE_KEY) ||
          localStorage.getItem(STORAGE_KEY_LEGADO) ||
          'null'
        );
      } catch(_) {
        return null;
      }
    }

    function clearAuth() {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_KEY_LEGADO);
    }

    function nomeAuth(auth){
      return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || '';
    }

    function perfilAuth(auth){
      return String(auth?.Perfil || auth?.perfil || '').trim().toUpperCase();
    }

    function sessaoValidaLocal(auth){
      if(!auth) return false;
      if(!nomeAuth(auth)) return false;
      if(!perfilAuth(auth)) return false;
      if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
      return true;
    }

    async function validarSessaoOuRedirecionar() {
      const auth = getAuth();

      if(!sessaoValidaLocal(auth)){
        clearAuth();
        location.href='index.html';
        return null;
      }

      return {
        ...auth,
        seguranca: nomeAuth(auth),
        Perfil: perfilAuth(auth)
      };
    }

    function somenteNumeros(v){
      return String(v || '').replace(/\D/g,'');
    }

    function mascaraCPF(v){
      v = somenteNumeros(v).slice(0,11);
      v = v.replace(/(\d{3})(\d)/,'$1.$2');
      v = v.replace(/(\d{3})(\d)/,'$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
      return v;
    }

    function mascaraTelefone(v){
      v = somenteNumeros(v).slice(0,11);
      if(v.length <= 10){
        v = v.replace(/(\d{2})(\d)/,'($1) $2');
        v = v.replace(/(\d{4})(\d)/,'$1-$2');
      }else{
        v = v.replace(/(\d{2})(\d)/,'($1) $2');
        v = v.replace(/(\d{5})(\d)/,'$1-$2');
      }
      return v;
    }

    function esc(v){
      return String(v == null ? '' : v)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function setMsg(texto, cor){
      const msg = document.getElementById('msg');
      msg.style.color = cor || 'var(--text-soft)';
      msg.innerText = texto || '';
    }

    function onTelefoneInput(){
      const el = document.getElementById('telefone');
      el.value = mascaraTelefone(el.value);
      onAnyInput();
    }

    function onAnyInput() {
      const btn = document.getElementById('btnSalvar');
      const nome = document.getElementById('nome').value.trim();
      const responsavel = document.getElementById('responsavel').value.trim();
      btn.classList.toggle('ready', nome.length > 2 && responsavel.length > 1 && !inFlight);
    }

    function onCpfInput() {
      const cpfEl = document.getElementById('cpf');
      cpfEl.value = mascaraCPF(cpfEl.value);

      const cpfLimpo = somenteNumeros(cpfEl.value);
      const container = document.getElementById('sugestoes_cpf');

      if (cpfLimpo.length < 3) {
        container.style.display = 'none';
        onAnyInput();
        return;
      }

      const sugestoes = cacheVisitantes.filter(v => somenteNumeros(v.cpf).includes(cpfLimpo));

      if (sugestoes.length === 0) {
        container.style.display = 'none';
        onAnyInput();
        return;
      }

      container.innerHTML = sugestoes
        .slice(0,8)
        .map((s,idx) => `
          <div class="sugestao-item" onclick="preencherForm(${idx})">
            ${esc(s.nome)} (${esc(s.cpf || '-')})
          </div>
        `).join('');

      window.__sugestoesAtuais = sugestoes.slice(0,8);
      container.style.display = 'block';
      onAnyInput();
    }

    function preencherForm(idx) {
      const visitante = (window.__sugestoesAtuais || [])[idx];
      if (!visitante) return;

      document.getElementById('cpf').value = mascaraCPF(visitante.cpf || '');
      document.getElementById('nome').value = visitante.nome || '';
      document.getElementById('telefone').value = mascaraTelefone(visitante.telefone || '');
      document.getElementById('sugestoes_cpf').style.display = 'none';

      onAnyInput();
    }

    async function visitanteEmAberto(cpf){
      const cpfFormatado = mascaraCPF(cpf);
      const qAberto = query(
        collection(db,'visitantes'),
        where('cpf','==',cpfFormatado),
        where('status','==','EM_VISITA'),
        limit(1)
      );

      const snap = await getDocs(qAberto);
      return !snap.empty;
    }

    async function salvarEntrada() {
      if (inFlight) return;

      const btn = document.getElementById('btnSalvar');
      if (!btn.classList.contains('ready')) return;

      const cpf = mascaraCPF(document.getElementById('cpf').value);
      const telefone = mascaraTelefone(document.getElementById('telefone').value);
      const nome = document.getElementById('nome').value.trim().toUpperCase();
      const responsavel = document.getElementById('responsavel').value.trim().toUpperCase();

      if(!nome || nome.length < 3){
        setMsg('Informe o nome do visitante.', 'var(--red)');
        return;
      }

      if(!responsavel || responsavel.length < 2){
        setMsg('Informe o responsável na empresa.', 'var(--red)');
        return;
      }

      inFlight = true;
      btn.classList.remove('ready');
      setMsg('Registrando entrada no Firebase...', 'var(--text-soft)');

      try {
        if(cpf && somenteNumeros(cpf).length === 11){
          const aberto = await visitanteEmAberto(cpf);
          if(aberto){
            throw new Error('Este CPF já possui visita em aberto. Registre a saída antes de nova entrada.');
          }
        }

        const agora = new Date();

        await addDoc(collection(db,'visitantes'), {
          cpf: cpf,
          nome: nome,
          telefone: telefone,
          responsavel: responsavel,
          status: 'EM_VISITA',
          dataEntrada: Timestamp.fromDate(agora),
          dataSaida: null,
          dataReferencia: Timestamp.fromDate(new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 12, 0, 0)),
          tempoPermanenciaMin: 0,
          segurancaEntrada: AUTH.seguranca || AUTH.Nome || '---',
          segurancaSaida: '',
          criadoEm: serverTimestamp(),
          atualizadoEm: null,
          origem: 'Entrada_visitante.html'
        });

        setMsg('Entrada registrada com sucesso!', 'var(--green)');

        setTimeout(() => {
          location.href = 'visitantes.html';
        }, 1200);

      } catch (e) {
        console.error(e);
        setMsg(e.message || 'Falha ao salvar no Firebase.', 'var(--red)');
        inFlight = false;
        onAnyInput();
      }
    }

    async function carregarDadosIniciais(){
      try{
        const snap = await getDocs(query(collection(db,'visitantes'), orderBy('dataEntrada','desc'), limit(300)));

        const todos = snap.docs.map(d => ({ id:d.id, ...d.data() }));

        const mapaCpf = new Map();
        const setResponsaveis = new Set();

        todos.forEach(v => {
          if(v.cpf && !mapaCpf.has(v.cpf)){
            mapaCpf.set(v.cpf, {
              cpf: v.cpf || '',
              nome: v.nome || '',
              telefone: v.telefone || ''
            });
          }

          if(v.responsavel){
            setResponsaveis.add(v.responsavel);
          }
        });

        cacheVisitantes = Array.from(mapaCpf.values());
        cacheResponsaveis = Array.from(setResponsaveis).sort((a,b)=>a.localeCompare(b,'pt-BR'));

        const datalist = document.getElementById('lista_responsaveis');
        datalist.innerHTML = cacheResponsaveis.map(r => `<option value="${esc(r)}"></option>`).join('');

      }catch(e){
        console.error(e);
        setMsg('Falha ao carregar histórico de visitantes.', 'var(--red)');
      }
    }

    window.onAnyInput = onAnyInput;
    window.onCpfInput = onCpfInput;
    window.onTelefoneInput = onTelefoneInput;
    window.preencherForm = preencherForm;
    window.salvarEntrada = salvarEntrada;

    window.onload = async function() {
      AUTH = await validarSessaoOuRedirecionar();
      if (!AUTH) return;

      document.getElementById('sessaoSegurancaTopo').textContent = AUTH.seguranca || '---';

      document.getElementById('btnVoltarMenu').addEventListener('click', e => {
        e.preventDefault();
        location.href = 'visitantes.html';
      });

      await carregarDadosIniciais();
      onAnyInput();
    };
  </script>
</body>
</html>
