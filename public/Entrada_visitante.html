```html id="s4e5bw"
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Entrada Visitante - Delta Cuiabá</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
  --bg1:#061427;
  --bg2:#0b1b33;

  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);

  --text-main:#e6edf7;
  --text-soft:#9fb4d3;

  --accent:#22c55e;
  --alert:#ef4444;
  --warn:#ffb020;

  --blue:#7dd3fc;

  --shadow:0 12px 28px rgba(0,0,0,.35);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text-main);

  min-height:100vh;

  display:flex;
  flex-direction:column;
  align-items:center;

  position:relative;
  overflow-x:hidden;
}

body::after{
  content:"";
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:220px;
  pointer-events:none;

  background:linear-gradient(
    to top,
    rgba(34,197,94,.42) 0%,
    rgba(34,197,94,.20) 35%,
    rgba(34,197,94,.08) 58%,
    rgba(34,197,94,0) 100%
  );

  z-index:-1;
}

.hero-header{
  width:100%;
  height:180px;

  background:
    linear-gradient(180deg,rgba(6,20,39,.18),rgba(6,20,39,.65)),
    url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1600')
    center/cover no-repeat;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;
}

.hero-content{
  width:100%;
  max-width:520px;
  margin-top:-16px;
}

.hero-content i{
  font-size:26px;
  color:var(--accent);
  margin-bottom:8px;
}

.hero-content h2{
  margin:0;

  font-size:27px;
  font-weight:900;
  letter-spacing:.4px;

  color:#fff;

  text-shadow:
    0 0 8px rgba(34,197,94,.5),
    0 0 18px rgba(34,197,94,.25);
}

.hero-content p{
  margin:8px 0 0;

  font-size:14px;
  color:#dbeafe;
  font-weight:800;
}

.session-wrap{
  width:100%;
  max-width:520px;

  padding:0 20px;

  margin-top:-14px;
  margin-bottom:18px;

  z-index:2;
}

.session-box{
  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.10);

  border-radius:18px;

  padding:12px 14px;

  box-shadow:var(--shadow);

  font-size:13px;
  color:#9fb4d3;

  text-align:center;
}

.session-box strong{
  color:#dbeafe;
}

.form-container{
  width:100%;
  max-width:520px;

  padding:0 20px 12px;
}

.card-form{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:22px;

  padding:22px;

  box-shadow:var(--shadow);
}

.field{
  margin-bottom:15px;
  position:relative;
}

label{
  display:block;

  margin-bottom:7px;

  font-size:12px;
  font-weight:900;

  color:#cbd5e1;

  text-transform:uppercase;
  letter-spacing:.7px;
}

.input-group{
  display:flex;
  align-items:center;
  gap:10px;

  background:rgba(255,255,255,.04);

  border:1px solid var(--border);

  border-radius:16px;

  padding:0 13px;

  transition:.25s;
}

/* ÍCONES = MESMA COR DOS PLACEHOLDERS */
.input-group i{
  color:var(--blue);

  width:18px;

  text-align:center;
}

.input-group input{
  flex:1;
  min-width:0;

  border:none;

  background:transparent;

  color:#fff;

  padding:15px 0;

  font-size:16px;

  outline:none;

  text-transform:uppercase;
}

/* PLACEHOLDER AZUL */
.input-group input::placeholder{
  color:var(--blue);

  opacity:.95;

  text-transform:none;
}

.input-group:focus-within{
  border-color:var(--blue);

  box-shadow:0 0 0 3px rgba(125,211,252,.10);
}

.sugestoes{
  position:absolute;

  top:100%;
  left:0;
  right:0;

  z-index:20;

  margin-top:6px;

  border:1px solid var(--border);

  border-radius:16px;

  background:#071426;

  overflow:hidden;

  box-shadow:var(--shadow);
}

.sugestao-item{
  padding:12px 14px;

  border-bottom:1px solid rgba(255,255,255,.08);

  color:var(--text-main);

  cursor:pointer;

  font-weight:800;
  font-size:13px;
}

.sugestao-item:last-child{
  border-bottom:none;
}

.sugestao-item:hover{
  background:rgba(34,197,94,.12);
}

.btn-save{
  width:100%;
  min-height:56px;

  border:none;

  border-radius:18px;

  padding:16px 18px;

  background:rgba(255,255,255,.08);

  color:#7388a8;

  font-size:16px;
  font-weight:900;

  cursor:not-allowed;

  transition:.25s;
}

.btn-save.ready{
  background:var(--accent);

  color:#061427;

  cursor:pointer;
}

.btn-save.ready:hover{
  transform:translateY(-2px);

  box-shadow:0 0 18px rgba(34,197,94,.20);
}

#msg{
  min-height:22px;

  margin-top:14px;

  font-size:13px;
  font-weight:900;

  text-align:center;

  color:var(--text-soft);
}

.footer-action{
  width:100%;
  max-width:520px;

  padding:0 20px 36px;
}

.btn-back{
  width:100%;
  min-height:56px;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:20px;

  color:var(--text-soft);

  text-decoration:none;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  font-weight:900;

  box-shadow:var(--shadow);

  transition:.25s;
}

.btn-back:hover{
  transform:translateY(-2px);

  border-color:rgba(125,211,252,.35);

  color:#fff;
}

@media(max-width:560px){

  .hero-header{
    height:160px;
  }

  .hero-content h2{
    font-size:23px;
  }

  .card-form{
    padding:18px;
  }
}

</style>
</head>

<body>

<div class="hero-header">

  <div class="hero-content">

    <i class="fa-solid fa-person-walking-luggage"></i>

    <h2>Entrada de Visitantes</h2>

    <p>DELTA CUIABA MT</p>

  </div>

</div>

<div class="session-wrap">

  <div class="session-box">

    Segurança logado:
    <strong id="sessaoSegurancaTopo">...</strong>

  </div>

</div>

<div class="form-container">

  <div class="card-form">

    <div class="field">

      <label for="cpf">CPF</label>

      <div class="input-group">

        <i class="fa-solid fa-id-card"></i>

        <input
          type="text"
          id="cpf"
          maxlength="14"
          placeholder="000.000.000-00"
        >

      </div>

    </div>

    <div class="field">

      <label for="nome">Nome Completo *</label>

      <div class="input-group">

        <i class="fa-solid fa-user"></i>

        <input
          type="text"
          id="nome"
          placeholder="Nome do visitante"
        >

      </div>

    </div>

    <div class="field">

      <label for="telefone">Telefone / Contato</label>

      <div class="input-group">

        <i class="fa-solid fa-phone"></i>

        <input
          type="text"
          id="telefone"
          maxlength="15"
          placeholder="(67) 99999-9999"
        >

      </div>

    </div>

    <div class="field">

      <label for="responsavel">Responsável na Empresa *</label>

      <div class="input-group">

        <i class="fa-solid fa-user-group"></i>

        <input
          type="text"
          id="responsavel"
          placeholder="Selecione ou digite o responsável"
        >

      </div>

    </div>

    <button class="btn-save ready">
      Registrar Entrada
    </button>

    <div id="msg">
      Preencha nome e responsável para liberar o registro.
    </div>

  </div>

</div>

<div class="footer-action">

  <a href="visitantes.html" class="btn-back">

    <i class="fa-solid fa-chevron-left"></i>

    Voltar ao Menu Principal

  </a>

</div>

</body>
</html>
```
