<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Cadastro de Motoristas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg1:#0b1220;--bg2:#0b0f17;--card:#0b1221;--border:#1d2940;--text:#e6edf7;--muted:#9fb0cc;--accent:#ef4444;--danger:#ff4d4f;--warn:#ffb020;--shadow:0 24px 64px rgba(0,0,0,.45)}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;background:radial-gradient(900px 360px at -10% -10%,#ef44441f 0%,transparent 60%),radial-gradient(900px 360px at 120% -20%,#06b6d41f 0%,transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
.wrap{width:100%;max-width:680px;margin:0 auto;padding:30px 16px}
.cad-top-actions{display:grid;grid-template-columns:54px minmax(0,1fr) 54px;align-items:center;gap:10px;margin:0 0 24px}
.cad-top-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:.2s ease}
.cad-top-btn:hover{transform:translateY(-2px);border-color:#b91c1c;box-shadow:0 10px 30px rgba(0,0,0,.28),0 0 12px rgba(239,68,68,.12)}
.cad-top-btn-danger{justify-self:end;color:#fecaca;background:rgba(255,77,79,.10);border-color:rgba(255,77,79,.28)}
.head{text-align:center;margin-bottom:22px}
.cad-top-actions .head{margin:0}
.chip{display:inline-flex;padding:6px 14px;border-radius:99px;border:1px solid var(--border);color:#fecaca;font-size:11px;font-weight:900;letter-spacing:1px;background:rgba(255,255,255,.03)}
.logo{margin:0;font-size:clamp(28px,6.8vw,40px);font-weight:900;font-style:italic;line-height:1}
.logo span{display:block;color:#ff4d4d}
.tagline{margin-top:14px;font-size:10px;font-weight:900;letter-spacing:4px;color:var(--muted);opacity:.7}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.card-title{margin:0 0 14px;font-size:18px;font-weight:900;text-align:center}
.field{margin-bottom:14px}
label{display:block;margin-bottom:7px;font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
input,select{width:100%;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.04);color:var(--text);padding:15px;font-size:16px;outline:none}
select option{color:#111}
input:focus,select:focus{border-color:#dc2626;box-shadow:0 0 0 3px rgba(239,68,68,.10)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.checkline{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.03)}
.checkline input{width:auto}
.checkline label{margin:0;color:var(--text);text-transform:none;letter-spacing:0}
.btn{width:100%;border:none;border-radius:18px;padding:16px 18px;font-size:16px;font-weight:900;cursor:pointer;text-decoration:none;display:flex;justify-content:center;align-items:center;margin-top:12px;transition:.2s ease;color:var(--text)}
.btn:hover{transform:translateY(-2px);border-color:#b91c1c;box-shadow:0 10px 30px rgba(0,0,0,.28),0 0 12px rgba(239,68,68,.12)}
.btn-primary{background:var(--accent);color:#08131f}
.btn-light{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--border)}
.btn-warn{background:rgba(255,176,32,.14);color:#ffd27a;border:1px solid rgba(255,176,32,.35)}
.msg{display:none;margin-top:14px;padding:13px;border-radius:14px;font-weight:900;text-align:center}
.msg.ok{display:block;color:#fecaca;background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.25)}
.msg.erro{display:block;color:#fff;background:rgba(255,77,79,.18);border:1px solid rgba(255,77,79,.35)}
.msg.warn{display:block;color:#ffd27a;background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35)}
.result{margin-top:14px;border:1px solid var(--border);border-radius:18px;overflow:hidden;display:none}
.result-item{padding:14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03)}
.result-item:last-child{border-bottom:none}
.result-title{font-weight:900;font-size:15px}
.result-sub{color:var(--muted);font-size:13px;margin-top:4px;line-height:1.45}
.edit-banner{display:none;margin-bottom:14px;padding:12px;border-radius:14px;color:#ffd27a;background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35);font-weight:900;text-align:center}
.consulta-box{display:none;margin-bottom:16px;padding:13px 14px;border-radius:14px;background:rgba(59,130,246,.10);border:1px solid rgba(125,211,252,.28);color:#bfdbfe;text-align:center;font-size:12px;font-weight:900;line-height:1.4}
body.perfil-consulta #tituloForm::after{content:" - SOMENTE CONSULTA";color:#7dd3fc}
body.perfil-consulta #formCadastro input,body.perfil-consulta #formCadastro select{opacity:.62}
@media(max-width:620px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="cad-top-actions">
    <a class="cad-top-btn" href="admin.html" title="Voltar" aria-label="Voltar"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="head">
      <h1 class="logo">Cadastro de<span>Motoristas</span></h1>
      <div class="tagline"># DELTA CUIABA #</div>
    </div>
    <a class="cad-top-btn cad-top-btn-danger" href="index.html" onclick="localStorage.removeItem('delta_auth_firebase_v1');localStorage.removeItem('delta_auth_v1');" title="Sair" aria-label="Sair"><i class="fa-solid fa-right-from-bracket"></i></a>
  </div>

  <div class="card">
    <h2 class="card-title">Consulta</h2>
    <div class="row">
      <div class="field">
        <label for="TipoBuscaMotorista">Tipo de busca</label>
        <select id="TipoBuscaMotorista">
          <option value="NomeBusca">Nome</option>
          <option value="CNH">CNH</option>
        </select>
      </div>
      <div class="field">
        <label for="BuscaMotorista">Consultar motorista</label>
        <input id="BuscaMotorista" placeholder="Digite nome ou CNH">
      </div>
    </div>
    <button class="btn btn-light" type="button" onclick="consultarMotorista()">Consultar</button>
    <div id="resultado" class="result"></div>
  </div>

  <div class="consulta-box" id="consultaBox">
    Perfil CONSULTA: consulta liberada. Inclusão e edição de motoristas bloqueadas.
  </div>

  <div class="card">
    <h2 class="card-title" id="tituloForm">Novo Cadastro</h2>
    <div class="edit-banner" id="editBanner">Modo edição ativo. Após alterar, clique em Atualizar.</div>

    <form id="formCadastro" onsubmit="event.preventDefault(); salvarMotorista();">
      <div class="row">
        <div class="field">
          <label for="Nome">Nome *</label>
          <input id="Nome" required placeholder="Nome do motorista">
        </div>
        <div class="field">
          <label for="CNH">CNH *</label>
          <input id="CNH" required placeholder="Número da CNH">
        </div>
      </div>

      <div class="field">
        <label for="Val_CNH">Validade CNH *</label>
        <input id="Val_CNH" type="date" required>
      </div>

      <div class="row">
        <div class="checkline">
          <input id="catNormal" name="CategoriasAutorizadas" type="checkbox" value="Normal" checked>
          <label for="catNormal">Normal</label>
        </div>
        <div class="checkline">
          <input id="catEspecial" name="CategoriasAutorizadas" type="checkbox" value="Especial">
          <label for="catEspecial">Especial</label>
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <div class="checkline">
          <input id="AcessoRestrito" type="checkbox">
          <label for="AcessoRestrito">Acesso a veículos restritos</label>
        </div>
        <div class="checkline">
          <input id="Ativo" type="checkbox" checked>
          <label for="Ativo">Ativo</label>
        </div>
      </div>

      <button class="btn btn-primary" id="btnSalvar" type="submit">Salvar</button>
      <button class="btn btn-warn" id="btnCancelarEdicao" type="button" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button>
      <a class="btn btn-light" href="admin.html">Voltar</a>
      <div id="msg" class="msg"></div>
    </form>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit,
  serverTimestamp, Timestamp, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth as getFirebaseAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain:"cuiaba-01617931-f126e.firebaseapp.com",
  projectId:"cuiaba-01617931-f126e",
  storageBucket:"cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId:"797115279316",
  appId:"1:797115279316:web:f229366de16d4e066e1841"
};

const app=initializeApp(firebaseConfig);
getFirebaseAuth(app);
const db=getFirestore(app);

const STORAGE_KEY='delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO='delta_auth_v1';

let AUTH=null;
let modoEdicao=false;
let editId=null;
let resultadosCache=[];

async function registrarAuditoria(tipo, alvoColecao, alvoId, detalhes={}){
  try{
    await addDoc(collection(db,"auditoria"),{
      tipo,
      alvoColecao,
      alvoId,
      usuarioUid: AUTH?.uid || "",
      usuarioNome: AUTH?.Nome || AUTH?.seguranca || AUTH?.nome || "",
      usuarioEmail: AUTH?.Email || AUTH?.email || "",
      usuarioPerfil: AUTH?.Perfil || AUTH?.perfil || "",
      origem: "cad_motoristas.html",
      detalhes,
      criadoEm: serverTimestamp()
    });
  }catch(e){
    console.warn("Falha ao registrar auditoria:", e);
  }
}

function getAuth(){
  try{
    return JSON.parse(
      localStorage.getItem(STORAGE_KEY) ||
      localStorage.getItem(STORAGE_KEY_LEGADO) ||
      'null'
    );
  }catch(_){
    return null;
  }
}

function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
}

function nomeAuth(auth){
  return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || auth?.email || '';
}

function perfilAuth(auth){
  return String(auth?.Perfil || auth?.perfil || auth?.tipo || auth?.Tipo || 'OPERADOR').trim().toUpperCase();
}

function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return !!nomeAuth(auth);
}

function isConsulta(){
  return perfilAuth(AUTH) === 'CONSULTA';
}

function aplicarPerfilConsulta(){
  AUTH = getAuth();

  if(!sessaoValidaLocal(AUTH)){
    clearAuth();
    location.href='index.html';
    return;
  }

  if(isConsulta()){
    document.body.classList.add('perfil-consulta');

    const box=document.getElementById('consultaBox');
    const btn=document.getElementById('btnSalvar');
    const cancelar=document.getElementById('btnCancelarEdicao');

    if(box) box.style.display='block';

    if(btn){
      btn.disabled=true;
      btn.textContent='SOMENTE CONSULTA';
      btn.title='Perfil CONSULTA não possui permissão para salvar motoristas.';
    }

    if(cancelar) cancelar.style.display='none';
  }
}

function dataParaTimestamp(valor){
  if(!valor)return null;
  const p=valor.split("-");
  return Timestamp.fromDate(new Date(Number(p[0]),Number(p[1])-1,Number(p[2]),12,0,0));
}

function timestampParaData(v){
  if(!v)return "";
  const d=v.toDate?v.toDate():new Date(v);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function texto(id){
  return(document.getElementById(id)?.value||"").trim();
}

function bool(id){
  return!!document.getElementById(id)?.checked;
}

function upper(v){
  return String(v||"").trim().toUpperCase();
}

function esc(v){
  return String(v==null?"":v)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function msg(t,tipo="ok"){
  const el=document.getElementById("msg");
  if(el){el.textContent=t;el.className="msg "+tipo;}
}

function limparMsg(){
  const el=document.getElementById("msg");
  if(el){el.textContent="";el.className="msg";}
}

function limparResultado(){
  const r=document.getElementById("resultado");
  if(r){r.innerHTML="";r.style.display="none";}
}

function mostrarResultado(html){
  const r=document.getElementById("resultado");
  if(r){r.innerHTML=html;r.style.display="block";}
}

function categoriasSelecionadas(){
  const categorias=[];
  document.querySelectorAll("input[name='CategoriasAutorizadas']:checked")
    .forEach(c=>categorias.push(c.value));
  return categorias;
}

function setModoEdicao(ativo,id=null){

  if(isConsulta()){
    modoEdicao=false;
    editId=null;

    const titulo=document.getElementById("tituloForm");
    const btn=document.getElementById("btnSalvar");
    const cancelar=document.getElementById("btnCancelarEdicao");
    const banner=document.getElementById("editBanner");

    if(titulo)titulo.textContent="Novo Cadastro";

    if(btn){
      btn.disabled=true;
      btn.textContent="SOMENTE CONSULTA";
      btn.title="Perfil CONSULTA não possui permissão para salvar motoristas.";
    }

    if(cancelar)cancelar.style.display="none";
    if(banner)banner.style.display="none";
    return;
  }

  modoEdicao=ativo;
  editId=id;

  const titulo=document.getElementById("tituloForm");
  const btn=document.getElementById("btnSalvar");
  const cancelar=document.getElementById("btnCancelarEdicao");
  const banner=document.getElementById("editBanner");

  if(ativo){
    if(titulo)titulo.textContent="Editando Cadastro";
    if(btn){
      btn.textContent="Atualizar no Firebase";
      btn.disabled=false;
    }
    if(cancelar)cancelar.style.display="flex";
    if(banner)banner.style.display="block";
  }else{
    if(titulo)titulo.textContent="Novo Cadastro";
    if(btn){
      btn.textContent="Salvar no Firebase";
      btn.disabled=false;
    }
    if(cancelar)cancelar.style.display="none";
    if(banner)banner.style.display="none";
  }
}

function cancelarEdicao(){
  document.getElementById("formCadastro").reset();
  setModoEdicao(false);
  document.getElementById("Ativo").checked=true;
  document.getElementById("catNormal").checked=true;
  msg("Edição cancelada.","warn");
}

async function existeRegistro(colecao,campo,valor,ignorarId=null){
  const q=query(collection(db,colecao),where(campo,"==",valor),limit(10));
  const snap=await getDocs(q);
  return snap.docs.some(d=>d.id!==ignorarId);
}

async function buscarExato(colecao,campo,valor,max=10){
  const q=query(collection(db,colecao),where(campo,"==",valor),limit(max));
  const snap=await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function buscarPrefixo(colecao,campoBusca,termo,max=10){
  const inicio=upper(termo);
  const fim=inicio+"\uf8ff";
  const q=query(collection(db,colecao),orderBy(campoBusca),where(campoBusca,">=",inicio),where(campoBusca,"<=",fim),limit(max));
  const snap=await getDocs(q);
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

function renderMotorista(d,idx){

  const editBtn = isConsulta()
    ? ""
    : `<button class="btn btn-warn" type="button" onclick="editarMotorista(${idx})">Editar cadastro</button>`;

  return `<div class="result-item">
    <div class="result-title">${esc(d.Nome||"-")}</div>
    <div class="result-sub">
      CNH: ${esc(d.CNH||"-")}<br>
      Categorias: ${esc((d.CategoriasAutorizadas||[]).join(", ")||"-")}<br>
      Acesso restrito: ${d.AcessoRestrito?"Sim":"Não"}<br>
      Ativo: ${d.Ativo?"Sim":"Não"}
    </div>
    ${editBtn}
  </div>`;
}

function editarMotorista(idx){

  if(isConsulta()){
    msg('Perfil CONSULTA não possui permissão para editar motoristas.','warn');
    return;
  }

  const d=resultadosCache[idx];
  if(!d)return;

  document.getElementById("Nome").value=d.Nome||"";
  document.getElementById("CNH").value=d.CNH||"";
  document.getElementById("Val_CNH").value=timestampParaData(d.Val_CNH);

  const cats=d.CategoriasAutorizadas||[];
  document.getElementById("catNormal").checked=cats.includes("Normal") || cats.length===0;
  document.getElementById("catEspecial").checked=cats.includes("Especial");

  document.getElementById("AcessoRestrito").checked=!!d.AcessoRestrito;
  document.getElementById("Ativo").checked=!!d.Ativo;

  setModoEdicao(true,d.id);
  document.getElementById("formCadastro").scrollIntoView({behavior:"smooth"});
}

async function salvarMotorista(){
  limparMsg();

  if(isConsulta()){
    msg('Perfil CONSULTA não possui permissão para salvar motoristas.','erro');
    return;
  }

  const nome=upper(texto("Nome"));
  const cnh=texto("CNH");
  const valCnh=texto("Val_CNH");
  const ativo=bool("Ativo");
  const categorias=categoriasSelecionadas();

  if(!nome || !cnh || !valCnh || categorias.length===0){
    msg("Campos obrigatórios: Nome, CNH, Validade CNH e pelo menos uma categoria.","erro");
    return;
  }

  try{
    if(await existeRegistro("motoristas","CNH",cnh,modoEdicao?editId:null)){
      msg("Duplicidade bloqueada: já existe motorista com esta CNH.","erro");
      return;
    }

    const dados={
      Ativo:ativo,
      CNH:cnh,
      CategoriasAutorizadas:categorias,
      Nome:nome,
      NomeBusca:nome,
      Val_CNH:dataParaTimestamp(valCnh),
      AcessoRestrito:bool("AcessoRestrito"),
      AtualizadoEm:serverTimestamp()
    };

    if(modoEdicao){
      await updateDoc(doc(db,"motoristas",editId),dados);
      await registrarAuditoria("ALTERACAO_MOTORISTA","motoristas",editId,{
        ativo,
        categorias
      });
      msg("Motorista atualizado com sucesso.");
    }else{
      const novo = await addDoc(collection(db,"motoristas"),{...dados,CriadoEm:serverTimestamp()});
      await registrarAuditoria("CRIACAO_MOTORISTA","motoristas",novo.id,{
        ativo,
        categorias
      });
      msg("Motorista cadastrado com sucesso.");
    }

    document.getElementById("formCadastro").reset();
    document.getElementById("Ativo").checked=true;
    document.getElementById("catNormal").checked=true;
    setModoEdicao(false);
    limparResultado();
  }catch(e){
    console.error(e);
    msg("Erro ao salvar motorista no Firebase.","erro");
  }
}

async function consultarMotorista(){
  limparMsg();
  limparResultado();
  setModoEdicao(false);

  const termo=texto("BuscaMotorista");
  const tipo=texto("TipoBuscaMotorista");

  if(!termo){
    msg("Informe Nome ou CNH para consultar.","warn");
    return;
  }

  try{
    resultadosCache=tipo==="CNH"
      ? await buscarExato("motoristas","CNH",termo,10)
      : await buscarPrefixo("motoristas","NomeBusca",termo,10);

    if(!resultadosCache.length){
      msg("Nenhum motorista encontrado.","warn");
      return;
    }

    mostrarResultado(resultadosCache.map(renderMotorista).join(""));
  }catch(e){
    console.error(e);
    msg("Erro ao consultar motorista. Talvez falte NomeBusca em cadastros antigos.","erro");
  }
}

Object.assign(window,{salvarMotorista,consultarMotorista,editarMotorista,cancelarEdicao});

window.addEventListener('load', aplicarPerfilConsulta);
</script>
</body>
</html>
