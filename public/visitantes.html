<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Frota Pro — Gestão de Visitantes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="hero-header">
    <div class="hero-content">
      <span class="badge">Acesso Controlado</span>
      <h2>Portaria Visitantes</h2>
      <p>Delta Biocombustíveis</p>
    </div>
  </div>

  <div style="width:90%;max-width:400px;margin:-18px 0 18px 0;">
    <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <div style="font-size:13px;color:#9fb4d3;">
        Logado como: <strong id="sessaoSeguranca" style="color:#e6edf7;">...</strong>
      </div>
      <button onclick="logoutSistema()" style="background:#0b1a30;border:1px solid rgba(255,255,255,0.12);color:#e6edf7;padding:10px 12px;border-radius:12px;font-weight:700;cursor:pointer;">Sair</button>
    </div>
  </div>

  <div class="card">
    <div class="menu-grid">
      <a href="Entrada_visitante.html" class="btn-nav btn-entrada">
        <i class="fa-solid fa-user-plus"></i> REGISTRAR ENTRADA
      </a>
      <a href="Saida_visitante.html" class="btn-nav btn-saida">
        <i class="fa-solid fa-user-minus"></i> REGISTRAR SAÍDA
      </a>
    </div>

    <a href="index.html" class="btn-back" id="btnMenuPrincipal">
      <i class="fa-solid fa-house"></i> Menu Principal
    </a>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';
const LOG_ID_KEY = 'delta_log_acesso_id_v1';
const LOG_INICIO_KEY = 'delta_log_acesso_inicio_v1';

function getAuth() {
  try {
    return JSON.parse(
      localStorage.getItem(STORAGE_KEY) ||
      localStorage.getItem(STORAGE_KEY_LEGADO) ||
      'null'
    );
  } catch(_) {
    return null;
  }
}

function clearAuth() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
  localStorage.removeItem(LOG_ID_KEY);
  localStorage.removeItem(LOG_INICIO_KEY);
}

function nomeAuth(auth){
  return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || '';
}

function perfilAuth(auth){
  return String(auth?.Perfil || auth?.perfil || '').trim().toUpperCase();
}

function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(!nomeAuth(auth)) return false;
  if(!perfilAuth(auth)) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return true;
}

async function validarSessaoOuRedirecionar(){
  const auth = getAuth();

  if(!sessaoValidaLocal(auth)){
    clearAuth();
    location.href = 'index.html';
    return null;
  }

  return {
    ...auth,
    seguranca: nomeAuth(auth),
    Perfil: perfilAuth(auth)
  };
}

async function registrarLogout(statusFinal='FINALIZADA'){
  try{
    const logId = localStorage.getItem(LOG_ID_KEY);
    const inicioMs = Number(localStorage.getItem(LOG_INICIO_KEY) || 0);

    if(!logId) return;

    const fimMs = Date.now();
    const tempoMin = inicioMs ? Math.max(0, Math.round((fimMs - inicioMs) / 60000)) : null;

    await updateDoc(doc(db,'logs_acesso',logId), {
      logoutEm: serverTimestamp(),
      logoutMs: fimMs,
      tempoConectadoMin: tempoMin,
      status: statusFinal,
      atualizadoEm: serverTimestamp()
    });

  }catch(e){
    console.error('Erro ao registrar logout:', e);
  }
}

window.logoutSistema = async function(){
  await registrarLogout('FINALIZADA');
  clearAuth();
  location.href = 'index.html';
};

window.onload = async function(){
  const auth = await validarSessaoOuRedirecionar();
  if(!auth) return;

  const el = document.getElementById('sessaoSeguranca');
  if(el) el.textContent = (auth.seguranca || '---') + ' - ' + (auth.Perfil || '');

  const btn = document.getElementById('btnMenuPrincipal');
  if(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault();
      location.href = 'index.html';
    });
  }
};
</script>

</body>
</html>
