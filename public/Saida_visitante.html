<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Saída Visitante — Delta</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="header-top">
    <i class="fa-solid fa-person-walking-arrow-right"></i>
    <h2>Saída de Visitantes</h2>
    <p>DELTA BIOCOMBUSTIVEIS</p>
  </div>

  <div class="sessao">
    <div class="sessao-box">Segurança logado: <strong id="sessaoSegurancaTopo" style="color:#e6edf7;">...</strong></div>
  </div>

  <div class="container">
    <div id="lista_ativos">
      <div style="text-align:center; padding:40px; opacity:0.5;">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <span style="display:block; margin-top:10px; font-size:12px">Sincronizando com a portaria...</span>
      </div>
    </div>
    <div id="msg_status"></div>
  </div>

  <div class="footer-action">
    <a href="visitantes.html" class="btn-back" id="btnVoltarMenu">
      <i class="fa-solid fa-chevron-left"></i>
      Voltar ao Menu Principal
    </a>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxo8EEnDKeZrd6EszuumEqnEV0TUtnB6gUqa1DnVGr_XbLtNXIkIjM5UicqakEF8RO7rA/exec';
    const STORAGE_KEY = 'delta_auth_v1';
    let cacheVisitantes = [];
    let AUTH = null;

    function getAuth() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
      catch(_) { return null; }
    }
    function clearAuth() { localStorage.removeItem(STORAGE_KEY); }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cb = 'cb_' + Math.round(100000 * Math.random());
        const script = document.createElement('script');
        script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cb + '&_ts=' + Date.now();
        window[cb] = (data) => {
          try { resolve(data); }
          finally {
            delete window[cb];
            if (script.parentNode) document.body.removeChild(script);
          }
        };
        script.onerror = () => {
          try { delete window[cb]; } catch(_) {}
          if (script.parentNode) document.body.removeChild(script);
          reject(new Error('Erro de conexão'));
        };
        document.body.appendChild(script);
      });
    }

    async function validarSessaoOuRedirecionar() {
      const auth = getAuth();
      if(!auth || !auth.token) {
        location.href='index.html';
        return null;
      }
      try {
        const res = await jsonp(API_URL + '?route=validarSessao&token=' + encodeURIComponent(auth.token));
        if(res && res.ok && res.autenticado){
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ token: auth.token, seguranca: res.seguranca, expiraEm: res.expiraEm }));
          return { token: auth.token, seguranca: res.seguranca, expiraEm: res.expiraEm };
        }
      } catch(_) {}
      clearAuth();
      location.href='index.html';
      return null;
    }

    async function carregarAtivos() {
      const container = document.getElementById('lista_ativos');
      try {
        const res = await jsonp(API_URL + '?route=getVisitantesData');
        cacheVisitantes = (res.visitantes || []).filter(v => v.status === "EM VISITA");
        renderizarLista();
      } catch (e) {
        container.innerHTML = `<div style="color:var(--red); text-align:center; padding:20px;">Falha na conexão com o servidor.</div>`;
      }
    }

    function renderizarLista() {
      const container = document.getElementById('lista_ativos');
      if (cacheVisitantes.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:60px; color:var(--text-muted); font-size:14px;">
          <i class="fa-solid fa-check-circle" style="font-size:30px; margin-bottom:10px; opacity:0.3"></i><br>
          Nenhum visitante ativo.
        </div>`;
        return;
      }
      // ***** ALTERADO PARA USAR documentId *****
      container.innerHTML = cacheVisitantes.map(v => `
        <div class="visitante-item" id="item-${v.documentId}" onclick="darBaixa('${v.documentId}', '${String(v.nome).replace(/'/g, "\\'")}')">
          <div class="info">
            <b>${v.nome}</b>
            <span><i class="fa-solid fa-id-card"></i> CPF: ${v.cpf}</span>
          </div>
          <div class="btn-out-circle"><i class="fa-solid fa-door-open"></i></div>
        </div>
      `).join('');
    }

    async function darBaixa(documentId, nome) {
      if(!AUTH || !AUTH.token) return;
      if(!confirm(`Registrar saída definitiva de ${nome}?`)) return;

      const item = document.getElementById(`item-${documentId}`);
      const msg = document.getElementById('msg_status');

      if (item) item.classList.add('leaving');
      msg.style.color = "var(--green)";
      msg.innerText = `Registrando baixa no sistema...`;

      try {
        // ***** ALTERADO PARA ENVIAR documentId *****
        const dados = { documentId: documentId, tipo: 'SAIDA', token: AUTH.token, seguranca: AUTH.seguranca };
        const res = await jsonp(API_URL + '?route=salvarVisitante&data=' + encodeURIComponent(JSON.stringify(dados)));

        if(res.ok) {
          msg.innerText = `Saída confirmada com sucesso!`;
          cacheVisitantes = cacheVisitantes.filter(v => v.documentId !== documentId);
          setTimeout(() => {
            if(item) item.remove();
            if(cacheVisitantes.length === 0) renderizarLista();
            msg.innerText = "";
          }, 450);
        } else {
          throw new Error(res.message || 'Erro ao registrar saída');
        }
      } catch(e) {
        if(item) item.classList.remove('leaving');
        msg.style.color = "var(--red)";
        msg.innerText = "Erro ao processar. Tente novamente.";
      }
    }

    window.onload = async function() {
      AUTH = await validarSessaoOuRedirecionar();
      if (!AUTH) return;
      document.getElementById('sessaoSegurancaTopo').textContent = AUTH.seguranca || '---';

      const btn = document.getElementById('btnVoltarMenu');
      if (btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          location.href = 'visitantes.html';
        });
      }

      carregarAtivos();
    };
  </script>
</body>
</html>
