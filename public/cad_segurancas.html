<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Cadastro de Seguranças</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --bg1:#0b1220;
  --bg2:#0b0f17;
  --card:#0b1221;
  --border:#1d2940;
  --text:#e6edf7;
  --muted:#9fb0cc;
  --accent:#ef4444;
  --danger:#ff4d4f;
  --warn:#ffb020;
  --shadow:0 24px 64px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

html,body{
  min-height:100%;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
  background:
    radial-gradient(900px 360px at -10% -10%,#ef44441f 0%,transparent 60%),
    radial-gradient(900px 360px at 120% -20%,#06b6d41f 0%,transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:680px;
  margin:0 auto;
  padding:30px 16px;
}

.cad-top-actions{display:grid;grid-template-columns:54px minmax(0,1fr) 54px;align-items:center;gap:10px;margin:0 0 24px}
.cad-top-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:.2s ease}
.cad-top-btn:hover{transform:translateY(-2px);border-color:#b91c1c;box-shadow:0 10px 30px rgba(0,0,0,.28),0 0 12px rgba(239,68,68,.12)}
.cad-top-btn-danger{justify-self:end;color:#fecaca;background:rgba(255,77,79,.10);border-color:rgba(255,77,79,.28)}

.head{
  text-align:center;
  margin-bottom:22px;
}

.cad-top-actions .head{
  margin:0;
}

.chip{
  display:inline-flex;
  padding:6px 14px;
  border-radius:99px;
  border:1px solid var(--border);
  color:#fecaca;
  font-size:11px;
  font-weight:900;
  letter-spacing:1px;
  background:rgba(255,255,255,.03);
}

.logo{
  margin:0;
  font-size:clamp(28px,6.8vw,40px);
  font-weight:900;
  font-style:italic;
  line-height:1;
}

.logo span{
  display:block;
  color:#ff4d4d;
}

.tagline{
  margin-top:14px;
  font-size:10px;
  font-weight:900;
  letter-spacing:4px;
  color:var(--muted);
  opacity:.7;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
  overflow:hidden;
}

.card-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:900;
  text-align:center;
}

.field{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:12px;
  font-weight:900;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.7px;
}

input,select{
  width:100%;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.04);
  color:var(--text);
  padding:15px;
  font-size:16px;
  outline:none;
}

select option{
  color:#111;
}

input:focus,select:focus{
  border-color:#dc2626;
  box-shadow:0 0 0 3px rgba(239,68,68,.10);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.checkline{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.03);
}

.checkline input{
  width:auto;
}

.checkline label{
  margin:0;
  color:var(--text);
  text-transform:none;
  letter-spacing:0;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px 18px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:12px;
  transition:.2s ease;
  color:var(--text);
}

.btn:hover{
  transform:translateY(-2px);
  border-color:#b91c1c;
  box-shadow:
    0 10px 30px rgba(0,0,0,.28),
    0 0 12px rgba(239,68,68,.12);
}

.btn-primary{
  background:var(--accent);
  color:#08131f;
}

.btn-light{
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid var(--border);
}

.btn-warn{
  background:rgba(255,176,32,.14);
  color:#ffd27a;
  border:1px solid rgba(255,176,32,.35);
}

.msg{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:14px;
  font-weight:900;
  text-align:center;
}

.msg.ok{
  display:block;
  color:#fecaca;
  background:rgba(239,68,68,.10);
  border:1px solid rgba(239,68,68,.25);
}

.msg.erro{
  display:block;
  color:#fff;
  background:rgba(255,77,79,.18);
  border:1px solid rgba(255,77,79,.35);
}

.msg.warn{
  display:block;
  color:#ffd27a;
  background:rgba(255,176,32,.12);
  border:1px solid rgba(255,176,32,.35);
}

.result{
  margin-top:14px;
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  display:none;
}

.result-item{
  padding:14px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.03);
}

.result-item:last-child{
  border-bottom:none;
}

.result-title{
  font-weight:900;
  font-size:15px;
}

.result-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
  line-height:1.45;
}

.edit-banner{
  display:none;
  margin-bottom:14px;
  padding:12px;
  border-radius:14px;
  color:#ffd27a;
  background:rgba(255,176,32,.12);
  border:1px solid rgba(255,176,32,.35);
  font-weight:900;
  text-align:center;
}

.consulta-box{
  display:none;
  margin-bottom:16px;
  padding:13px 14px;
  border-radius:14px;
  background:rgba(59,130,246,.10);
  border:1px solid rgba(125,211,252,.28);
  color:#bfdbfe;
  text-align:center;
  font-size:12px;
  font-weight:900;
  line-height:1.4;
}

body.perfil-consulta #tituloForm::after{
  content:" - SOMENTE CONSULTA";
  color:#7dd3fc;
}

body.perfil-consulta #formCadastro input,
body.perfil-consulta #formCadastro select{
  opacity:.62;
}

@media(max-width:620px){
  .row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <div class="cad-top-actions">
    <a class="cad-top-btn" href="admin.html" title="Voltar" aria-label="Voltar"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="head">
      <h1 class="logo">Cadastro de<span>Seguranças</span></h1>
      <div class="tagline"># DELTA CUIABA #</div>
    </div>
    <a class="cad-top-btn cad-top-btn-danger" href="index.html" onclick="localStorage.removeItem('delta_auth_firebase_v1');localStorage.removeItem('delta_auth_v1');" title="Sair" aria-label="Sair"><i class="fa-solid fa-right-from-bracket"></i></a>
  </div>

  <div class="card">
    <h2 class="card-title">Consulta</h2>

    <div class="row">
      <div class="field">
        <label for="TipoBuscaSeguranca">Buscar por</label>
        <select id="TipoBuscaSeguranca">
          <option value="NomeBusca">Nome</option>
          <option value="Email">E-mail</option>
        </select>
      </div>

      <div class="field">
        <label for="BuscaSeguranca">Valor da busca</label>
        <input id="BuscaSeguranca" placeholder="Digite nome ou e-mail">
      </div>
    </div>

    <button class="btn btn-light" type="button" onclick="consultarSeguranca()">Consultar</button>

    <div id="resultado" class="result"></div>
  </div>

  <div class="consulta-box" id="consultaBox">
    Perfil CONSULTA: consulta liberada. Inclusão e edição de seguranças bloqueadas.
  </div>

  <div class="card">
    <h2 class="card-title" id="tituloForm">Novo Cadastro</h2>

    <div class="edit-banner" id="editBanner">
      Modo edição ativo. Após alterar, clique em Atualizar.
    </div>

    <form id="formCadastro" onsubmit="event.preventDefault(); salvarSeguranca();">

      <div class="field">
        <label for="Nome">Nome *</label>
        <input id="Nome" required placeholder="Nome do segurança">
      </div>

      <div class="field">
        <label for="Email">E-mail *</label>
        <input id="Email" type="email" required placeholder="usuario@cuiabamt.local">
      </div>

      <div class="row">
        <div class="field">
          <label for="SenhaTemporaria">Senha temporaria inicial *</label>
          <input id="SenhaTemporaria" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="Digite 6 numeros">
          <small>O operador usa esta senha somente no primeiro acesso e sera obrigado a trocar.</small>
        </div>

        <div class="field">
          <label for="Perfil">Perfil *</label>
          <select id="Perfil" required>
            <option value="">Selecione</option>
            <option value="ADMIN">ADMIN</option>
            <option value="OPERADOR">OPERADOR</option>
            <option value="CONSULTA">CONSULTA</option>
          </select>
        </div>
      </div>

      <div class="checkline">
        <input id="Ativo" type="checkbox" checked>
        <label for="Ativo">Ativo *</label>
      </div>

      <button class="btn btn-primary" id="btnSalvar" type="submit">Salvar</button>
      <button class="btn btn-warn" id="btnCancelarEdicao" type="button" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button>
      <a class="btn btn-light" href="admin.html">Voltar</a>

      <div id="msg" class="msg"></div>
    </form>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  orderBy,
  limit,
  serverTimestamp,
  doc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth as getFirebaseAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
getFirebaseAuth(app);
const db = getFirestore(app);

const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';

let AUTH = null;
let modoEdicao = false;
let editId = null;
let resultadosCache = [];

function getAuth(){
  try{
    return JSON.parse(
      localStorage.getItem(STORAGE_KEY) ||
      localStorage.getItem(STORAGE_KEY_LEGADO) ||
      'null'
    );
  }catch(_){
    return null;
  }
}

function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
}

function nomeAuth(auth){
  return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || auth?.email || '';
}

function perfilAuth(auth){
  return String(auth?.Perfil || auth?.perfil || auth?.tipo || auth?.Tipo || 'OPERADOR').trim().toUpperCase();
}

function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return !!nomeAuth(auth);
}

function isConsulta(){
  return perfilAuth(AUTH) === 'CONSULTA';
}

function isSuperAdmin(){
  return AUTH?.SuperAdmin === true;
}

function aplicarPerfilConsulta(){
  AUTH = getAuth();

  if(!sessaoValidaLocal(AUTH)){
    clearAuth();
    location.href = 'index.html';
    return;
  }

  if(isConsulta()){
    document.body.classList.add('perfil-consulta');

    const box = document.getElementById('consultaBox');
    const btn = document.getElementById('btnSalvar');
    const cancelar = document.getElementById('btnCancelarEdicao');

    if(box) box.style.display = 'block';

    if(btn){
      btn.disabled = true;
      btn.textContent = 'SOMENTE CONSULTA';
      btn.title = 'Perfil CONSULTA não possui permissão para salvar seguranças.';
    }

    if(cancelar) cancelar.style.display = 'none';
  }else if(!isSuperAdmin()){
    const box = document.getElementById('consultaBox');
    const btn = document.getElementById('btnSalvar');
    const cancelar = document.getElementById('btnCancelarEdicao');

    if(box){
      box.style.display = 'block';
      box.textContent = 'Somente SuperAdmin pode alterar usuarios. Consulta liberada.';
    }

    if(btn){
      btn.disabled = true;
      btn.textContent = 'SOMENTE SUPERADMIN';
      btn.title = 'Somente SuperAdmin pode alterar usuarios.';
    }

    if(cancelar) cancelar.style.display = 'none';
  }
}

function texto(id){
  return (document.getElementById(id)?.value || "").trim();
}

function bool(id){
  return !!document.getElementById(id)?.checked;
}

function upper(v){
  return String(v || "").trim().toUpperCase();
}

function lower(v){
  return String(v || "").trim().toLowerCase();
}

async function criarUsuarioAuth(email,password){
  const response = await fetch(
    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`,
    {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email,
        password,
        returnSecureToken: true
      })
    }
  );

  const payload = await response.json();
  if(!response.ok){
    const code = payload?.error?.message || "";
    if(code === "EMAIL_EXISTS") throw new Error("auth/email-already-in-use");
    throw new Error(code || "auth/create-failed");
  }

  return payload.localId;
}

function emailAuth(auth){
  return lower(auth?.Email || auth?.email || auth?.usuario || "");
}

function usuarioProtegido(d){
  return d?.Protegido === true || d?.CredencialPrivada === true || d?.SuperAdmin === true;
}

function podeEditarUsuarioProtegido(d){
  return !usuarioProtegido(d) || emailAuth(AUTH) === lower(d?.Email || d?.email);
}

function emailVisivel(d){
  if(usuarioProtegido(d) && !podeEditarUsuarioProtegido(d)) return "Conta protegida";
  return d.Email || d.email || "-";
}

async function registrarAuditoria(tipo, alvoId, detalhes={}){
  try{
    await addDoc(collection(db,"auditoria"),{
      tipo,
      alvoColecao: "segurancas",
      alvoId,
      usuarioUid: AUTH?.uid || "",
      usuarioNome: AUTH?.Nome || AUTH?.seguranca || AUTH?.nome || "",
      usuarioEmail: AUTH?.Email || AUTH?.email || "",
      origem: "cad_segurancas.html",
      detalhes,
      criadoEm: serverTimestamp()
    });
  }catch(e){
    console.warn("Falha ao registrar auditoria:", e);
  }
}

function esc(v){
  return String(v == null ? "" : v)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function msg(t,tipo="ok"){
  const el = document.getElementById("msg");
  if(el){
    el.textContent = t;
    el.className = "msg " + tipo;
  }
}

function limparMsg(){
  const el = document.getElementById("msg");
  if(el){
    el.textContent = "";
    el.className = "msg";
  }
}

function limparResultado(){
  const r = document.getElementById("resultado");
  if(r){
    r.innerHTML = "";
    r.style.display = "none";
  }
}

function mostrarResultado(html){
  const r = document.getElementById("resultado");
  if(r){
    r.innerHTML = html;
    r.style.display = "block";
  }
}

function setModoEdicao(ativo,id=null){
  if(isConsulta() || !isSuperAdmin()){
    modoEdicao = false;
    editId = null;

    const titulo = document.getElementById("tituloForm");
    const btn = document.getElementById("btnSalvar");
    const cancelar = document.getElementById("btnCancelarEdicao");
    const banner = document.getElementById("editBanner");

    if(titulo) titulo.textContent = "Manutencao de Usuario";
    if(btn){
      btn.disabled = true;
      btn.textContent = isConsulta() ? "SOMENTE CONSULTA" : "SOMENTE SUPERADMIN";
      btn.title = "Perfil CONSULTA não possui permissão para salvar seguranças.";
    }
    if(cancelar) cancelar.style.display = "none";
    if(banner) banner.style.display = "none";
    return;
  }

  modoEdicao = ativo;
  editId = id;

  const titulo = document.getElementById("tituloForm");
  const btn = document.getElementById("btnSalvar");
  const cancelar = document.getElementById("btnCancelarEdicao");
  const banner = document.getElementById("editBanner");
  const senhaTemporaria = document.getElementById("SenhaTemporaria");

  if(ativo){
    if(titulo) titulo.textContent = "Editando Cadastro";
    if(btn){
      btn.textContent = "Atualizar no Firebase";
      btn.disabled = false;
    }
    if(senhaTemporaria){
      senhaTemporaria.value = "";
      senhaTemporaria.disabled = true;
      senhaTemporaria.placeholder = "Use Exigir troca de senha";
    }
    if(cancelar) cancelar.style.display = "flex";
    if(banner) banner.style.display = "block";
  }else{
    if(titulo) titulo.textContent = "Manutencao de Usuario";
    if(btn){
      btn.textContent = "Cadastrar Usuario";
      btn.disabled = false;
      btn.title = "Cria o usuario no Firebase Auth com senha temporaria.";
    }
    if(senhaTemporaria){
      senhaTemporaria.value = "";
      senhaTemporaria.disabled = false;
      senhaTemporaria.placeholder = "Digite 6 numeros";
    }
    if(cancelar) cancelar.style.display = "none";
    if(banner) banner.style.display = "none";
  }
}

function cancelarEdicao(){
  document.getElementById("formCadastro").reset();
  setModoEdicao(false);

  const ativo = document.getElementById("Ativo");
  if(ativo) ativo.checked = true;

  msg("Edição cancelada.","warn");
}

async function existeRegistro(colecao,campo,valor,ignorarId=null){
  const q = query(collection(db,colecao),where(campo,"==",valor),limit(10));
  const snap = await getDocs(q);
  return snap.docs.some(d => d.id !== ignorarId);
}

async function buscarExato(colecao,campo,valor,max=10){
  const q = query(collection(db,colecao),where(campo,"==",valor),limit(max));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({id:d.id,...d.data()}));
}

async function buscarPrefixo(colecao,campoBusca,termo,max=10){
  const inicio = upper(termo);
  const fim = inicio + "\uf8ff";

  const q = query(
    collection(db,colecao),
    orderBy(campoBusca),
    where(campoBusca,">=",inicio),
    where(campoBusca,"<=",fim),
    limit(max)
  );

  const snap = await getDocs(q);
  return snap.docs.map(d => ({id:d.id,...d.data()}));
}

function renderSeguranca(d,idx){
  const protegido = usuarioProtegido(d);
  const podeEditar = isSuperAdmin() && podeEditarUsuarioProtegido(d);
  const mustChange = d.MustChangePassword === true ? "Sim" : "Nao";
  const editBtn = !podeEditar
    ? ""
    : `<button class="btn btn-warn" type="button" onclick="editarSeguranca(${idx})">Editar cadastro</button>`;
  const forcePasswordBtn = !podeEditar
    ? ""
    : `<button class="btn btn-light" type="button" onclick="exigirTrocaSenha(${idx})">Exigir troca de senha</button>`;

  return `<div class="result-item">
    <div class="result-title">${esc(d.Nome || "-")}</div>
    <div class="result-sub">
      E-mail: ${esc(emailVisivel(d))}<br>
      Perfil: ${esc(d.Perfil || "-")}<br>
      Ativo: ${d.Ativo ? "Sim" : "Não"}<br>
      Trocar senha no proximo acesso: ${mustChange}
    </div>
    ${editBtn}
    ${forcePasswordBtn}
  </div>`;
}

function editarSeguranca(idx){
  if(isConsulta()){
    msg('Perfil CONSULTA não possui permissão para editar seguranças.','warn');
    return;
  }

  const d = resultadosCache[idx];
  if(!d) return;

  if(!podeEditarUsuarioProtegido(d)){
    msg('Conta protegida. Somente o proprio usuario pode alterar esse cadastro.','erro');
    return;
  }

  Nome.value = d.Nome || "";
  Email.value = d.Email || "";
  Perfil.value = d.Perfil || "OPERADOR";
  Ativo.checked = !!d.Ativo;
  SenhaTemporaria.value = "";

  setModoEdicao(true,d.id);
  formCadastro.scrollIntoView({behavior:"smooth"});
}

async function salvarSeguranca(){
  limparMsg();

  if(!isConsulta() && !isSuperAdmin()){
    msg('Somente SuperAdmin pode alterar usuarios.','erro');
    return;
  }

  if(isConsulta() || !isSuperAdmin()){
    msg('Perfil CONSULTA não possui permissão para salvar seguranças.','erro');
    return;
  }

  const nomeOriginal = texto("Nome");
  const nomeBusca = upper(nomeOriginal);
  const email = lower(texto("Email"));
  const perfil = upper(texto("Perfil"));
  const senhaTemporaria = texto("SenhaTemporaria");
  const ativo = bool("Ativo");

  if(!nomeOriginal || !email || !perfil){
    msg("Campos obrigatórios: Nome, E-mail e Perfil.","erro");
    return;
  }

  if(!modoEdicao && !/^\d{6}$/.test(senhaTemporaria)){
    msg("Informe a senha temporaria inicial com 6 numeros.","erro");
    return;
  }

  try{
    const registroAtual = modoEdicao
      ? resultadosCache.find(item => item.id === editId)
      : null;

    if(registroAtual && usuarioProtegido(registroAtual) && !podeEditarUsuarioProtegido(registroAtual)){
      msg("Conta protegida. Somente o proprio usuario pode alterar esse cadastro.","erro");
      return;
    }

    if(modoEdicao && !registroAtual?.AuthUid){
      msg("Usuario sem vinculo Firebase Auth. Regularize pelo script seguro antes de alterar.","erro");
      return;
    }

    if(await existeRegistro("segurancas","Email",email,modoEdicao ? editId : null)){
      msg("Duplicidade bloqueada: já existe segurança com este e-mail.","erro");
      return;
    }

    const dados = {
      Ativo: ativo,
      Email: email,
      Nome: upper(nomeOriginal),
      NomeBusca: nomeBusca,
      Perfil: perfil,
      Protegido: registroAtual?.Protegido === true,
      CredencialPrivada: registroAtual?.CredencialPrivada === true,
      BloquearAlteracaoPorOutroAdmin: registroAtual?.BloquearAlteracaoPorOutroAdmin === true,
      AtualizadoEm: serverTimestamp()
    };

    if(modoEdicao){
      await updateDoc(doc(db,"segurancas",editId),dados);
      await updateDoc(doc(db,"usuarios_auth",registroAtual.AuthUid),{
        Email: email,
        Nome: upper(nomeOriginal),
        NomeBusca: nomeBusca,
        Perfil: perfil,
        Ativo: ativo,
        Protegido: dados.Protegido === true,
        SuperAdmin: registroAtual?.SuperAdmin === true,
        CredencialPrivada: dados.CredencialPrivada === true,
        MustChangePassword: registroAtual?.MustChangePassword === true,
        AtualizadoEm: serverTimestamp()
      });
      await registrarAuditoria("ALTERACAO_SEGURANCA", editId, {
        perfil,
        ativo,
        alterouSenha: false,
        protegido: dados.Protegido === true,
        authUid: registroAtual.AuthUid
      });
      msg("Segurança atualizado com sucesso.");
    }else{
      const uid = await criarUsuarioAuth(email, senhaTemporaria);
      const novo = await addDoc(collection(db,"segurancas"),{
        ...dados,
        AuthMigrado: true,
        AuthUid: uid,
        MustChangePassword: true,
        CriadoEm: serverTimestamp()
      });
      await setDoc(doc(db,"usuarios_auth",uid),{
        uid,
        segurancaId: novo.id,
        Email: email,
        Nome: upper(nomeOriginal),
        NomeBusca: nomeBusca,
        Perfil: perfil,
        Ativo: ativo,
        Protegido: false,
        SuperAdmin: false,
        CredencialPrivada: false,
        MustChangePassword: true,
        CriadoPelaTela: true,
        AtualizadoEm: serverTimestamp()
      });
      await registrarAuditoria("CRIACAO_SEGURANCA", novo.id, {
        perfil,
        ativo,
        authUid: uid,
        senhaTemporaria: true
      });
      msg("Seguranca cadastrado com senha temporaria. O operador deve trocar no primeiro acesso.");
    }

    formCadastro.reset();
    Ativo.checked = true;
    setModoEdicao(false);
    limparResultado();

  }catch(e){
    console.error(e);
    msg("Erro ao salvar segurança no Firebase.","erro");
  }
}

async function consultarSeguranca(){
  limparMsg();
  limparResultado();
  setModoEdicao(false);

  const termo = texto("BuscaSeguranca");
  const tipo = texto("TipoBuscaSeguranca");

  if(!termo){
    msg("Informe Nome ou E-mail para consultar.","warn");
    return;
  }

  try{
    resultadosCache = tipo === "Email"
      ? await buscarExato("segurancas","Email",lower(termo),10)
      : await buscarPrefixo("segurancas","NomeBusca",termo,10);

    if(!resultadosCache.length){
      msg("Nenhum segurança encontrado.","warn");
      return;
    }

    mostrarResultado(resultadosCache.map(renderSeguranca).join(""));

  }catch(e){
    console.error(e);
    msg("Erro ao consultar segurança. Talvez falte NomeBusca em cadastros antigos.","erro");
  }
}

async function exigirTrocaSenha(idx){
  limparMsg();

  if(!isSuperAdmin()){
    msg('Somente SuperAdmin pode exigir troca de senha.','erro');
    return;
  }

  const d = resultadosCache[idx];
  if(!d) return;

  if(!podeEditarUsuarioProtegido(d)){
    msg('Conta protegida. Somente o proprio usuario pode alterar esse cadastro.','erro');
    return;
  }

  if(!d.AuthUid){
    msg('Usuario sem vinculo Firebase Auth. Regularize pelo script seguro antes de alterar.','erro');
    return;
  }

  try{
    await updateDoc(doc(db,"segurancas",d.id),{
      MustChangePassword: true,
      AtualizadoEm: serverTimestamp()
    });
    await updateDoc(doc(db,"usuarios_auth",d.AuthUid),{
      MustChangePassword: true,
      AtualizadoEm: serverTimestamp()
    });
    await registrarAuditoria("EXIGIR_TROCA_SENHA", d.id, {
      authUid: d.AuthUid,
      email: d.Email || ''
    });
    resultadosCache[idx] = {...d, MustChangePassword: true};
    mostrarResultado(resultadosCache.map(renderSeguranca).join(""));
    msg("Troca de senha obrigatoria no proximo acesso.","ok");
  }catch(e){
    console.error(e);
    msg("Erro ao marcar troca obrigatoria de senha.","erro");
  }
}

Object.assign(window,{
  salvarSeguranca,
  consultarSeguranca,
  editarSeguranca,
  exigirTrocaSenha,
  cancelarEdicao
});

window.addEventListener('load', () => {
  aplicarPerfilConsulta();
  setModoEdicao(false);
});
</script>
