<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Cadastro de Seguranças</title>

<style>
:root{
  --bg1:#0b1220;
  --bg2:#0b0f17;
  --card:#0b1221;
  --border:#1d2940;
  --text:#e6edf7;
  --muted:#9fb0cc;
  --accent:#22c55e;
  --danger:#ff4d4f;
  --warn:#ffb020;
  --shadow:0 24px 64px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

html,body{
  min-height:100%;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
  background:
    radial-gradient(900px 360px at -10% -10%,#22c55e1f 0%,transparent 60%),
    radial-gradient(900px 360px at 120% -20%,#06b6d41f 0%,transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:680px;
  margin:0 auto;
  padding:30px 16px;
}

.head{
  text-align:center;
  margin-bottom:22px;
}

.chip{
  display:inline-flex;
  padding:6px 14px;
  border-radius:99px;
  border:1px solid var(--border);
  color:#86efac;
  font-size:11px;
  font-weight:900;
  letter-spacing:1px;
  background:rgba(255,255,255,.03);
}

.logo{
  margin:16px 0 0;
  font-size:34px;
  font-weight:900;
  font-style:italic;
  line-height:1;
}

.logo span{
  display:block;
  color:#ff4d4d;
}

.tagline{
  margin-top:14px;
  font-size:10px;
  font-weight:900;
  letter-spacing:4px;
  color:var(--muted);
  opacity:.7;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
  overflow:hidden;
}

.card-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:900;
  text-align:center;
}

.field{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:12px;
  font-weight:900;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.7px;
}

input,select{
  width:100%;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.04);
  color:var(--text);
  padding:15px;
  font-size:16px;
  outline:none;
}

select option{
  color:#111;
}

input:focus,select:focus{
  border-color:#2a9d63;
  box-shadow:0 0 0 3px rgba(34,197,94,.10);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.checkline{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.03);
}

.checkline input{
  width:auto;
}

.checkline label{
  margin:0;
  color:var(--text);
  text-transform:none;
  letter-spacing:0;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px 18px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:12px;
  transition:.2s ease;
  color:var(--text);
}

.btn:hover{
  transform:translateY(-2px);
  border-color:#1f8f5a;
  box-shadow:
    0 10px 30px rgba(0,0,0,.28),
    0 0 12px rgba(34,197,94,.12);
}

.btn-primary{
  background:var(--accent);
  color:#08131f;
}

.btn-light{
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid var(--border);
}

.btn-warn{
  background:rgba(255,176,32,.14);
  color:#ffd27a;
  border:1px solid rgba(255,176,32,.35);
}

.msg{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:14px;
  font-weight:900;
  text-align:center;
}

.msg.ok{
  display:block;
  color:#86efac;
  background:rgba(34,197,94,.10);
  border:1px solid rgba(34,197,94,.25);
}

.msg.erro{
  display:block;
  color:#fff;
  background:rgba(255,77,79,.18);
  border:1px solid rgba(255,77,79,.35);
}

.msg.warn{
  display:block;
  color:#ffd27a;
  background:rgba(255,176,32,.12);
  border:1px solid rgba(255,176,32,.35);
}

.result{
  margin-top:14px;
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  display:none;
}

.result-item{
  padding:14px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.03);
}

.result-item:last-child{
  border-bottom:none;
}

.result-title{
  font-weight:900;
  font-size:15px;
}

.result-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
  line-height:1.45;
}

.edit-banner{
  display:none;
  margin-bottom:14px;
  padding:12px;
  border-radius:14px;
  color:#ffd27a;
  background:rgba(255,176,32,.12);
  border:1px solid rgba(255,176,32,.35);
  font-weight:900;
  text-align:center;
}

@media(max-width:620px){
  .row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="head">
    <div class="chip">● FIREBASE</div>
    <h1 class="logo">Cadastro de<span>Seguranças</span></h1>
    <div class="tagline"># DELTA CUIABA #</div>
  </div>

  <div class="card">
    <h2 class="card-title">Consulta</h2>

    <div class="row">
      <div class="field">
        <label for="TipoBuscaSeguranca">Buscar por</label>
        <select id="TipoBuscaSeguranca">
          <option value="NomeBusca">Nome</option>
          <option value="Email">E-mail</option>
        </select>
      </div>

      <div class="field">
        <label for="BuscaSeguranca">Valor da busca</label>
        <input id="BuscaSeguranca" placeholder="Digite nome ou e-mail">
      </div>
    </div>

    <button class="btn btn-light" type="button" onclick="consultarSeguranca()">Consultar</button>

    <div id="resultado" class="result"></div>
  </div>

  <div class="card">
    <h2 class="card-title" id="tituloForm">Novo Cadastro</h2>

    <div class="edit-banner" id="editBanner">
      Modo edição ativo. Após alterar, clique em Atualizar.
    </div>

    <form id="formCadastro" onsubmit="event.preventDefault(); salvarSeguranca();">

      <div class="field">
        <label for="Nome">Nome *</label>
        <input id="Nome" required placeholder="Nome do segurança">
      </div>

      <div class="field">
        <label for="Email">E-mail *</label>
        <input id="Email" type="email" required placeholder="email@empresa.com.br">
      </div>

      <div class="row">
        <div class="field">
          <label for="Sen_Segura">Senha *</label>
          <input id="Sen_Segura" required placeholder="Senha de acesso">
        </div>

        <div class="field">
          <label for="Perfil">Perfil *</label>
          <select id="Perfil" required>
            <option value="">Selecione</option>
            <option value="ADMIN">ADMIN</option>
            <option value="OPERADOR">OPERADOR</option>
            <option value="CONSULTA">CONSULTA</option>
          </select>
        </div>
      </div>

      <div class="checkline">
        <input id="Ativo" type="checkbox" checked required>
        <label for="Ativo">Ativo *</label>
      </div>

      <button class="btn btn-primary" id="btnSalvar" type="submit">Salvar</button>
      <button class="btn btn-warn" id="btnCancelarEdicao" type="button" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button>
      <a class="btn btn-light" href="admin.html">Voltar</a>

      <div id="msg" class="msg"></div>
    </form>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  orderBy,
  limit,
  serverTimestamp,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let modoEdicao = false;
let editId = null;
let resultadosCache = [];

function texto(id){
  return (document.getElementById(id)?.value || "").trim();
}

function bool(id){
  return !!document.getElementById(id)?.checked;
}

function upper(v){
  return String(v || "").trim().toUpperCase();
}

function lower(v){
  return String(v || "").trim().toLowerCase();
}

function esc(v){
  return String(v == null ? "" : v)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function msg(t,tipo="ok"){
  const el = document.getElementById("msg");
  if(el){
    el.textContent = t;
    el.className = "msg " + tipo;
  }
}

function limparMsg(){
  const el = document.getElementById("msg");
  if(el){
    el.textContent = "";
    el.className = "msg";
  }
}

function limparResultado(){
  const r = document.getElementById("resultado");
  if(r){
    r.innerHTML = "";
    r.style.display = "none";
  }
}

function mostrarResultado(html){
  const r = document.getElementById("resultado");
  if(r){
    r.innerHTML = html;
    r.style.display = "block";
  }
}

function setModoEdicao(ativo,id=null){
  modoEdicao = ativo;
  editId = id;

  const titulo = document.getElementById("tituloForm");
  const btn = document.getElementById("btnSalvar");
  const cancelar = document.getElementById("btnCancelarEdicao");
  const banner = document.getElementById("editBanner");

  if(ativo){
    if(titulo) titulo.textContent = "Editando Cadastro";
    if(btn) btn.textContent = "Atualizar no Firebase";
    if(cancelar) cancelar.style.display = "flex";
    if(banner) banner.style.display = "block";
  }else{
    if(titulo) titulo.textContent = "Novo Cadastro";
    if(btn) btn.textContent = "Salvar";
    if(cancelar) cancelar.style.display = "none";
    if(banner) banner.style.display = "none";
  }
}

function cancelarEdicao(){
  document.getElementById("formCadastro").reset();
  setModoEdicao(false);

  const ativo = document.getElementById("Ativo");
  if(ativo) ativo.checked = true;

  msg("Edição cancelada.","warn");
}

async function existeRegistro(colecao,campo,valor,ignorarId=null){
  const q = query(collection(db,colecao),where(campo,"==",valor),limit(10));
  const snap = await getDocs(q);
  return snap.docs.some(d => d.id !== ignorarId);
}

async function buscarExato(colecao,campo,valor,max=10){
  const q = query(collection(db,colecao),where(campo,"==",valor),limit(max));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({id:d.id,...d.data()}));
}

async function buscarPrefixo(colecao,campoBusca,termo,max=10){
  const inicio = upper(termo);
  const fim = inicio + "\uf8ff";

  const q = query(
    collection(db,colecao),
    orderBy(campoBusca),
    where(campoBusca,">=",inicio),
    where(campoBusca,"<=",fim),
    limit(max)
  );

  const snap = await getDocs(q);
  return snap.docs.map(d => ({id:d.id,...d.data()}));
}

function renderSeguranca(d,idx){
  return `<div class="result-item">
    <div class="result-title">${esc(d.Nome || "-")}</div>
    <div class="result-sub">
      E-mail: ${esc(d.Email || "-")}<br>
      Perfil: ${esc(d.Perfil || "-")}<br>
      Ativo: ${d.Ativo ? "Sim" : "Não"}
    </div>
    <button class="btn btn-warn" type="button" onclick="editarSeguranca(${idx})">Editar cadastro</button>
  </div>`;
}

function editarSeguranca(idx){
  const d = resultadosCache[idx];
  if(!d) return;

  Nome.value = d.Nome || "";
  Email.value = d.Email || "";
  Sen_Segura.value = d.Sen_Segura || "";
  Perfil.value = d.Perfil || "OPERADOR";
  Ativo.checked = !!d.Ativo;

  setModoEdicao(true,d.id);
  formCadastro.scrollIntoView({behavior:"smooth"});
}

async function salvarSeguranca(){
  limparMsg();

  const nomeOriginal = texto("Nome");
  const nomeBusca = upper(nomeOriginal);
  const email = lower(texto("Email"));
  const senha = texto("Sen_Segura");
  const perfil = upper(texto("Perfil"));
  const ativo = bool("Ativo");

  if(!nomeOriginal || !email || !senha || !perfil || !ativo){
    msg("Campos obrigatórios: Nome, E-mail, Senha, Perfil e Ativo.","erro");
    return;
  }

  try{
    if(await existeRegistro("segurancas","Email",email,modoEdicao ? editId : null)){
      msg("Duplicidade bloqueada: já existe segurança com este e-mail.","erro");
      return;
    }

    const dados = {
      Ativo: ativo,
      Email: email,
      Nome: upper(nomeOriginal),
      NomeBusca: nomeBusca,
      Perfil: perfil,
      Sen_Segura: senha,
      AtualizadoEm: serverTimestamp()
    };

    if(modoEdicao){
      await updateDoc(doc(db,"segurancas",editId),dados);
      msg("Segurança atualizado com sucesso.");
    }else{
      await addDoc(collection(db,"segurancas"),{
        ...dados,
        CriadoEm: serverTimestamp()
      });
      msg("Segurança cadastrado com sucesso.");
    }

    formCadastro.reset();
    Ativo.checked = true;
    setModoEdicao(false);
    limparResultado();

  }catch(e){
    console.error(e);
    msg("Erro ao salvar segurança no Firebase.","erro");
  }
}

async function consultarSeguranca(){
  limparMsg();
  limparResultado();
  setModoEdicao(false);

  const termo = texto("BuscaSeguranca");
  const tipo = texto("TipoBuscaSeguranca");

  if(!termo){
    msg("Informe Nome ou E-mail para consultar.","warn");
    return;
  }

  try{
    resultadosCache = tipo === "Email"
      ? await buscarExato("segurancas","Email",lower(termo),10)
      : await buscarPrefixo("segurancas","NomeBusca",termo,10);

    if(!resultadosCache.length){
      msg("Nenhum segurança encontrado.","warn");
      return;
    }

    mostrarResultado(resultadosCache.map(renderSeguranca).join(""));

  }catch(e){
    console.error(e);
    msg("Erro ao consultar segurança. Talvez falte NomeBusca em cadastros antigos.","erro");
  }
}

Object.assign(window,{
  salvarSeguranca,
  consultarSeguranca,
  editarSeguranca,
  cancelarEdicao
});
</script>

</body>
</html>
