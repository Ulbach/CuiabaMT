<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Frota Pro — Registrar Entrada</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg1:#061427;
      --bg2:#0b1b33;
      --card:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
      --shadow:0 16px 40px rgba(0,0,0,.45);
      --radius:20px;
      --text-main:#e6edf7;
      --text-soft:#9fb4d3;
      --text-muted:#7b8ca7;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --yellow:#f59e0b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text-main);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:440px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:30px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .session-box{
      margin:-6px 0 18px 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(34,197,94,0.08);
      border:1px solid rgba(34,197,94,0.18);
      text-align:center;
      font-size:13px;
      color:#9fb4d3;
    }

    .session-box strong{color:#e6edf7}

    .header{
      text-align:center;
      margin-bottom:25px;
    }

    .header h2{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-0.5px;
      color:var(--green);
    }

    .header p{
      margin:5px 0 0;
      font-size:11px;
      color:var(--text-soft);
      text-transform:uppercase;
      letter-spacing:2px;
      font-weight:600;
    }

    .field{margin-bottom:18px}

    label{
      display:block;
      font-size:11px;
      font-weight:700;
      color:var(--text-muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .input-group{position:relative}

    .input-group i{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--green);
      font-size:14px;
      pointer-events:none;
      z-index:1;
    }

    select,input{
      width:100%;
      background:rgba(0,0,0,0.2);
      border:1px solid var(--border);
      padding:13px 13px 13px 40px;
      border-radius:12px;
      color:#fff;
      font-size:15px;
      outline:none;
      transition:0.2s;
    }

    select option{
      background:#0b1b33;
      color:#fff;
    }

    select:focus,input:focus{
      border-color:var(--green);
      background:rgba(255,255,255,0.05);
    }

    input[readonly]{
      opacity:.9;
      cursor:not-allowed;
    }

    .hint{
      margin-top:7px;
      font-size:12px;
      color:var(--text-soft);
      min-height:16px;
      text-align:right;
    }

    .hint b{color:var(--red)}

    .btn-save{
      width:100%;
      padding:16px;
      background:var(--green);
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
      transition:0.25s;
      box-shadow:0 10px 24px rgba(34,197,94,.18);
    }

    .btn-save:active{transform:scale(.98)}

    .btn-save:disabled{
      opacity:0.18;
      cursor:not-allowed;
      filter:grayscale(1);
      box-shadow:none;
    }

    .btn-back{
      display:block;
      text-align:center;
      margin-top:20px;
      color:var(--text-soft);
      text-decoration:none;
      font-size:13px;
      font-weight:600;
      transition:0.2s;
    }

    .btn-back:hover{color:#fff}

    #msg{
      text-align:center;
      margin-top:15px;
      font-size:13px;
      font-weight:700;
      min-height:1.5em;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="session-box">
      Segurança logado: <strong id="sessaoSegurancaTopo">...</strong>
    </div>

    <div class="header">
      <h2>Registrar Entrada</h2>
      <p># DELTA CUIABÁ #</p>
    </div>

    <div class="field">
      <label>Veículo em Trânsito</label>
      <div class="input-group">
        <i class="fa-solid fa-car-side"></i>
        <select id="veiculo">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div id="hintKm" class="hint">Selecione o veículo acima</div>
    </div>

    <div class="field">
      <label>KM de Retorno</label>
      <div class="input-group">
        <i class="fa-solid fa-gauge-high"></i>
        <input type="number" id="kmRetorno" placeholder="Digite o KM de retorno" inputmode="numeric" min="0">
      </div>
    </div>

    <div class="field">
      <label>Motorista</label>
      <div class="input-group">
        <i class="fa-solid fa-user-tie"></i>
        <select id="motorista">
          <option value="">Aguardando...</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Segurança Logado</label>
      <div class="input-group">
        <i class="fa-solid fa-shield-halved"></i>
        <input type="text" id="seguranca" placeholder="Aguardando login..." readonly>
      </div>
    </div>

    <button class="btn-save" id="btnSalvar" disabled>GRAVAR ENTRADA</button>

    <a href="veiculos.html" id="btnVoltarMenu" class="btn-back">← VOLTAR AO MENU</a>

    <div id="msg"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';

let AUTH = null;
let inFlight = false;
let VEICULOS_NA_RUA = [];
let MOVIMENTACAO_ATUAL = null;
let KM_SAIDA = 0;

function getAuth(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(STORAGE_KEY_LEGADO) || 'null'); }
  catch(_){ return null; }
}
function clearAuth(){ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STORAGE_KEY_LEGADO); }
function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return !!(auth.Nome || auth.seguranca || auth.nome || auth.usuario);
}
function nomeSeguranca(auth){ return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || '---'; }
function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function setMsg(texto, corVar){ const msg=document.getElementById('msg'); msg.style.color=corVar?`var(${corVar})`:'var(--text-soft)'; msg.innerText=texto||''; }
function setHint(texto, corVar){ const hint=document.getElementById('hintKm'); hint.style.color=corVar?`var(${corVar})`:'var(--text-soft)'; hint.innerHTML=texto||''; }
function textoVeiculo(v){ const nome=v.Nome||v.nome||v.Veiculo||v.veiculo||'Veículo'; const placa=v.Placa||v.placa||''; return placa?`${nome} - ${placa}`:nome; }
function kmAtualVeiculo(v){ return Number(String(v.KmAtualCadastro ?? v.KmAtual ?? v.kmAtual ?? v.Km ?? v.km ?? 0).replace(',','.')) || 0; }

async function carregarVeiculosNaRua(){
  /*
    Leitura direta da coleção inteira e filtro local.
    Motivo: evita erro de query/index/regra no Firestore durante a migração.
  */
  const snap = await getDocs(collection(db,'veiculos'));

  VEICULOS_NA_RUA = snap.docs
    .map(d=>({ id:d.id, ...d.data() }))
    .filter(v => v.Ativo !== false)
    .filter(v => v.EmTransito === true || v.emTransito === true || String(v.Status || v.status || '').toUpperCase().includes('TRANSITO'));

  const el=document.getElementById('veiculo');

  if(!VEICULOS_NA_RUA.length){
    el.innerHTML='<option value="">Nenhum veículo em trânsito</option>';
    setHint('Não há veículos aguardando entrada.');
    return;
  }

  el.innerHTML='<option value="">Selecione o veículo...</option>' + VEICULOS_NA_RUA
    .sort((a,b)=>textoVeiculo(a).localeCompare(textoVeiculo(b),'pt-BR'))
    .map(v=>`<option value="${esc(v.id)}">${esc(textoVeiculo(v))}</option>`)
    .join('');
}

async function buscarMovimentacaoAberta(veiculo){
  /*
    Também evita where() aqui.
    Procura localmente a movimentação aberta mais recente do veículo.
  */
  const snap = await getDocs(collection(db,'movimentacoes_frota'));

  const nomeAtual = textoVeiculo(veiculo).toUpperCase();
  const placaAtual = String(veiculo.Placa || veiculo.placa || '').toUpperCase();

  const abertas = snap.docs
    .map(d=>({ id:d.id, ...d.data() }))
    .filter(m => {
      const status = String(m.status || m.Status || '').toUpperCase();
      const semRetorno = !m.dataRetorno && !m.DataRetorno;
      const naoConcluido = status !== 'CONCLUIDO' && status !== 'CONCLUÍDO' && !status.includes('PÁTIO') && !status.includes('PATIO');
      const mesmoId = String(m.veiculoId || '') === String(veiculo.id);
      const mesmoNome = String(m.veiculo || m.Veiculo || '').toUpperCase() === nomeAtual;
      const mesmaPlaca = placaAtual && String(m.placa || m.Placa || '').toUpperCase() === placaAtual;
      return semRetorno && naoConcluido && (mesmoId || mesmoNome || mesmaPlaca);
    })
    .sort((a,b)=>{
      const da = a.dataSaida?.toMillis ? a.dataSaida.toMillis() : new Date(a.dataSaida || a.DataSaida || 0).getTime();
      const dbb = b.dataSaida?.toMillis ? b.dataSaida.toMillis() : new Date(b.dataSaida || b.DataSaida || 0).getTime();
      return dbb - da;
    });

  return abertas[0] || null;
}

async function onChangeVeiculo(){
  const id=document.getElementById('veiculo').value;
  const kmInput=document.getElementById('kmRetorno');
  const motoristaEl=document.getElementById('motorista');
  const veiculo=VEICULOS_NA_RUA.find(v=>v.id===id);
  MOVIMENTACAO_ATUAL=null;

  if(!veiculo){
    KM_SAIDA=0;
    kmInput.value='';
    motoristaEl.innerHTML='<option value="">Aguardando...</option>';
    setHint('Selecione o veículo acima');
    validateForm();
    return;
  }

  setHint('🔍 Buscando saída em aberto...');
  try{
    MOVIMENTACAO_ATUAL = await buscarMovimentacaoAberta(veiculo);
    KM_SAIDA = Number(String((MOVIMENTACAO_ATUAL?.KmSaida ?? MOVIMENTACAO_ATUAL?.kmSaida ?? kmAtualVeiculo(veiculo) ?? 0)).replace(',','.')) || 0;
    const motorista = MOVIMENTACAO_ATUAL?.motorista || MOVIMENTACAO_ATUAL?.Motorista || veiculo.MotoristaAtual || 'Motorista não informado';
    motoristaEl.innerHTML = `<option value="${esc(motorista)}">${esc(motorista)}</option>`;
    kmInput.value = KM_SAIDA > 0 ? KM_SAIDA : '';
    setHint(KM_SAIDA > 0 ? `KM de saída: <b>${esc(KM_SAIDA)}</b>` : 'KM de saída não localizado.', KM_SAIDA > 0 ? null : '--yellow');
    setMsg('');
  }catch(e){
    console.error(e);
    KM_SAIDA = kmAtualVeiculo(veiculo);
    motoristaEl.innerHTML = `<option value="${esc(veiculo.MotoristaAtual || '')}">${esc(veiculo.MotoristaAtual || 'Motorista não localizado')}</option>`;
    kmInput.value = KM_SAIDA > 0 ? KM_SAIDA : '';
    setHint('Não foi possível localizar a movimentação aberta.', '--yellow');
  }
  validateForm();
}

function validateForm(){
  const v=document.getElementById('veiculo').value;
  const k=Number(String(document.getElementById('kmRetorno').value||'0').replace(',','.'))||0;
  const m=document.getElementById('motorista').value;
  const s=document.getElementById('seguranca').value;
  const btn=document.getElementById('btnSalvar');
  if(v && k && m && s && k < KM_SAIDA){
    setMsg(`KM de retorno inferior ao KM de saída (${KM_SAIDA}).`, '--red');
    btn.disabled=true;
    return;
  }
  const atual=document.getElementById('msg').innerText||'';
  if(atual.startsWith('KM de retorno')) setMsg('');
  btn.disabled = !(v && k && m && s) || inFlight;
}

async function doEnviar(){
  if(inFlight) return;
  const veiculoId=document.getElementById('veiculo').value;
  const veiculo=VEICULOS_NA_RUA.find(v=>v.id===veiculoId);
  const KmRetorno=Number(String(document.getElementById('kmRetorno').value||'0').replace(',','.'))||0;
  const motorista=document.getElementById('motorista').value;
  const seguranca=document.getElementById('seguranca').value;

  if(!veiculo || !KmRetorno || !motorista || !seguranca){ validateForm(); return; }
  if(KmRetorno < KM_SAIDA){ setMsg(`KM de retorno inferior ao KM de saída (${KM_SAIDA}).`, '--red'); return; }

  inFlight=true;
  document.getElementById('btnSalvar').disabled=true;
  setMsg('Gravando entrada no Firebase...', '--text-soft');

  try{
    const dadosEntrada = {
      tipo: 'ENTRADA',
      status: 'CONCLUIDO',
      Status: 'CONCLUIDO',
      segurancaEntrada: seguranca,
      SegurancaEntrada: seguranca,
      KmRetorno: KmRetorno,
      kmRetorno: KmRetorno,
      dataRetorno: serverTimestamp(),
      atualizadoEm: serverTimestamp(),
      origemEntrada: 'entrada.html'
    };

    if(MOVIMENTACAO_ATUAL && MOVIMENTACAO_ATUAL.id){
      await updateDoc(doc(db,'movimentacoes_frota',MOVIMENTACAO_ATUAL.id), dadosEntrada);
    }else{
      await addDoc(collection(db,'movimentacoes_frota'), {
        ...dadosEntrada,
        veiculoId: veiculo.id,
        veiculo: textoVeiculo(veiculo),
        Veiculo: textoVeiculo(veiculo),
        placa: veiculo.Placa || veiculo.placa || '',
        motorista,
        Motorista: motorista,
        KmSaida: KM_SAIDA || kmAtualVeiculo(veiculo),
        kmSaida: KM_SAIDA || kmAtualVeiculo(veiculo),
        criadoEm: serverTimestamp()
      });
    }

    await updateDoc(doc(db,'veiculos',veiculo.id), {
      EmTransito: false,
      KmAtualCadastro: KmRetorno,
      MotoristaAtual: '',
      DestinoAtual: '',
      UltimaEntradaEm: serverTimestamp()
    });

    setMsg('✅ Entrada gravada com sucesso!', '--green');
    setTimeout(()=>{ location.href='veiculos.html'; }, 1200);
  }catch(e){
    console.error(e);
    setMsg((e && e.message) ? e.message : 'Erro ao salvar no Firebase.', '--red');
    inFlight=false;
    validateForm();
  }
}

async function init(){
  AUTH=getAuth();
  if(!sessaoValidaLocal(AUTH)){ clearAuth(); location.href='index.html'; return; }
  const nome=nomeSeguranca(AUTH);
  document.getElementById('sessaoSegurancaTopo').textContent=nome;
  document.getElementById('seguranca').value=nome;

  document.getElementById('veiculo').addEventListener('change', onChangeVeiculo);
  document.getElementById('kmRetorno').addEventListener('input', validateForm);
  document.getElementById('motorista').addEventListener('change', validateForm);
  document.getElementById('btnSalvar').addEventListener('click', doEnviar);
  document.getElementById('btnVoltarMenu').addEventListener('click', e=>{ e.preventDefault(); location.href='veiculos.html'; });

  try{
    setMsg('Carregando veículos em trânsito...', '--text-soft');
    await carregarVeiculosNaRua();
    setMsg('');
  }catch(e){
    console.error(e);
    setMsg('Erro ao carregar veículos em trânsito. Verifique regras/permissão do Firestore.', '--red');
    document.getElementById('veiculo').innerHTML='<option value="">Erro ao carregar</option>';
  }
  validateForm();
}
window.addEventListener('load', init);
</script>

</body>
</html>
