<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Delta Cuiabá - Registrar Entrada</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg1:#061427;
      --bg2:#0b1b33;
      --card:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
      --shadow:0 16px 40px rgba(0,0,0,.45);
      --radius:20px;
      --text-main:#e6edf7;
      --text-soft:#9fb4d3;
      --text-muted:#7b8ca7;
      --green:#ef4444;
      --red:#ef4444;
      --blue:#3b82f6;
      --yellow:#f59e0b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text-main);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:440px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:30px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .session-box{
      margin:-6px 0 18px 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(239,68,68,0.08);
      border:1px solid rgba(239,68,68,0.18);
      text-align:center;
      font-size:13px;
      color:#9fb4d3;
    }

    .session-box strong{color:#e6edf7}

    .consulta-box{
      display:none;
      margin:-4px 0 18px 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(59,130,246,0.10);
      border:1px solid rgba(125,211,252,0.28);
      color:#bfdbfe;
      text-align:center;
      font-size:12px;
      font-weight:800;
      line-height:1.35;
    }

    .header{text-align:center;margin-bottom:25px}

    .header h2{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-0.5px;
      color:var(--green);
    }

    .header p{
      margin:5px 0 0;
      font-size:11px;
      color:var(--text-soft);
      text-transform:uppercase;
      letter-spacing:2px;
      font-weight:600;
    }

    .field{margin-bottom:18px}

    label{
      display:block;
      font-size:11px;
      font-weight:700;
      color:var(--text-muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .input-group{position:relative}

    .input-group i{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--green);
      font-size:14px;
      pointer-events:none;
      z-index:1;
    }

    select,input{
      width:100%;
      background:rgba(0,0,0,0.2);
      border:1px solid var(--border);
      padding:13px 13px 13px 40px;
      border-radius:12px;
      color:#fff;
      font-size:15px;
      outline:none;
      transition:0.2s;
    }

    select option{background:#0b1b33;color:#fff}

    select:focus,input:focus{
      border-color:var(--green);
      background:rgba(255,255,255,0.05);
    }

    input[readonly]{opacity:.9;cursor:not-allowed}

    select:disabled,input:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .hint{
      margin-top:7px;
      font-size:12px;
      color:var(--text-soft);
      min-height:16px;
      text-align:right;
      line-height:1.4;
    }

    .hint b{color:var(--red)}

    .oil-info{
      display:block;
      margin-top:6px;
      font-weight:800;
      text-align:right;
    }

    .oil-warn{color:var(--yellow)}
    .oil-over{color:var(--red)}

    .btn-save{
      width:100%;
      padding:16px;
      background:var(--green);
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
      transition:0.25s;
      box-shadow:0 10px 24px rgba(239,68,68,.18);
    }

    .btn-save:active{transform:scale(.98)}

    .btn-save:disabled{
      opacity:0.18;
      cursor:not-allowed;
      filter:grayscale(1);
      box-shadow:none;
    }

    .btn-back{
      display:block;
      text-align:center;
      margin-top:20px;
      color:var(--text-soft);
      text-decoration:none;
      font-size:13px;
      font-weight:600;
      transition:0.2s;
    }

    .btn-back:hover{color:#fff}

    #msg{
      text-align:center;
      margin-top:15px;
      font-size:13px;
      font-weight:700;
      min-height:1.5em;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="session-box">
      Segurança logado: <strong id="sessaoSegurancaTopo">...</strong>
    </div>

    <div class="consulta-box" id="consultaBox">
      Perfil CONSULTA: visualização liberada. Gravação de entrada bloqueada.
    </div>

    <div class="header">
      <h2>Registrar Entrada</h2>
      <p># DELTA CUIABA #</p>
    </div>

    <div class="field">
      <label>Veículo em Trânsito</label>
      <div class="input-group">
        <i class="fa-solid fa-car-side"></i>
        <select id="veiculo">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div id="hintKm" class="hint">Selecione o veículo acima</div>
    </div>

    <div class="field">
      <label>KM de Retorno</label>
      <div class="input-group">
        <i class="fa-solid fa-gauge-high"></i>
        <input type="number" id="kmRetorno" placeholder="Digite o KM de retorno" inputmode="numeric" min="0">
      </div>
    </div>

    <div class="field">
      <label>Motorista no Retorno</label>
      <div class="input-group">
        <i class="fa-solid fa-user-tie"></i>
        <select id="motorista">
          <option value="">Selecione o veículo primeiro</option>
        </select>
      </div>
      <div id="hintMotorista" class="hint">Será preenchido com o motorista da saída, mas pode ser alterado.</div>
    </div>

    <div class="field">
      <label>Segurança Logado</label>
      <div class="input-group">
        <i class="fa-solid fa-shield-halved"></i>
        <input type="text" id="seguranca" placeholder="Aguardando login..." readonly>
      </div>
    </div>

    <button class="btn-save" id="btnSalvar" disabled>GRAVAR ENTRADA</button>

    <a href="veiculos.html" id="btnVoltarMenu" class="btn-back">VOLTAR AO MENU</a>

    <div id="msg"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth as getFirebaseAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
const firebaseAuth = getFirebaseAuth(app);
const db = getFirestore(app);

const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';

let AUTH = null;
let inFlight = false;
let VEICULOS_NA_RUA = [];
let MOTORISTAS_ATIVOS = [];
let MOVIMENTACAO_ATUAL = null;
let KM_SAIDA = 0;
let MOTORISTA_SAIDA = '';
let VEICULO_ATUAL = null;

function getAuth(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(STORAGE_KEY_LEGADO) || 'null');
  }catch(_){
    return null;
  }
}

function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
}

function localUid(auth){
  return auth?.uid || auth?.token || auth?.AuthUid || auth?.id || "";
}

function aguardarFirebaseAuth(){
  return new Promise(resolve => {
    const unsubscribe = onAuthStateChanged(firebaseAuth, user => {
      unsubscribe();
      resolve(user);
    });
  });
}

async function garantirFirebaseAuth(auth){
  const user = await aguardarFirebaseAuth();
  const uidLocal = localUid(auth);

  if(!user || (uidLocal && uidLocal !== user.uid)){
    clearAuth();
    location.href = "index.html?login=1";
    return false;
  }

  return true;
}


function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return !!(auth.Nome || auth.seguranca || auth.nome || auth.usuario || auth.email);
}

function nomeSeguranca(auth){
  return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || auth?.email || '---';
}

function perfilAuth(auth){
  return String(auth?.Perfil || auth?.perfil || auth?.tipo || auth?.Tipo || 'OPERADOR').trim().toUpperCase();
}

function isConsulta(){
  return perfilAuth(AUTH) === 'CONSULTA';
}

async function registrarAuditoria(tipo, alvoColecao, alvoId, detalhes={}){
  try{
    await addDoc(collection(db,'auditoria'),{
      tipo,
      alvoColecao,
      alvoId,
      usuarioUid: AUTH?.uid || '',
      usuarioNome: AUTH?.Nome || AUTH?.seguranca || AUTH?.nome || '',
      usuarioEmail: AUTH?.Email || AUTH?.email || '',
      usuarioPerfil: AUTH?.Perfil || AUTH?.perfil || '',
      origem: 'entrada.html',
      detalhes,
      criadoEm: serverTimestamp()
    });
  }catch(e){
    console.warn('Falha ao registrar auditoria:', e);
  }
}

function esc(v){
  return String(v==null?'':v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function setMsg(texto, corVar){
  const msg=document.getElementById('msg');
  msg.style.color=corVar?`var(${corVar})`:'var(--text-soft)';
  msg.innerText=texto||'';
}

function setHint(texto, corVar){
  const hint=document.getElementById('hintKm');
  hint.style.color=corVar?`var(${corVar})`:'var(--text-soft)';
  hint.innerHTML=texto||'';
}

function setHintMotorista(texto, corVar){
  const hint=document.getElementById('hintMotorista');
  if(!hint) return;
  hint.style.color=corVar?`var(${corVar})`:'var(--text-soft)';
  hint.innerHTML=texto||'';
}

function textoVeiculo(v){
  const nome=v.Nome||v.nome||v.Veiculo||v.veiculo||'Veículo';
  const placa=v.Placa||v.placa||'';
  return placa?`${nome} - ${placa}`:nome;
}

function textoMotorista(m){
  return m.Nome || m.nome || m.Motorista || m.motorista || m.Descricao || m.descricao || 'Motorista';
}

function kmAtualVeiculo(v){
  return Number(String(v.KmAtualCadastro ?? v.KmAtual ?? v.kmAtual ?? v.Km ?? v.km ?? 0).replace(',','.')) || 0;
}

function kmTrocaOleoVeiculo(v){
  return Number(String(v.KmTrocaOleo ?? v.kmTrocaOleo ?? v.KmProximaTrocaOleo ?? v.kmProximaTrocaOleo ?? 0).replace(',','.')) || 0;
}

function diferencaKmRetorno(kmRetorno){
  if(!KM_SAIDA || !kmRetorno) return 0;
  return Math.max(0, kmRetorno - KM_SAIDA);
}

function modeloVeiculo(v){
  return textoVeiculo(v || {}).toUpperCase();
}

function regraKmRetorno(v, kmRetorno){
  const modelo = modeloVeiculo(v);
  const diff = diferencaKmRetorno(kmRetorno);
  if(modelo.includes('GOL') && diff > 600){
    return {
      tipo: 'bloqueio',
      diff,
      mensagem: `KM de retorno ${diff} km acima do KM de saida. Para GOL, o limite e 600 km. Confira se o veiculo selecionado esta correto.`
    };
  }
  if(modelo.includes('AMAROK') && diff > 2000){
    return {
      tipo: 'senha',
      diff,
      mensagem: `KM de retorno ${diff} km acima do KM de saida. Para Amarok acima de 2.000 km, informe a senha diaria para confirmar.`
    };
  }
  return null;
}

function senhaKmRetornoHoje(){
  const hoje = new Date();
  const dia = hoje.getDate() + 20;
  const mes = hoje.getMonth() + 1 + 11;
  return `${dia}${mes}`;
}

function avisoOleoHtml(v, kmReferencia){
  const kmTroca = kmTrocaOleoVeiculo(v);
  const kmAtual = Number(String(kmReferencia || 0).replace(',','.')) || 0;
  if(!kmTroca || !kmAtual) return '';

  const restante = kmTroca - kmAtual;

  if(restante < 0){
    return `<span class="oil-info oil-over">Informativo: troca de óleo ultrapassada em ${esc(Math.abs(restante))} km. Não bloqueia a operação.</span>`;
  }

  if(restante <= 500){
    return `<span class="oil-info oil-warn">Informativo: faltam ${esc(restante)} km para a troca de óleo. Não bloqueia a operação.</span>`;
  }

  return '';
}

function atualizarHintVeiculo(){
  const kmDigitado = Number(String(document.getElementById('kmRetorno').value || '0').replace(',','.')) || KM_SAIDA;

  if(!VEICULO_ATUAL){
    setHint('Selecione o veiculo acima');
    return;
  }

  const avisoOleo = avisoOleoHtml(VEICULO_ATUAL, kmDigitado);

  setHint(
    KM_SAIDA > 0
      ? `KM de saida: <b>${esc(KM_SAIDA)}</b>${avisoOleo}`
      : `KM de saida nao localizado.${avisoOleo}`,
    KM_SAIDA > 0 ? null : '--yellow'
  );
}
function motoristaSelecionadoTexto(){
  const el=document.getElementById('motorista');
  return el.value || '';
}

async function carregarMotoristasAtivos(){
  const snap = await getDocs(collection(db,'motoristas'));

  MOTORISTAS_ATIVOS = snap.docs
    .map(d=>({ id:d.id, ...d.data() }))
    .filter(m => m.Ativo !== false)
    .sort((a,b)=>textoMotorista(a).localeCompare(textoMotorista(b),'pt-BR'));
}

async function carregarVeiculosNaRua(){
  const snap = await getDocs(collection(db,'veiculos'));

  VEICULOS_NA_RUA = snap.docs
    .map(d=>({ id:d.id, ...d.data() }))
    .filter(v => v.Ativo !== false)
    .filter(v => v.EmTransito === true || v.emTransito === true || String(v.Status || v.status || '').toUpperCase().includes('TRANSITO'));

  const el=document.getElementById('veiculo');

  if(!VEICULOS_NA_RUA.length){
    el.innerHTML='<option value="">Nenhum veículo em trânsito</option>';
    setHint('Não há veículos aguardando entrada.');
    return;
  }

  el.innerHTML='<option value="">Selecione o veículo...</option>' + VEICULOS_NA_RUA
    .sort((a,b)=>textoVeiculo(a).localeCompare(textoVeiculo(b),'pt-BR'))
    .map(v=>`<option value="${esc(v.id)}">${esc(textoVeiculo(v))}</option>`)
    .join('');
}

async function buscarMovimentacaoAberta(veiculo){
  const snap = await getDocs(collection(db,'movimentacoes_frota'));

  const nomeAtual = textoVeiculo(veiculo).toUpperCase();
  const placaAtual = String(veiculo.Placa || veiculo.placa || '').toUpperCase();

  const abertas = snap.docs
    .map(d=>({ id:d.id, ...d.data() }))
    .filter(m => {
      const status = String(m.status || m.Status || '').toUpperCase();
      const semRetorno = !m.dataRetorno && !m.DataRetorno;
      const naoConcluido = status !== 'CONCLUIDO' && status !== 'CONCLUÍDO' && !status.includes('PÁTIO') && !status.includes('PATIO');
      const mesmoId = String(m.veiculoId || '') === String(veiculo.id);
      const mesmoNome = String(m.veiculo || m.Veiculo || '').toUpperCase() === nomeAtual;
      const mesmaPlaca = placaAtual && String(m.placa || m.Placa || '').toUpperCase() === placaAtual;

      return semRetorno && naoConcluido && (mesmoId || mesmoNome || mesmaPlaca);
    })
    .sort((a,b)=>{
      const da = a.dataSaida?.toMillis ? a.dataSaida.toMillis() : new Date(a.dataSaida || a.DataSaida || 0).getTime();
      const dbb = b.dataSaida?.toMillis ? b.dataSaida.toMillis() : new Date(b.dataSaida || b.DataSaida || 0).getTime();
      return dbb - da;
    });

  return abertas[0] || null;
}

function preencherMotoristasRetorno(motoristaSaida){
  const el=document.getElementById('motorista');

  const nomeSaida = String(motoristaSaida || '').trim();
  const nomes = new Map();

  if(nomeSaida){
    nomes.set(nomeSaida.toUpperCase(), {
      id:'',
      nome:nomeSaida,
      origemSaida:true
    });
  }

  MOTORISTAS_ATIVOS.forEach(m=>{
    const nome=textoMotorista(m);
    nomes.set(nome.toUpperCase(), {
      id:m.id,
      nome,
      origemSaida:false
    });
  });

  const lista=[...nomes.values()]
    .sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));

  if(!lista.length){
    el.innerHTML='<option value="">Nenhum motorista disponível</option>';
    return;
  }

  el.innerHTML = '<option value="">Selecione o motorista...</option>' + lista
    .map(m=>{
      const selecionado = nomeSaida && m.nome.toUpperCase() === nomeSaida.toUpperCase() ? ' selected' : '';
      const tag = m.origemSaida ? ' — motorista da saída' : '';
      return `<option value="${esc(m.nome)}"${selecionado}>${esc(m.nome + tag)}</option>`;
    })
    .join('');

  if(nomeSaida){
    setHintMotorista(`Motorista da saída: <b>${esc(nomeSaida)}</b>. Se o veículo retornou com outra pessoa, selecione o motorista correto.`);
  }else{
    setHintMotorista('Selecione o motorista que está retornando com o veículo.', '--yellow');
  }
}

async function onChangeVeiculo(){
  const id=document.getElementById('veiculo').value;
  const kmInput=document.getElementById('kmRetorno');
  const motoristaEl=document.getElementById('motorista');
  const veiculo=VEICULOS_NA_RUA.find(v=>v.id===id);

  MOVIMENTACAO_ATUAL=null;
  MOTORISTA_SAIDA='';
  VEICULO_ATUAL=null;

  if(!veiculo){
    KM_SAIDA=0;
    VEICULO_ATUAL=null;
    kmInput.value='';
    motoristaEl.innerHTML='<option value="">Selecione o veículo primeiro</option>';
    setHint('Selecione o veículo acima');
    setHintMotorista('Será preenchido com o motorista da saída, mas pode ser alterado.');
    validateForm();
    return;
  }

  setHint('Buscando saída em aberto...');
  VEICULO_ATUAL=veiculo;

  try{
    MOVIMENTACAO_ATUAL = await buscarMovimentacaoAberta(veiculo);

    KM_SAIDA = Number(String((MOVIMENTACAO_ATUAL?.KmSaida ?? MOVIMENTACAO_ATUAL?.kmSaida ?? kmAtualVeiculo(veiculo) ?? 0)).replace(',','.')) || 0;

    MOTORISTA_SAIDA =
      MOVIMENTACAO_ATUAL?.motorista ||
      MOVIMENTACAO_ATUAL?.Motorista ||
      veiculo.MotoristaAtual ||
      '';

    preencherMotoristasRetorno(MOTORISTA_SAIDA);

    kmInput.value = KM_SAIDA > 0 ? KM_SAIDA : '';

    atualizarHintVeiculo();

    setMsg('');

  }catch(e){
    console.error(e);

    KM_SAIDA = kmAtualVeiculo(veiculo);
    MOTORISTA_SAIDA = veiculo.MotoristaAtual || '';

    preencherMotoristasRetorno(MOTORISTA_SAIDA);

    kmInput.value = KM_SAIDA > 0 ? KM_SAIDA : '';
    atualizarHintVeiculo();
  }

  validateForm();
}

function validateForm(){
  const v=document.getElementById('veiculo').value;
  const k=Number(String(document.getElementById('kmRetorno').value||'0').replace(',','.'))||0;
  const m=document.getElementById('motorista').value;
  const s=document.getElementById('seguranca').value;
  const btn=document.getElementById('btnSalvar');
  let avisoKmEspecial=false;

  if(isConsulta()){
    btn.disabled=true;
    btn.title='Perfil CONSULTA não possui permissão para gravar entrada.';
    return;
  }

  if(v && k && m && s && k < KM_SAIDA){
    setMsg(`KM de retorno inferior ao KM de saída (${KM_SAIDA}).`, '--red');
    btn.disabled=true;
    return;
  }

  if(v && k && m && s){
    const veiculo = VEICULOS_NA_RUA.find(item=>item.id===v);
    const regra = regraKmRetorno(veiculo, k);
    if(regra?.tipo === 'bloqueio'){
      setMsg(regra.mensagem, '--red');
      btn.disabled=true;
      return;
    }
    if(regra?.tipo === 'senha'){
      setMsg(regra.mensagem, '--yellow');
      avisoKmEspecial=true;
    }
  }

  atualizarHintVeiculo();

  const atual=document.getElementById('msg').innerText||'';
  if(!avisoKmEspecial && atual.startsWith('KM de retorno')) setMsg('');

  btn.disabled = !(v && k && m && s) || inFlight;
}

async function doEnviar(){
  if(inFlight) return;

  if(isConsulta()){
    setMsg('Perfil CONSULTA não possui permissão para gravar entrada de veículo.', '--red');
    validateForm();
    return;
  }

  const veiculoId=document.getElementById('veiculo').value;
  const veiculo=VEICULOS_NA_RUA.find(v=>v.id===veiculoId);
  const KmRetorno=Number(String(document.getElementById('kmRetorno').value||'0').replace(',','.'))||0;
  const motoristaRetorno=motoristaSelecionadoTexto();
  const seguranca=document.getElementById('seguranca').value;

  if(!veiculo || !KmRetorno || !motoristaRetorno || !seguranca){
    validateForm();
    return;
  }

  if(KmRetorno < KM_SAIDA){
    setMsg(`KM de retorno inferior ao KM de saída (${KM_SAIDA}).`, '--red');
    return;
  }

  const regraKm = regraKmRetorno(veiculo, KmRetorno);
  if(regraKm?.tipo === 'bloqueio'){
    setMsg(regraKm.mensagem, '--red');
    validateForm();
    return;
  }
  if(regraKm?.tipo === 'senha'){
    const senha = window.prompt(`${regraKm.mensagem}\n\nDigite a senha diaria para liberar este lancamento:`);
    if(String(senha || '').trim() !== senhaKmRetornoHoje()){
      setMsg('Senha diaria invalida. Entrada nao gravada. Confira o KM ou procure o administrador.', '--red');
      validateForm();
      return;
    }
  }

  const houveTrocaMotorista =
    MOTORISTA_SAIDA &&
    motoristaRetorno &&
    MOTORISTA_SAIDA.trim().toUpperCase() !== motoristaRetorno.trim().toUpperCase();

  inFlight=true;
  document.getElementById('btnSalvar').disabled=true;
  setMsg('Gravando entrada no Firebase...', '--text-soft');

  try{
    const dadosEntrada = {
      tipo: 'ENTRADA',
      status: 'CONCLUIDO',
      Status: 'CONCLUIDO',

      segurancaEntrada: seguranca,
      SegurancaEntrada: seguranca,

      KmRetorno: KmRetorno,
      kmRetorno: KmRetorno,

      motoristaRetorno: motoristaRetorno,
      MotoristaRetorno: motoristaRetorno,

      motoristaSaida: MOTORISTA_SAIDA || motoristaRetorno,
      MotoristaSaida: MOTORISTA_SAIDA || motoristaRetorno,

      motoristaTrocaRetorno: houveTrocaMotorista,

      dataRetorno: serverTimestamp(),
      atualizadoEm: serverTimestamp(),
      origemEntrada: 'entrada.html'
    };

    let movimentacaoId = MOVIMENTACAO_ATUAL?.id || '';

    if(MOVIMENTACAO_ATUAL && MOVIMENTACAO_ATUAL.id){
      await updateDoc(doc(db,'movimentacoes_frota',MOVIMENTACAO_ATUAL.id), dadosEntrada);
    }else{
      const movimentacaoRef = await addDoc(collection(db,'movimentacoes_frota'), {
        ...dadosEntrada,
        veiculoId: veiculo.id,
        veiculo: textoVeiculo(veiculo),
        Veiculo: textoVeiculo(veiculo),
        placa: veiculo.Placa || veiculo.placa || '',
        motorista: MOTORISTA_SAIDA || motoristaRetorno,
        Motorista: MOTORISTA_SAIDA || motoristaRetorno,
        KmSaida: KM_SAIDA || kmAtualVeiculo(veiculo),
        kmSaida: KM_SAIDA || kmAtualVeiculo(veiculo),
        criadoEm: serverTimestamp()
      });
      movimentacaoId = movimentacaoRef.id;
    }

    await updateDoc(doc(db,'veiculos',veiculo.id), {
      EmTransito: false,
      KmAtualCadastro: KmRetorno,
      MotoristaAtual: '',
      DestinoAtual: '',
      UltimaEntradaEm: serverTimestamp()
    });

    await registrarAuditoria('REGISTRO_ENTRADA','movimentacoes_frota',movimentacaoId,{
      veiculoId: veiculo.id,
      kmRetorno: KmRetorno,
      motoristaRetorno,
      houveTrocaMotorista,
      placa: veiculo.Placa || veiculo.placa || ''
    });

    setMsg(
      houveTrocaMotorista
        ? 'Entrada gravada com troca de motorista no retorno.'
        : 'Entrada gravada com sucesso!',
      '--green'
    );

    setTimeout(()=>{
      location.href='veiculos.html';
    }, 1200);

  }catch(e){
    console.error(e);
    setMsg((e && e.message) ? e.message : 'Erro ao salvar no Firebase.', '--red');
    inFlight=false;
    validateForm();
  }
}

async function init(){
  AUTH=getAuth();

  if(!sessaoValidaLocal(AUTH)){
    clearAuth();
    location.href='index.html';
    return;
  }

  if(!(await garantirFirebaseAuth(AUTH))) return;

  const nome=nomeSeguranca(AUTH);
  document.getElementById('sessaoSegurancaTopo').textContent=nome;
  document.getElementById('seguranca').value=nome;

  if(isConsulta()){
    const consultaBox=document.getElementById('consultaBox');
    const btnSalvar=document.getElementById('btnSalvar');

    if(consultaBox) consultaBox.style.display='block';

    if(btnSalvar){
      btnSalvar.disabled=true;
      btnSalvar.innerText='SOMENTE CONSULTA';
      btnSalvar.title='Perfil CONSULTA não possui permissão para gravar entrada.';
    }
  }

  document.getElementById('veiculo').addEventListener('change', onChangeVeiculo);
  document.getElementById('kmRetorno').addEventListener('input', validateForm);
  document.getElementById('motorista').addEventListener('change', validateForm);
  document.getElementById('btnSalvar').addEventListener('click', doEnviar);
  document.getElementById('btnVoltarMenu').addEventListener('click', e=>{
    e.preventDefault();
    location.href='veiculos.html';
  });

  try{
    setMsg('Carregando veículos e motoristas...', '--text-soft');

    await Promise.all([
      carregarVeiculosNaRua(),
      carregarMotoristasAtivos()
    ]);

    setMsg('');

  }catch(e){
    console.error(e);
    setMsg('Erro ao carregar dados. Verifique regras/permissão do Firestore.', '--red');
    document.getElementById('veiculo').innerHTML='<option value="">Erro ao carregar</option>';
    document.getElementById('motorista').innerHTML='<option value="">Erro ao carregar</option>';
  }

  validateForm();
}

window.addEventListener('load', init);
</script>
