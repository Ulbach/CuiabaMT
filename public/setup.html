<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup de Usuários</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="justify-content: center; align-items: center; text-align: center;">

    <div class="container">
        <div class="card">
            <h2>Configuração Automática de Usuários</h2>
            <p class="card-subtitle">Clique no botão abaixo para criar os usuários de teste (Admin e Operador) no Firebase.</p>
            <p class="card-subtitle">Isso só precisa ser feito uma vez.</p>
            <div class="form-actions">
                <button id="setupButton" class="btn btn-primary">Iniciar Configuração</button>
            </div>
            <div id="setup-log" style="text-align: left; margin-top: 2rem; background: #333; padding: 1rem; border-radius: 8px; max-height: 300px; overflow-y: auto;">
                <p>Aguardando início...</p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- Setup Logic -->
    <script src="js/setup.js"></script>

</body>
</html>
