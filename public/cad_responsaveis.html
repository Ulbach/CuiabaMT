<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Cadastro de Responsáveis</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --bg1:#0b1220;
  --bg2:#0b0f17;
  --card:#0b1221;
  --border:#1d2940;
  --text:#e6edf7;
  --muted:#9fb0cc;
  --accent:#ef4444;
  --danger:#ff4d4f;
  --warn:#ffb020;
  --shadow:0 24px 64px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

html,body{
  min-height:100%;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
  background:
    radial-gradient(900px 360px at -10% -10%,#ef44441f 0%,transparent 60%),
    radial-gradient(900px 360px at 120% -20%,#06b6d41f 0%,transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:680px;
  margin:0 auto;
  padding:30px 16px;
}

.cad-top-actions{display:grid;grid-template-columns:54px minmax(0,1fr) 54px;align-items:center;gap:10px;margin:0 0 24px}
.cad-top-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:.2s ease}
.cad-top-btn:hover{transform:translateY(-2px);border-color:#b91c1c;box-shadow:0 10px 30px rgba(0,0,0,.28),0 0 12px rgba(239,68,68,.12)}
.cad-top-btn-danger{justify-self:end;color:#fecaca;background:rgba(255,77,79,.10);border-color:rgba(255,77,79,.28)}

.head{
  text-align:center;
  margin-bottom:22px;
}

.cad-top-actions .head{
  margin:0;
}

.chip{
  display:inline-flex;
  padding:6px 14px;
  border-radius:99px;
  border:1px solid var(--border);
  color:#fecaca;
  font-size:11px;
  font-weight:900;
  letter-spacing:1px;
  background:rgba(255,255,255,.03);
}

.logo{
  margin:0;
  font-size:clamp(28px,6.8vw,40px);
  font-weight:900;
  font-style:italic;
  line-height:1;
}

.logo span{
  display:block;
  color:#ff4d4d;
}

.tagline{
  margin-top:14px;
  font-size:10px;
  font-weight:900;
  letter-spacing:4px;
  color:var(--muted);
  opacity:.7;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
  overflow:hidden;
}

.card-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:900;
  text-align:center;
}

.field{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:12px;
  font-weight:900;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.7px;
}

input,select{
  width:100%;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.04);
  color:var(--text);
  padding:15px;
  font-size:16px;
  outline:none;
}

select option{
  color:#111;
}

input:focus,select:focus{
  border-color:#dc2626;
  box-shadow:0 0 0 3px rgba(239,68,68,.10);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.checkline{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(255,255,255,.03);
}

.checkline input{
  width:auto;
}

.checkline label{
  margin:0;
  color:var(--text);
  text-transform:none;
  letter-spacing:0;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px 18px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:12px;
  transition:.2s ease;
  color:var(--text);
}

.btn:hover{
  transform:translateY(-2px);
  border-color:#b91c1c;
  box-shadow:
    0 10px 30px rgba(0,0,0,.28),
    0 0 12px rgba(239,68,68,.12);
}

.btn-primary{
  background:var(--accent);
  color:#08131f;
}

.btn-light{
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid var(--border);
}

.btn-warn{
  background:rgba(255,176,32,.14);
  color:#ffd27a;
  border:1px solid rgba(255,176,32,.35);
}

.msg{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:14px;
  font-weight:900;
  text-align:center;
}

.msg.ok{
  display:block;
  color:#fecaca;
  background:rgba(239,68,68,.10);
  border:1px solid rgba(239,68,68,.25);
}

.msg.erro{
  display:block;
  color:#fff;
  background:rgba(255,77,79,.18);
  border:1px solid rgba(255,77,79,.35);
}

.msg.warn{
  display:block;
  color:#ffd27a;
  background:rgba(255,176,32,.12);
  border:1px solid rgba(255,176,32,.35);
}

.result{
  margin-top:14px;
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  display:none;
}

.result-item{
  padding:14px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.03);
}

.result-item:last-child{
  border-bottom:none;
}

.result-title{
  font-weight:900;
  font-size:15px;
}

.result-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
  line-height:1.45;
}

.edit-banner{
  display:none;
  margin-bottom:14px;
  padding:12px;
  border-radius:14px;
  color:#ffd27a;
  background:rgba(255,176,32,.12);
  border:1px solid rgba(255,176,32,.35);
  font-weight:900;
  text-align:center;
}

.consulta-box{
  display:none;
  margin-bottom:16px;
  padding:13px 14px;
  border-radius:14px;
  background:rgba(59,130,246,.10);
  border:1px solid rgba(125,211,252,.28);
  color:#bfdbfe;
  text-align:center;
  font-size:12px;
  font-weight:900;
  line-height:1.4;
}

body.perfil-consulta #tituloForm::after{
  content:" - SOMENTE CONSULTA";
  color:#7dd3fc;
}

body.perfil-consulta #formCadastro input{
  opacity:.62;
}

@media(max-width:620px){
  .row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <div class="cad-top-actions">
    <a class="cad-top-btn" href="admin.html" title="Voltar" aria-label="Voltar"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="head">
      <h1 class="logo">Cadastro de<span>Responsáveis</span></h1>
      <div class="tagline"># DELTA CUIABA #</div>
    </div>
    <a class="cad-top-btn cad-top-btn-danger" href="index.html" onclick="localStorage.removeItem('delta_auth_firebase_v1');localStorage.removeItem('delta_auth_v1');" title="Sair" aria-label="Sair"><i class="fa-solid fa-right-from-bracket"></i></a>
  </div>

  <div class="card">
    <h2 class="card-title">Consulta</h2>

    <div class="row">
      <div class="field">
        <label for="TipoBuscaResponsavel">Buscar por</label>
        <select id="TipoBuscaResponsavel">
          <option value="nome">Nome</option>
          <option value="area">Área</option>
          <option value="email">E-mail</option>
        </select>
      </div>

      <div class="field">
        <label for="BuscaResponsavel">Valor da busca</label>
        <input id="BuscaResponsavel" placeholder="Digite nome, área ou e-mail">
      </div>
    </div>

    <button class="btn btn-light" type="button" onclick="consultarResponsavel()">Consultar</button>

    <div id="resultado" class="result"></div>
  </div>

  <div class="consulta-box" id="consultaBox">
    Perfil CONSULTA: consulta liberada. Inclusão e edição de responsáveis bloqueadas.
  </div>

  <div class="card">
    <h2 class="card-title" id="tituloForm">Novo Cadastro</h2>

    <div class="edit-banner" id="editBanner">
      Modo edição ativo. Após alterar, clique em Atualizar.
    </div>

    <form id="formCadastro" onsubmit="event.preventDefault(); salvarResponsavel();">

      <div class="field">
        <label for="nome">Nome *</label>
        <input id="nome" required placeholder="Nome do responsável">
      </div>

      <div class="field">
        <label for="area">Área / Setor</label>
        <input id="area" placeholder="Ex.: Administrativo, Operação, Manutenção">
      </div>

      <div class="row">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="email@empresa.com.br">
        </div>

        <div class="field">
          <label for="telefone">Telefone</label>
          <input id="telefone" maxlength="15" placeholder="(67) 99999-9999" oninput="onTelefoneInput()">
        </div>
      </div>

      <div class="checkline">
        <input id="ativo" type="checkbox" checked>
        <label for="ativo">Ativo</label>
      </div>

      <button class="btn btn-primary" id="btnSalvar" type="submit">Salvar</button>
      <button class="btn btn-warn" id="btnCancelarEdicao" type="button" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button>
      <a class="btn btn-light" href="admin.html">Voltar</a>

      <div id="msg" class="msg"></div>
    </form>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  limit,
  serverTimestamp,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth as getFirebaseAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
getFirebaseAuth(app);
const db = getFirestore(app);

const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';

let AUTH = null;
let modoEdicao = false;
let editId = null;
let resultadosCache = [];

async function registrarAuditoria(tipo, alvoColecao, alvoId, detalhes={}){
  try{
    await addDoc(collection(db,"auditoria"),{
      tipo,
      alvoColecao,
      alvoId,
      usuarioUid: AUTH?.uid || "",
      usuarioNome: AUTH?.Nome || AUTH?.seguranca || AUTH?.nome || "",
      usuarioEmail: AUTH?.Email || AUTH?.email || "",
      usuarioPerfil: AUTH?.Perfil || AUTH?.perfil || "",
      origem: "cad_responsaveis.html",
      detalhes,
      criadoEm: serverTimestamp()
    });
  }catch(e){
    console.warn("Falha ao registrar auditoria:", e);
  }
}

function getAuth(){
  try{
    return JSON.parse(
      localStorage.getItem(STORAGE_KEY) ||
      localStorage.getItem(STORAGE_KEY_LEGADO) ||
      'null'
    );
  }catch(_){
    return null;
  }
}

function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
}

function nomeAuth(auth){
  return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || auth?.email || '';
}

function perfilAuth(auth){
  return String(auth?.Perfil || auth?.perfil || auth?.tipo || auth?.Tipo || 'OPERADOR').trim().toUpperCase();
}

function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return !!nomeAuth(auth);
}

function isConsulta(){
  return perfilAuth(AUTH) === 'CONSULTA';
}

function aplicarPerfilConsulta(){
  AUTH = getAuth();

  if(!sessaoValidaLocal(AUTH)){
    clearAuth();
    location.href = 'index.html';
    return;
  }

  if(isConsulta()){
    document.body.classList.add('perfil-consulta');

    const box = document.getElementById('consultaBox');
    const btn = document.getElementById('btnSalvar');
    const cancelar = document.getElementById('btnCancelarEdicao');

    if(box) box.style.display = 'block';

    if(btn){
      btn.disabled = true;
      btn.textContent = 'SOMENTE CONSULTA';
      btn.title = 'Perfil CONSULTA não possui permissão para salvar responsáveis.';
    }

    if(cancelar) cancelar.style.display = 'none';
  }
}

function texto(id){
  return (document.getElementById(id)?.value || "").trim();
}

function bool(id){
  return !!document.getElementById(id)?.checked;
}

function upper(v){
  return String(v || "").trim().toUpperCase();
}

function lower(v){
  return String(v || "").trim().toLowerCase();
}

function somenteNumeros(v){
  return String(v || "").replace(/\D/g,"");
}

function mascaraTelefone(v){
  v = somenteNumeros(v).slice(0,11);
  if(v.length <= 10){
    v = v.replace(/(\d{2})(\d)/,"($1) $2");
    v = v.replace(/(\d{4})(\d)/,"$1-$2");
  }else{
    v = v.replace(/(\d{2})(\d)/,"($1) $2");
    v = v.replace(/(\d{5})(\d)/,"$1-$2");
  }
  return v;
}

function onTelefoneInput(){
  const el = document.getElementById("telefone");
  el.value = mascaraTelefone(el.value);
}

function esc(v){
  return String(v == null ? "" : v)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function msg(t,tipo="ok"){
  const el = document.getElementById("msg");
  if(el){
    el.textContent = t;
    el.className = "msg " + tipo;
  }
}

function limparMsg(){
  const el = document.getElementById("msg");
  if(el){
    el.textContent = "";
    el.className = "msg";
  }
}

function limparResultado(){
  const r = document.getElementById("resultado");
  if(r){
    r.innerHTML = "";
    r.style.display = "none";
  }
}

function mostrarResultado(html){
  const r = document.getElementById("resultado");
  if(r){
    r.innerHTML = html;
    r.style.display = "block";
  }
}

function setModoEdicao(ativo,id=null){
  if(isConsulta()){
    modoEdicao = false;
    editId = null;

    const titulo = document.getElementById("tituloForm");
    const btn = document.getElementById("btnSalvar");
    const cancelar = document.getElementById("btnCancelarEdicao");
    const banner = document.getElementById("editBanner");

    if(titulo) titulo.textContent = "Novo Cadastro";
    if(btn){
      btn.disabled = true;
      btn.textContent = "SOMENTE CONSULTA";
      btn.title = "Perfil CONSULTA não possui permissão para salvar responsáveis.";
    }
    if(cancelar) cancelar.style.display = "none";
    if(banner) banner.style.display = "none";
    return;
  }

  modoEdicao = ativo;
  editId = id;

  const titulo = document.getElementById("tituloForm");
  const btn = document.getElementById("btnSalvar");
  const cancelar = document.getElementById("btnCancelarEdicao");
  const banner = document.getElementById("editBanner");

  if(ativo){
    if(titulo) titulo.textContent = "Editando Cadastro";
    if(btn){
      btn.textContent = "Atualizar no Firebase";
      btn.disabled = false;
    }
    if(cancelar) cancelar.style.display = "flex";
    if(banner) banner.style.display = "block";
  }else{
    if(titulo) titulo.textContent = "Novo Cadastro";
    if(btn){
      btn.textContent = "Salvar";
      btn.disabled = false;
    }
    if(cancelar) cancelar.style.display = "none";
    if(banner) banner.style.display = "none";
  }
}

function cancelarEdicao(){
  document.getElementById("formCadastro").reset();
  setModoEdicao(false);
  document.getElementById("ativo").checked = true;
  msg("Edição cancelada.","warn");
}

async function carregarTodos(){
  const snap = await getDocs(query(collection(db,"responsaveis"),limit(1000)));
  return snap.docs
    .map(d => ({id:d.id,...d.data()}))
    .filter(d => d && d.Modelo !== true);
}

async function existeNomeDuplicado(nome,ignorarId=null){
  const todos = await carregarTodos();
  const nomeNormalizado = upper(nome);

  return todos.some(r => r.id !== ignorarId && upper(r.nome) === nomeNormalizado);
}

function renderResponsavel(d,idx){
  const editBtn = isConsulta()
    ? ""
    : `<button class="btn btn-warn" type="button" onclick="editarResponsavel(${idx})">Editar cadastro</button>`;

  return `<div class="result-item">
    <div class="result-title">${esc(d.nome || "-")}</div>
    <div class="result-sub">
      Área: ${esc(d.area || "-")}<br>
      E-mail: ${esc(d.email || "-")}<br>
      Telefone: ${esc(d.telefone || "-")}<br>
      Ativo: ${d.ativo ? "Sim" : "Não"}
    </div>
    ${editBtn}
  </div>`;
}

function editarResponsavel(idx){
  if(isConsulta()){
    msg('Perfil CONSULTA não possui permissão para editar responsáveis.','warn');
    return;
  }

  const d = resultadosCache[idx];
  if(!d) return;

  nome.value = d.nome || "";
  area.value = d.area || "";
  email.value = d.email || "";
  telefone.value = d.telefone || "";
  ativo.checked = !!d.ativo;

  setModoEdicao(true,d.id);
  formCadastro.scrollIntoView({behavior:"smooth"});
}

async function salvarResponsavel(){
  limparMsg();

  if(isConsulta()){
    msg('Perfil CONSULTA não possui permissão para salvar responsáveis.','erro');
    return;
  }

  const nomeValor = upper(texto("nome"));
  const areaValor = upper(texto("area"));
  const emailValor = lower(texto("email"));
  const telefoneValor = mascaraTelefone(texto("telefone"));
  const ativoValor = bool("ativo");

  if(!nomeValor){
    msg("Campo obrigatório: Nome.","erro");
    return;
  }

  try{
    if(await existeNomeDuplicado(nomeValor,modoEdicao ? editId : null)){
      msg("Duplicidade bloqueada: já existe responsável com este nome.","erro");
      return;
    }

    const dados = {
      nome: nomeValor,
      area: areaValor,
      email: emailValor,
      telefone: telefoneValor,
      ativo: ativoValor,
      atualizadoEm: serverTimestamp()
    };

    if(modoEdicao){
      await updateDoc(doc(db,"responsaveis",editId),dados);
      await registrarAuditoria("ALTERACAO_RESPONSAVEL","responsaveis",editId,{
        ativo: ativoValor,
        area: areaValor
      });
      msg("Responsável atualizado com sucesso.");
    }else{
      const novo = await addDoc(collection(db,"responsaveis"),{
        ...dados,
        criadoEm: serverTimestamp()
      });
      await registrarAuditoria("CRIACAO_RESPONSAVEL","responsaveis",novo.id,{
        ativo: ativoValor,
        area: areaValor
      });
      msg("Responsável cadastrado com sucesso.");
    }

    formCadastro.reset();
    ativo.checked = true;
    setModoEdicao(false);
    limparResultado();

  }catch(e){
    console.error(e);
    msg("Erro ao salvar responsável no Firebase.","erro");
  }
}

async function consultarResponsavel(){
  limparMsg();
  limparResultado();
  setModoEdicao(false);

  const termo = texto("BuscaResponsavel");
  const tipo = texto("TipoBuscaResponsavel");

  if(!termo){
    msg("Informe um valor para consultar.","warn");
    return;
  }

  try{
    const todos = await carregarTodos();
    const busca = upper(termo);

    resultadosCache = todos.filter(r => {
      const valor = tipo === "email"
        ? lower(r.email).includes(lower(termo))
        : upper(r[tipo]).includes(busca);

      return valor;
    }).slice(0,20);

    if(!resultadosCache.length){
      msg("Nenhum responsável encontrado.","warn");
      return;
    }

    mostrarResultado(resultadosCache.map(renderResponsavel).join(""));

  }catch(e){
    console.error(e);
    msg("Erro ao consultar responsáveis.","erro");
  }
}

Object.assign(window,{
  salvarResponsavel,
  consultarResponsavel,
  editarResponsavel,
  cancelarEdicao,
  onTelefoneInput
});

window.addEventListener('load', aplicarPerfilConsulta);
</script>

</body>
</html>
