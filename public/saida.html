<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Frota Pro — Registrar Saída</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg1:#061427;
      --bg2:#0b1b33;
      --card:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
      --shadow:0 16px 40px rgba(0,0,0,.45);
      --radius:20px;
      --text-main:#e6edf7;
      --text-soft:#9fb4d3;
      --text-muted:#7b8ca7;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --yellow:#f59e0b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text-main);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:440px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:30px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .session-box{
      margin:-6px 0 18px 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(34,197,94,0.08);
      border:1px solid rgba(34,197,94,0.18);
      text-align:center;
      font-size:13px;
      color:#9fb4d3;
    }

    .session-box strong{color:#e6edf7}

    .header{
      text-align:center;
      margin-bottom:25px;
    }

    .header h2{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-0.5px;
      color:var(--red);
    }

    .header p{
      margin:5px 0 0;
      font-size:11px;
      color:var(--text-soft);
      text-transform:uppercase;
      letter-spacing:2px;
      font-weight:600;
    }

    .field{margin-bottom:18px}

    label{
      display:block;
      font-size:11px;
      font-weight:700;
      color:var(--text-muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .input-group{position:relative}

    .input-group i{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--red);
      font-size:14px;
      pointer-events:none;
      z-index:1;
    }

    select,input{
      width:100%;
      background:rgba(0,0,0,0.2);
      border:1px solid var(--border);
      padding:13px 13px 13px 40px;
      border-radius:12px;
      color:#fff;
      font-size:15px;
      outline:none;
      transition:0.2s;
    }

    select option{
      background:#0b1b33;
      color:#fff;
    }

    select:focus,input:focus{
      border-color:var(--red);
      background:rgba(255,255,255,0.05);
    }

    input[readonly]{
      opacity:.9;
      cursor:not-allowed;
    }

    .hint{
      margin-top:7px;
      font-size:12px;
      color:var(--text-soft);
      min-height:16px;
    }

    .btn-save{
      width:100%;
      padding:16px;
      background:var(--green);
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
      transition:0.25s;
      box-shadow:0 10px 24px rgba(34,197,94,.18);
    }

    .btn-save:active{
      transform:scale(.98);
    }

    .btn-save:disabled{
      opacity:0.18;
      cursor:not-allowed;
      filter:grayscale(1);
      box-shadow:none;
    }

    .btn-back{
      display:block;
      text-align:center;
      margin-top:20px;
      color:var(--text-soft);
      text-decoration:none;
      font-size:13px;
      font-weight:600;
      transition:0.2s;
    }

    .btn-back:hover{color:#fff}

    #msg{
      text-align:center;
      margin-top:15px;
      font-size:13px;
      font-weight:700;
      min-height:1.5em;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="session-box">
      Segurança logado: <strong id="sessaoSegurancaTopo">...</strong>
    </div>

    <div class="header">
      <h2>Saída de Veículo</h2>
      <p># DELTA CUIABÁ #</p>
    </div>

    <div class="field">
      <label>Veículo</label>
      <div class="input-group">
        <i class="fa-solid fa-car-side"></i>
        <select id="veiculo">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div id="hintKm" class="hint">Selecione o veículo</div>
    </div>

    <div class="field">
      <label>Motorista</label>
      <div class="input-group">
        <i class="fa-solid fa-user-tie"></i>
        <select id="motorista">
          <option value="">Carregando...</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Segurança Logado</label>
      <div class="input-group">
        <i class="fa-solid fa-shield-halved"></i>
        <input type="text" id="seguranca" placeholder="Aguardando login..." readonly>
      </div>
    </div>

    <div class="field">
      <label>KM de Saída</label>
      <div class="input-group">
        <i class="fa-solid fa-gauge-high"></i>
        <input type="number" id="kmSaida" placeholder="Digite o KM atual" inputmode="numeric" min="0">
      </div>
    </div>

    <div class="field">
      <label>Destino</label>
      <div class="input-group">
        <i class="fa-solid fa-location-dot"></i>
        <input type="text" id="destino" placeholder="Destino">
      </div>
    </div>

    <button class="btn-save" id="btnSalvar" disabled>GRAVAR SAÍDA</button>

    <a href="veiculos.html" id="btnVoltarMenu" class="btn-back">← VOLTAR AO MENU</a>

    <div id="msg"></div>
  </div>

<script>
/*
  SAÍDA.HTML — VERSÃO FIREBASE / FUNCTIONS

  Espera os seguintes endpoints no Firebase Functions via Hosting rewrite:

  GET  /api/veiculos
       retorno: { ok:true, veiculos:[...] }

  GET  /api/motoristas
       retorno: { ok:true, motoristas:[...] }

  GET  /api/kmAtual?veiculo=...
       retorno: { ok:true, km:12345 }

  POST /api/saida
       body:
       {
         token,
         veiculo,
         motorista,
         seguranca,
         KmSaida,
         destino
       }

  Opcional:
  GET /api/validarSessao?token=...
  GET /api/logoutSeguranca?token=...
*/

const API_BASE = '/api';
const STORAGE_KEY = 'delta_auth_v1';
const SESSION_RECHECK_MS = 5 * 60 * 1000;

let AUTH = null;
let inFlight = false;
let KM_ANTERIOR = 0;
const KM_CACHE = Object.create(null);

function getAuth(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  }catch(_){
    return null;
  }
}

function setAuth(auth){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(auth));
}

function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
}

function sessaoValidaLocal(auth){
  return !!(
    auth &&
    auth.token &&
    auth.expiraEm &&
    Number(auth.expiraEm) > Date.now()
  );
}

function apiUrl(path, params){
  const url = new URL(API_BASE + path, window.location.origin);
  Object.entries(params || {}).forEach(([k,v])=>{
    if(v !== undefined && v !== null && v !== ''){
      url.searchParams.set(k, v);
    }
  });
  return url.toString();
}

async function apiGet(path, params){
  const resp = await fetch(apiUrl(path, params), {
    method:'GET',
    headers:{'Accept':'application/json'},
    cache:'no-store'
  });

  const data = await resp.json().catch(()=>null);

  if(!resp.ok || !data || data.ok === false){
    throw new Error((data && (data.message || data.error)) || 'Erro na comunicação com o servidor.');
  }

  return data;
}

async function apiPost(path, payload){
  const resp = await fetch(apiUrl(path), {
    method:'POST',
    headers:{
      'Accept':'application/json',
      'Content-Type':'application/json'
    },
    body:JSON.stringify(payload || {})
  });

  const data = await resp.json().catch(()=>null);

  if(!resp.ok || !data || data.ok === false){
    throw new Error((data && (data.message || data.error)) || 'Erro na comunicação com o servidor.');
  }

  return data;
}

async function validarSessaoOuRedirecionar(forceRemote){
  const auth = getAuth();

  if(!sessaoValidaLocal(auth)){
    clearAuth();
    location.href = 'index.html';
    return null;
  }

  const ultimoCheck = Number(auth.ultimoCheck || 0);
  const precisaRevalidar = !!forceRemote || !ultimoCheck || (Date.now() - ultimoCheck > SESSION_RECHECK_MS);

  if(!precisaRevalidar){
    return auth;
  }

  try{
    const res = await apiGet('/validarSessao', { token: auth.token });

    if(res && res.ok && res.autenticado){
      const novoAuth = {
        token: auth.token,
        seguranca: res.seguranca || auth.seguranca || '',
        expiraEm: res.expiraEm || auth.expiraEm,
        ultimoCheck: Date.now()
      };

      setAuth(novoAuth);
      return novoAuth;
    }

    throw new Error('Sessão inválida.');
  }catch(_){
    /*
      Durante a transição para Firebase, se o endpoint validarSessao
      ainda não existir, mantém a sessão local válida.
    */
    return auth;
  }
}

async function logoutSistema(){
  const auth = getAuth();

  try{
    if(auth && auth.token){
      await apiGet('/logoutSeguranca', { token: auth.token });
    }
  }catch(_){}

  clearAuth();
  location.href = 'index.html';
}

function esc(v){
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function normalizarLista(res, campoPrincipal){
  if(Array.isArray(res)) return res;
  if(res && Array.isArray(res[campoPrincipal])) return res[campoPrincipal];
  if(res && Array.isArray(res.items)) return res.items;
  if(res && Array.isArray(res.dados)) return res.dados;
  return [];
}

function obterNomeItem(item, campos){
  if(typeof item === 'string') return item;

  for(const campo of campos){
    if(item && item[campo] !== undefined && item[campo] !== null && String(item[campo]).trim() !== ''){
      return String(item[campo]).trim();
    }
  }

  return '';
}

function preencherSelect(el, lista, placeholder, campos){
  const opcoes = (lista || [])
    .map(item => obterNomeItem(item, campos))
    .filter(Boolean)
    .sort((a,b)=>a.localeCompare(b,'pt-BR'))
    .map(nome => `<option value="${esc(nome)}">${esc(nome)}</option>`)
    .join('');

  el.innerHTML = `<option value="">${esc(placeholder)}</option>` + opcoes;
}

function setMsg(texto, corVar){
  const msg = document.getElementById('msg');
  msg.style.color = corVar ? `var(${corVar})` : 'var(--text-soft)';
  msg.innerText = texto || '';
}

function setHint(texto, corVar){
  const hint = document.getElementById('hintKm');
  hint.style.color = corVar ? `var(${corVar})` : 'var(--text-soft)';
  hint.innerHTML = texto || '';
}

async function carregarVeiculos(){
  const veiculoEl = document.getElementById('veiculo');

  try{
    const res = await apiGet('/veiculos', { t: Date.now() });
    const lista = normalizarLista(res, 'veiculos');

    preencherSelect(
      veiculoEl,
      lista,
      'Selecione...',
      ['veiculo','nome','placa','id','descricao']
    );

    if(!lista.length){
      veiculoEl.innerHTML = '<option value="">Nenhum veículo ativo</option>';
    }
  }catch(e){
    veiculoEl.innerHTML = '<option value="">Erro ao carregar</option>';
    throw new Error((e && e.message) || 'Falha ao carregar veículos.');
  }
}

async function carregarMotoristas(){
  const motoristaEl = document.getElementById('motorista');

  try{
    const res = await apiGet('/motoristas', { t: Date.now() });
    const lista = normalizarLista(res, 'motoristas');

    preencherSelect(
      motoristaEl,
      lista,
      'Selecione...',
      ['motorista','nome','nomeMotorista','descricao']
    );

    if(!lista.length){
      motoristaEl.innerHTML = '<option value="">Nenhum motorista ativo</option>';
    }
  }catch(e){
    motoristaEl.innerHTML = '<option value="">Erro ao carregar</option>';
    throw new Error((e && e.message) || 'Falha ao carregar motoristas.');
  }
}

async function buscarKmAtual(veiculo){
  if(!veiculo) return 0;

  if(KM_CACHE[veiculo] !== undefined){
    return Number(KM_CACHE[veiculo] || 0);
  }

  const res = await apiGet('/kmAtual', {
    veiculo,
    t: Date.now()
  });

  const km = Number(
    String(
      res.km ??
      res.kmAtual ??
      res.KmAtual ??
      res.ultimoKm ??
      0
    ).replace(',','.')
  ) || 0;

  KM_CACHE[veiculo] = km;
  return km;
}

async function onChangeVeiculo(){
  const veiculo = document.getElementById('veiculo').value;
  const kmInput = document.getElementById('kmSaida');

  if(!veiculo){
    KM_ANTERIOR = 0;
    kmInput.value = '';
    setHint('Selecione o veículo');
    validateForm();
    return;
  }

  kmInput.value = '';
  setHint('🔍 Buscando último KM...');

  try{
    KM_ANTERIOR = await buscarKmAtual(veiculo);

    if(KM_ANTERIOR > 0){
      kmInput.value = KM_ANTERIOR;
      setHint(`Último KM registrado: <b>${esc(KM_ANTERIOR)}</b>`);
    }else{
      setHint('Sem KM anterior encontrado.', '--yellow');
    }

    setMsg('');
  }catch(e){
    KM_ANTERIOR = 0;
    kmInput.value = '';
    setHint('Não foi possível buscar o KM.', '--red');
  }

  validateForm();
}

function validateForm(){
  const v = document.getElementById('veiculo').value;
  const m = document.getElementById('motorista').value;
  const s = document.getElementById('seguranca').value;
  const k = document.getElementById('kmSaida').value;
  const d = document.getElementById('destino').value.trim();
  const btn = document.getElementById('btnSalvar');

  const ok = !!(v && m && s && String(k).trim() !== '' && d);
  const kmDigitado = Number(String(k || '0').replace(',','.')) || 0;
  const kmOk = kmDigitado >= KM_ANTERIOR;

  if(ok && !kmOk){
    setMsg(`KM inferior ao último registrado (${KM_ANTERIOR}).`, '--red');
    btn.disabled = true;
    return;
  }

  const msgAtual = document.getElementById('msg').innerText || '';
  if(msgAtual.startsWith('KM inferior')){
    setMsg('');
  }

  btn.disabled = !ok || !kmOk || inFlight;
}

async function doEnviar(){
  if(inFlight || !AUTH || !AUTH.token) return;

  const veiculo = document.getElementById('veiculo').value;
  const motorista = document.getElementById('motorista').value;
  const seguranca = document.getElementById('seguranca').value;
  const KmSaida = Number(String(document.getElementById('kmSaida').value || '0').replace(',','.')) || 0;
  const destino = document.getElementById('destino').value.trim();

  if(!veiculo || !motorista || !seguranca || !KmSaida || !destino){
    validateForm();
    return;
  }

  if(KmSaida < KM_ANTERIOR){
    setMsg(`KM inferior ao último registrado (${KM_ANTERIOR}).`, '--red');
    validateForm();
    return;
  }

  inFlight = true;
  document.getElementById('btnSalvar').disabled = true;
  setMsg('Gravando saída...', '--text-soft');

  const payload = {
    token: AUTH.token,
    veiculo,
    motorista,
    seguranca,
    KmSaida,
    destino,
    origem: 'saida.html',
    criadoEmCliente: new Date().toISOString()
  };

  try{
    await apiPost('/saida', payload);

    setMsg('✅ Gravado com sucesso!', '--green');

    setTimeout(()=>{
      location.href = 'veiculos.html';
    }, 1200);

  }catch(e){
    setMsg((e && e.message) ? e.message : 'Erro ao salvar.', '--red');
    inFlight = false;
    validateForm();
  }
}

async function init(){
  const veiculoEl = document.getElementById('veiculo');
  const motoristaEl = document.getElementById('motorista');
  const segurancaEl = document.getElementById('seguranca');
  const topo = document.getElementById('sessaoSegurancaTopo');

  AUTH = await validarSessaoOuRedirecionar(false);
  if(!AUTH) return;

  const nomeSeguranca = AUTH.seguranca || AUTH.nome || AUTH.usuario || '';
  topo.textContent = nomeSeguranca || '---';
  segurancaEl.value = nomeSeguranca;

  veiculoEl.addEventListener('change', onChangeVeiculo);
  motoristaEl.addEventListener('change', validateForm);
  document.getElementById('kmSaida').addEventListener('input', validateForm);
  document.getElementById('destino').addEventListener('input', validateForm);
  document.getElementById('btnSalvar').addEventListener('click', doEnviar);

  const btnVoltar = document.getElementById('btnVoltarMenu');
  if(btnVoltar){
    btnVoltar.addEventListener('click', function(e){
      e.preventDefault();
      location.href = 'veiculos.html';
    });
  }

  try{
    await Promise.all([
      carregarVeiculos(),
      carregarMotoristas()
    ]);

    setMsg('');
  }catch(e){
    setMsg((e && e.message) ? e.message : 'Erro ao carregar dados.', '--red');
  }

  validateForm();
}

window.addEventListener('load', init);
</script>

</body>
</html>
