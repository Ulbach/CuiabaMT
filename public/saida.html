<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Delta Cuiabá - Registrar Saída</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg1:#061427;
      --bg2:#0b1b33;
      --card:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
      --shadow:0 16px 40px rgba(0,0,0,.45);
      --radius:20px;
      --text-main:#e6edf7;
      --text-soft:#9fb4d3;
      --text-muted:#7b8ca7;
      --green:#ef4444;
      --red:#ef4444;
      --blue:#3b82f6;
      --yellow:#f59e0b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text-main);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:440px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:30px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .session-box{
      margin:-6px 0 18px 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(239,68,68,0.08);
      border:1px solid rgba(239,68,68,0.18);
      text-align:center;
      font-size:13px;
      color:#9fb4d3;
    }

    .session-box strong{color:#e6edf7}

    .consulta-box{
      display:none;
      margin:-4px 0 18px 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(59,130,246,0.10);
      border:1px solid rgba(125,211,252,0.28);
      color:#bfdbfe;
      text-align:center;
      font-size:12px;
      font-weight:800;
      line-height:1.35;
    }

    .header{
      text-align:center;
      margin-bottom:25px;
    }

    .header h2{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-0.5px;
      color:var(--red);
    }

    .header p{
      margin:5px 0 0;
      font-size:11px;
      color:var(--text-soft);
      text-transform:uppercase;
      letter-spacing:2px;
      font-weight:600;
    }

    .field{margin-bottom:18px}

    label{
      display:block;
      font-size:11px;
      font-weight:700;
      color:var(--text-muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .input-group{position:relative}

    .input-group i{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--red);
      font-size:14px;
      pointer-events:none;
      z-index:1;
    }

    select,
    input{
      width:100%;
      background:rgba(0,0,0,0.2);
      border:1px solid var(--border);
      padding:13px 13px 13px 40px;
      border-radius:12px;
      color:#fff;
      font-size:15px;
      outline:none;
      transition:0.2s;
    }

    select option{
      background:#0b1b33;
      color:#fff;
    }

    select:focus,
    input:focus{
      border-color:var(--red);
      background:rgba(255,255,255,0.05);
    }

    input[readonly]{
      opacity:.9;
      cursor:not-allowed;
    }

    select:disabled,
    input:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .hint{
      margin-top:7px;
      font-size:12px;
      color:var(--text-soft);
      min-height:16px;
      line-height:1.4;
    }

    .oil-info{
      display:block;
      margin-top:6px;
      font-weight:800;
    }

    .oil-warn{color:var(--yellow)}
    .oil-over{color:var(--red)}

    .btn-save{
      width:100%;
      padding:16px;
      background:var(--green);
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
      transition:0.25s;
      box-shadow:0 10px 24px rgba(239,68,68,.18);
    }

    .btn-save:active{transform:scale(.98)}

    .btn-save:disabled{
      opacity:0.18;
      cursor:not-allowed;
      filter:grayscale(1);
      box-shadow:none;
    }

    .btn-back{
      display:block;
      text-align:center;
      margin-top:20px;
      color:var(--text-soft);
      text-decoration:none;
      font-size:13px;
      font-weight:600;
      transition:0.2s;
    }

    .btn-back:hover{color:#fff}

    #msg{
      text-align:center;
      margin-top:15px;
      font-size:13px;
      font-weight:700;
      min-height:1.5em;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="session-box">
      Segurança logado: <strong id="sessaoSegurancaTopo">...</strong>
    </div>

    <div class="consulta-box" id="consultaBox">
      Perfil CONSULTA: visualização liberada. Gravação de saída bloqueada.
    </div>

    <div class="header">
      <h2>Saída de Veículo</h2>
      <p># DELTA CUIABA #</p>
    </div>

    <div class="field">
      <label>Motorista</label>
      <div class="input-group">
        <i class="fa-solid fa-user-tie"></i>
        <select id="motorista">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div id="hintMotorista" class="hint">Selecione o motorista para liberar os veículos.</div>
    </div>

    <div class="field">
      <label>Veículo</label>
      <div class="input-group">
        <i class="fa-solid fa-car-side"></i>
        <select id="veiculo" disabled>
          <option value="">Selecione o motorista primeiro</option>
        </select>
      </div>
      <div id="hintKm" class="hint">Selecione o veículo</div>
    </div>

    <div class="field">
      <label>Segurança Logado</label>
      <div class="input-group">
        <i class="fa-solid fa-shield-halved"></i>
        <input type="text" id="seguranca" placeholder="Aguardando login..." readonly>
      </div>
    </div>

    <div class="field">
      <label>KM de Saída</label>
      <div class="input-group">
        <i class="fa-solid fa-gauge-high"></i>
        <input type="number" id="kmSaida" placeholder="Digite o KM atual" inputmode="numeric" min="0">
      </div>
    </div>

    <div class="field">
      <label>Destino</label>
      <div class="input-group">
        <i class="fa-solid fa-location-dot"></i>
        <input type="text" id="destino" placeholder="Destino">
      </div>
    </div>

    <button class="btn-save" id="btnSalvar" disabled>GRAVAR SAÍDA</button>

    <a href="veiculos.html" id="btnVoltarMenu" class="btn-back">VOLTAR AO MENU</a>

    <div id="msg"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  doc,
  updateDoc,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth as getFirebaseAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeG7uirpSS3N0I48fy7WqJa_SSrb8A-48",
  authDomain: "cuiaba-01617931-f126e.firebaseapp.com",
  projectId: "cuiaba-01617931-f126e",
  storageBucket: "cuiaba-01617931-f126e.firebasestorage.app",
  messagingSenderId: "797115279316",
  appId: "1:797115279316:web:f229366de16d4e066e1841"
};

const app = initializeApp(firebaseConfig);
getFirebaseAuth(app);
const db = getFirestore(app);

const STORAGE_KEY = 'delta_auth_firebase_v1';
const STORAGE_KEY_LEGADO = 'delta_auth_v1';

let AUTH = null;
let inFlight = false;
let TODOS_VEICULOS = [];
let VEICULOS = [];
let MOTORISTAS = [];
let KM_ANTERIOR = 0;
let VEICULO_ATUAL = null;

function getAuth(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(STORAGE_KEY_LEGADO) || 'null');
  }catch(_){
    return null;
  }
}

function clearAuth(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY_LEGADO);
}

function sessaoValidaLocal(auth){
  if(!auth) return false;
  if(auth.expiraEm && Number(auth.expiraEm) <= Date.now()) return false;
  return !!(auth.Nome || auth.seguranca || auth.nome || auth.usuario || auth.email);
}

function nomeSeguranca(auth){
  return auth?.Nome || auth?.seguranca || auth?.nome || auth?.usuario || auth?.email || '---';
}

function perfilAuth(auth){
  return String(auth?.Perfil || auth?.perfil || auth?.tipo || auth?.Tipo || 'OPERADOR').trim().toUpperCase();
}

function isConsulta(){
  return perfilAuth(AUTH) === 'CONSULTA';
}

function esc(v){
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function setMsg(texto, corVar){
  const msg = document.getElementById('msg');
  msg.style.color = corVar ? `var(${corVar})` : 'var(--text-soft)';
  msg.innerText = texto || '';
}

function setHint(texto, corVar){
  const hint = document.getElementById('hintKm');
  if(!hint) return;
  hint.style.color = corVar ? `var(${corVar})` : 'var(--text-soft)';
  hint.innerHTML = texto || '';
}

function setHintMotorista(texto, corVar){
  const hint = document.getElementById('hintMotorista');
  if(!hint) return;
  hint.style.color = corVar ? `var(${corVar})` : 'var(--text-soft)';
  hint.innerHTML = texto || '';
}

function textoVeiculo(v){
  const nome = v.Nome || v.nome || v.Veiculo || v.veiculo || 'Veículo';
  const placa = v.Placa || v.placa || '';
  return placa ? `${nome} - ${placa}` : nome;
}

function textoMotorista(m){
  return m.Nome || m.nome || m.Motorista || m.motorista || m.Descricao || m.descricao || 'Motorista';
}

function kmAtualVeiculo(v){
  return Number(String(v.KmAtualCadastro ?? v.KmAtual ?? v.kmAtual ?? v.Km ?? v.km ?? 0).replace(',','.')) || 0;
}

function kmTrocaOleoVeiculo(v){
  return Number(String(v.KmTrocaOleo ?? v.kmTrocaOleo ?? v.KmProximaTrocaOleo ?? v.kmProximaTrocaOleo ?? 0).replace(',','.')) || 0;
}

function avisoOleoHtml(v, kmReferencia){
  const kmTroca = kmTrocaOleoVeiculo(v);
  const kmAtual = Number(String(kmReferencia || 0).replace(',','.')) || 0;
  if(!kmTroca || !kmAtual) return '';

  const restante = kmTroca - kmAtual;

  if(restante < 0){
    return `<span class="oil-info oil-over">Informativo: troca de óleo ultrapassada em ${esc(Math.abs(restante))} km. Não bloqueia a operação.</span>`;
  }

  if(restante <= 500){
    return `<span class="oil-info oil-warn">Informativo: faltam ${esc(restante)} km para a troca de óleo. Não bloqueia a operação.</span>`;
  }

  return '';
}

function atualizarHintVeiculo(){
  const kmDigitado = Number(String(document.getElementById('kmSaida').value || '0').replace(',','.')) || KM_ANTERIOR;

  if(!VEICULO_ATUAL){
    setHint('Selecione o veículo');
    return;
  }

  const restritoTxt = veiculoRestrito(VEICULO_ATUAL) ? ' Restrito' : '';
  const avisoOleo = avisoOleoHtml(VEICULO_ATUAL, kmDigitado);

  setHint(
    KM_ANTERIOR > 0
      ? `Último KM registrado: <b>${esc(KM_ANTERIOR)}</b>.${restritoTxt}${avisoOleo}`
      : `Sem KM anterior encontrado.${restritoTxt}${avisoOleo}`,
    KM_ANTERIOR > 0 ? null : '--yellow'
  );
}

function veiculoRestrito(v){
  return (
    v.Restrito === true ||
    v.restrito === true ||
    v.Restrito === 'true' ||
    v.restrito === 'true' ||
    v.Restrito === 'Sim' ||
    v.restrito === 'Sim'
  );
}

function motoristaTemAcessoRestrito(m){
  return m && (
    m.AcessoRestrito === true ||
    m.acessoRestrito === true ||
    m.AcessoRestrito === 'true' ||
    m.acessoRestrito === 'true' ||
    m.AcessoRestrito === 'Sim' ||
    m.acessoRestrito === 'Sim' ||
    m.AcessoVeiculoRestrito === true ||
    m.AcessoVeiculosRestritos === true
  );
}

function motoristaSelecionado(){
  const id = document.getElementById('motorista').value;
  return MOTORISTAS.find(m=>m.id === id) || null;
}

function preencherMotoristas(){
  const el = document.getElementById('motorista');

  if(!MOTORISTAS.length){
    el.innerHTML = '<option value="">Nenhum motorista ativo</option>';
    return;
  }

  el.innerHTML = '<option value="">Selecione...</option>' + MOTORISTAS
    .sort((a,b)=>textoMotorista(a).localeCompare(textoMotorista(b),'pt-BR'))
    .map(m=>{
      const cadeado = motoristaTemAcessoRestrito(m) ? ' 🔒' : '';
      return `<option value="${esc(m.id)}">${esc(textoMotorista(m))}${cadeado}</option>`;
    })
    .join('');
}

function preencherVeiculos(){
  const el = document.getElementById('veiculo');

  if(!VEICULOS.length){
    el.disabled = true;
    el.innerHTML = '<option value="">Nenhum veículo disponível para este motorista</option>';
    return;
  }

  el.disabled = false;

  el.innerHTML = '<option value="">Selecione...</option>' + VEICULOS
    .sort((a,b)=>textoVeiculo(a).localeCompare(textoVeiculo(b),'pt-BR'))
    .map(v=>{
      const cadeado = veiculoRestrito(v) ? ' 🔒' : '';
      return `<option value="${esc(v.id)}">${esc(textoVeiculo(v))}${cadeado}</option>`;
    })
    .join('');
}

function filtrarVeiculosPorMotorista(){
  const motorista = motoristaSelecionado();
  const veiculoEl = document.getElementById('veiculo');
  const kmInput = document.getElementById('kmSaida');

  VEICULOS = [];
  VEICULO_ATUAL = null;
  veiculoEl.value = '';
  kmInput.value = '';
  KM_ANTERIOR = 0;
  setHint('Selecione o veículo');

  if(!motorista){
    veiculoEl.disabled = true;
    veiculoEl.innerHTML = '<option value="">Selecione o motorista primeiro</option>';
    setHintMotorista('Selecione o motorista para liberar os veículos.');
    validateForm();
    return;
  }

  const acessoRestrito = motoristaTemAcessoRestrito(motorista);

  VEICULOS = TODOS_VEICULOS.filter(v => {
    if(v.EmTransito === true) return false;
    if(veiculoRestrito(v)) return acessoRestrito;
    return true;
  });

  setHintMotorista(
    acessoRestrito
      ? 'Motorista com acesso a veículos restritos 🔒. Veículos restritos serão exibidos.'
      : 'Motorista sem acesso restrito. Apenas veículos normais serão exibidos.',
    acessoRestrito ? '--green' : null
  );

  preencherVeiculos();
  validateForm();
}

async function carregarVeiculos(){
  const snap = await getDocs(query(collection(db,'veiculos'), where('Ativo','==',true)));
  TODOS_VEICULOS = snap.docs.map(d=>({ id:d.id, ...d.data() }));
}

async function carregarMotoristas(){
  const snap = await getDocs(query(collection(db,'motoristas'), where('Ativo','==',true)));
  MOTORISTAS = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  preencherMotoristas();
}

function onChangeVeiculo(){
  const id = document.getElementById('veiculo').value;
  const kmInput = document.getElementById('kmSaida');
  const veiculo = VEICULOS.find(v=>v.id === id);

  if(!veiculo){
    KM_ANTERIOR = 0;
    VEICULO_ATUAL = null;
    kmInput.value = '';
    setHint('Selecione o veículo');
    validateForm();
    return;
  }

  KM_ANTERIOR = kmAtualVeiculo(veiculo);
  VEICULO_ATUAL = veiculo;
  kmInput.value = KM_ANTERIOR > 0 ? KM_ANTERIOR : '';
  atualizarHintVeiculo();

  validateForm();
}

function validateForm(){
  const veiculoId = document.getElementById('veiculo').value;
  const motoristaId = document.getElementById('motorista').value;
  const seguranca = document.getElementById('seguranca').value;
  const km = Number(String(document.getElementById('kmSaida').value || '0').replace(',','.')) || 0;
  const destino = document.getElementById('destino').value.trim();
  const btn = document.getElementById('btnSalvar');

  if(isConsulta()){
    btn.disabled = true;
    btn.title = 'Perfil CONSULTA não possui permissão para gravar saída.';
    return;
  }

  if(veiculoId && motoristaId && seguranca && km && destino && km < KM_ANTERIOR){
    setMsg(`KM inferior ao último registrado (${KM_ANTERIOR}).`, '--red');
    btn.disabled = true;
    return;
  }

  atualizarHintVeiculo();

  const atual = document.getElementById('msg').innerText || '';
  if(atual.startsWith('KM inferior')) setMsg('');

  btn.disabled = !(veiculoId && motoristaId && seguranca && km && destino) || inFlight;
}

async function doEnviar(){
  if(inFlight) return;

  if(isConsulta()){
    setMsg('Perfil CONSULTA não possui permissão para gravar saída de veículo.', '--red');
    validateForm();
    return;
  }

  const veiculoId = document.getElementById('veiculo').value;
  const motoristaId = document.getElementById('motorista').value;
  const veiculo = VEICULOS.find(v=>v.id === veiculoId);
  const motorista = MOTORISTAS.find(m=>m.id === motoristaId);
  const seguranca = document.getElementById('seguranca').value;
  const KmSaida = Number(String(document.getElementById('kmSaida').value || '0').replace(',','.')) || 0;
  const destino = document.getElementById('destino').value.trim();

  if(!veiculo || !motorista || !seguranca || !KmSaida || !destino){
    validateForm();
    return;
  }

  if(veiculoRestrito(veiculo) && !motoristaTemAcessoRestrito(motorista)){
    setMsg('Motorista sem autorização para veículo restrito.', '--red');
    return;
  }

  if(KmSaida < KM_ANTERIOR){
    setMsg(`KM inferior ao último registrado (${KM_ANTERIOR}).`, '--red');
    return;
  }

  inFlight = true;
  document.getElementById('btnSalvar').disabled = true;
  setMsg('Gravando saída no Firebase...', '--text-soft');

  try{
    await addDoc(collection(db,'movimentacoes_frota'), {
      tipo: 'SAIDA',
      status: 'EM_TRANSITO',

      veiculoId: veiculo.id,
      veiculo: textoVeiculo(veiculo),
      Veiculo: textoVeiculo(veiculo),
      placa: veiculo.Placa || veiculo.placa || '',
      veiculoRestrito: veiculoRestrito(veiculo),

      motoristaId: motorista.id,
      motorista: textoMotorista(motorista),
      Motorista: textoMotorista(motorista),
      motoristaAcessoRestrito: motoristaTemAcessoRestrito(motorista),

      segurancaSaida: seguranca,
      SegurancaSaida: seguranca,

      KmSaida: KmSaida,
      kmSaida: KmSaida,

      destino: destino,
      Destino: destino,

      dataSaida: serverTimestamp(),
      criadoEm: serverTimestamp(),
      origem: 'saida.html'
    });

    await updateDoc(doc(db,'veiculos',veiculo.id), {
      EmTransito: true,
      KmAtualCadastro: KmSaida,
      MotoristaAtual: textoMotorista(motorista),
      DestinoAtual: destino,
      UltimaSaidaEm: serverTimestamp()
    });

    setMsg('Saída gravada com sucesso!', '--green');

    setTimeout(()=>{
      location.href = 'veiculos.html';
    }, 1200);

  }catch(e){
    console.error(e);
    setMsg((e && e.message) ? e.message : 'Erro ao salvar no Firebase.', '--red');
    inFlight = false;
    validateForm();
  }
}

async function init(){
  AUTH = getAuth();

  if(!sessaoValidaLocal(AUTH)){
    clearAuth();
    location.href = 'index.html';
    return;
  }

  const nome = nomeSeguranca(AUTH);
  document.getElementById('sessaoSegurancaTopo').textContent = nome;
  document.getElementById('seguranca').value = nome;

  if(isConsulta()){
    const consultaBox = document.getElementById('consultaBox');
    const btnSalvar = document.getElementById('btnSalvar');

    if(consultaBox) consultaBox.style.display = 'block';

    if(btnSalvar){
      btnSalvar.disabled = true;
      btnSalvar.innerText = 'SOMENTE CONSULTA';
      btnSalvar.title = 'Perfil CONSULTA não possui permissão para gravar saída.';
    }
  }

  document.getElementById('motorista').addEventListener('change', filtrarVeiculosPorMotorista);
  document.getElementById('veiculo').addEventListener('change', onChangeVeiculo);
  document.getElementById('kmSaida').addEventListener('input', validateForm);
  document.getElementById('destino').addEventListener('input', validateForm);
  document.getElementById('btnSalvar').addEventListener('click', doEnviar);
  document.getElementById('btnVoltarMenu').addEventListener('click', e=>{
    e.preventDefault();
    location.href='veiculos.html';
  });

  try{
    setMsg('Carregando dados do Firebase...', '--text-soft');

    await Promise.all([
      carregarVeiculos(),
      carregarMotoristas()
    ]);

    filtrarVeiculosPorMotorista();
    setMsg('');

  }catch(e){
    console.error(e);
    setMsg((e && e.message) ? e.message : 'Erro ao carregar dados do Firebase.', '--red');
    document.getElementById('veiculo').innerHTML = '<option value="">Erro ao carregar</option>';
    document.getElementById('motorista').innerHTML = '<option value="">Erro ao carregar</option>';
  }

  validateForm();
}

window.addEventListener('load', init);
</script>

</body>
</html>
