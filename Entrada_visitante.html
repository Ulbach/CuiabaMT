<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Entrada Visitante — Delta</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bg1:#061427;--bg2:#0b1b33;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.12);--radius:20px;--text-main:#e6edf7;--text-soft:#9fb4d3;--text-muted:#7b8ca7;--green:#22c55e;--blue:#3b82f6;--red:#ef4444;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text-main);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:30px;backdrop-filter:blur(10px);box-shadow:0 16px 40px rgba(0,0,0,.45)}
    .header{text-align:center;margin-bottom:25px}
    .header h2{margin:0;font-size:24px;font-weight:800;color:var(--blue)}
    .header p{margin:5px 0 0;font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:2px}
    .sessao{margin:-6px 0 18px 0;padding:12px 14px;border-radius:14px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.18);text-align:center;font-size:13px;color:#9fb4d3}
    .field{margin-bottom:18px}
    label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase}
    .input-group{position:relative}
    .input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--blue);font-size:14px;pointer-events:none}
    input,select{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);padding:13px 13px 13px 40px;border-radius:12px;color:#fff;font-size:15px;outline:none;transition:.2s}
    input:focus,select:focus{border-color:var(--blue);background:rgba(255,255,255,0.05)}
    .btn-save{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
    .btn-save:disabled{opacity:.45;cursor:not-allowed}
    .btn-back{display:block;text-align:center;margin-top:20px;color:var(--text-soft);text-decoration:none;font-size:13px}
    #msg{text-align:center;margin-top:15px;font-size:13px;font-weight:600;min-height:1.5em}
  </style>
</head>
<body>
<div class="card">
  <div class="sessao">Segurança logado: <strong id="sessaoSegurancaTopo" style="color:#e6edf7;">...</strong></div>
  <div class="header"><h2>Novo Visitante</h2><p>Delta Biocombustíveis</p></div>

  <div class="field"><label>CPF</label><div class="input-group"><i class="fa-solid fa-address-card"></i>
    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" onblur="buscarVisitante()">
  </div></div>

  <div class="field"><label>Nome Completo</label><div class="input-group"><i class="fa-solid fa-user"></i>
    <input type="text" id="nome" placeholder="Nome do visitante">
  </div></div>

  <div class="field"><label>Telefone</label><div class="input-group"><i class="fa-solid fa-phone"></i>
    <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTel(this)">
  </div></div>

  <div class="field"><label>Responsável / Área</label><div class="input-group"><i class="fa-solid fa-building-user"></i>
    <select id="responsavel"><option value="">Carregando...</option></select>
  </div></div>

  <div class="field"><label>Segurança Logado</label><div class="input-group"><i class="fa-solid fa-shield-halved"></i>
    <input type="text" id="seguranca" readonly>
  </div></div>

  <button class="btn-save" id="btnSalvar" onclick="salvar()">REGISTRAR ENTRADA</button>
  <a href="visitantes.html" class="btn-back" id="btnVoltarMenu">← VOLTAR AO MENU</a>
  <div id="msg"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyrhIsHgV1sQj2yMaFcb1SOl1FydAC0oay23djmAUnERwVjph6pTi3GQif9JNjf_tRCpw/exec';
const STORAGE_KEY = 'delta_auth_v1';
let historico = [];
let enviando = false;
let AUTH = null;

function getAuth() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
  catch(_) { return null; }
}
function clearAuth() { localStorage.removeItem(STORAGE_KEY); }

function jsonp(url) {
  return new Promise((resolve,reject) => {
    const cb = 'cb_' + Math.round(100000 * Math.random());
    const script = document.createElement('script');
    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cb + '&_ts=' + Date.now();
    window[cb] = (data) => {
      try { resolve(data); }
      finally {
        delete window[cb];
        if (script.parentNode) document.body.removeChild(script);
      }
    };
    script.onerror = () => {
      try { delete window[cb]; } catch(_) {}
      if (script.parentNode) document.body.removeChild(script);
      reject(new Error('Erro de conexão'));
    };
    document.body.appendChild(script);
  });
}

async function validarSessaoOuRedirecionar() {
  const auth = getAuth();
  if (!auth || !auth.token) {
    location.href = 'index.html';
    return null;
  }
  try {
    const res = await jsonp(API_URL + '?route=validarSessao&token=' + encodeURIComponent(auth.token));
    if (res && res.ok && res.autenticado) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ token: auth.token, seguranca: res.seguranca, expiraEm: res.expiraEm }));
      return { token: auth.token, seguranca: res.seguranca, expiraEm: res.expiraEm };
    }
  } catch(_) {}
  clearAuth();
  location.href = 'index.html';
  return null;
}

function mascaraCPF(i) {
  let v = i.value.replace(/\D/g, "");
  v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  i.value = v;
}
function mascaraTel(i) {
  let v = i.value.replace(/\D/g, "");
  v = v.replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d)(\d{4})$/, "$1-$2");
  i.value = v;
}

function setMsg(text, color) {
  const el = document.getElementById('msg');
  el.innerText = text || '';
  el.style.color = color || 'var(--text-soft)';
}

async function init() {
  AUTH = await validarSessaoOuRedirecionar();
  if (!AUTH) return;

  document.getElementById('sessaoSegurancaTopo').textContent = AUTH.seguranca || '---';
  document.getElementById('seguranca').value = AUTH.seguranca || '';

  try {
    const res = await jsonp(API_URL + '?route=getVisitantesData');
    historico = res.visitantes || [];
    document.getElementById('responsavel').innerHTML =
      '<option value="">Selecione...</option>' +
      (res.responsaveis || []).map(r => `<option value="${r}">${r}</option>`).join('');
    setMsg('');
  } catch(e) {
    setMsg('Erro na conexão.', 'var(--red)');
  }
}

function buscarVisitante() {
  const cpfDigitado = document.getElementById('cpf').value.replace(/\D/g, "");
  if (cpfDigitado.length < 11) return;
  const achado = historico.find(v => String(v.cpf || '').replace(/\D/g, "") === cpfDigitado);
  if (achado) {
    document.getElementById('nome').value = achado.nome || '';
    document.getElementById('telefone').value = achado.telefone || "";
    mascaraTel(document.getElementById('telefone'));
    setMsg('Visitante identificado!', 'var(--blue)');
  }
}

async function salvar() {
  if (enviando || !AUTH || !AUTH.token) return;

  const d = {
    token: AUTH.token,
    cpf: document.getElementById('cpf').value,
    nome: document.getElementById('nome').value,
    telefone: document.getElementById('telefone').value,
    responsavel: document.getElementById('responsavel').value,
    seguranca: document.getElementById('seguranca').value
  };

  if (!d.cpf || !d.nome || !d.responsavel) {
    alert("Preencha todos os campos!");
    return;
  }

  enviando = true;
  document.getElementById('btnSalvar').disabled = true;
  setMsg('Gravando...', 'var(--text-soft)');

  try {
    const res = await jsonp(API_URL + '?route=salvarVisitante&data=' + encodeURIComponent(JSON.stringify(d)));
    if (!res || res.ok === false) throw new Error((res && res.message) || 'Erro ao salvar');
    setMsg('✅ REGISTRADO!', 'var(--green)');
    setTimeout(() => location.href = "visitantes.html", 1200);
  } catch(e) {
    enviando = false;
    document.getElementById('btnSalvar').disabled = false;
    setMsg('Erro ao registrar.', 'var(--red)');
  }
}

window.onload = function() {
  const btn = document.getElementById('btnVoltarMenu');
  if (btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      location.href = 'visitantes.html';
    });
  }
  init();
};
</script>
</body>
</html>
